<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>用典 · 典故星图</title>
<link rel="stylesheet" href="style.css?v=17">
</head>
<body>
<header>
  <h1>用典</h1>
  <span class="tagline">典故星图 · 哪些诗用了这个典</span>
  <div class="search-wrap">
    <input id="search" type="text" placeholder="搜索典故、别名、诗名…" aria-label="搜索典故、别名、诗名" autocomplete="off">
    <ul id="search-results" hidden></ul>
  </div>
    <button id="catalog-btn" type="button">典故目录</button>
  <button id="reset" type="button">回到初始</button>
</header>
<main>
  <div id="crumb" hidden></div>
  <svg id="canvas"></svg>
  <aside id="panel">
    <div id="panel-content">
      <p class="hint">点击典故星查看用它的诗；点击诗展开它的其他典故；「典故目录」与搜索可达全部典故。</p>
    </div>
  </aside>
</main>
<script src="vendor/d3.v7.min.js"></script>
<script src="app.js?v=17"></script>
</body>
</html>
