<h1>杜秋娘</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>并序：「杜秋，金陵女也年十五为李锜妾。后锜叛灭，籍之入宫，有宠于景陵。穆宗即位，命秋为皇子傅姆。皇子壮，封漳王，郑注用事，诬丞相欲去已者，指王为根，王被罪废削。秋因赐归故乡，予过金陵，感其穷且老，为之赋诗。」诗云：「京江水清滑，生女白如脂。其间杜秋者【其间杜秋娘】，不劳朱粉施。老濞即山铸，后庭千双眉【后庭千蛾眉】。秋持玉斝醉【秋持玉斝饮】，与唱金缕衣【案：劝君莫惜金缕衣，劝君须惜少年时。花开堪折直须折，莫待无花空折枝。李锜长唱此辞。】。…</blockquote>
