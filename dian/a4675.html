<h1>晋司空</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>贾谧与后共谋，以华庶族，儒雅有筹略，进无逼上之嫌，退为众望所依，欲倚以朝纲，访以政事。疑而未决，以问裴頠，頠素重华，深赞其事。华遂尽忠匡辅，弥缝补阙，虽当闇主虐后之朝，而海内晏然，华之功也。华惧后族之盛，作女史箴以为讽。贾后虽凶妒，而知敬重华。久之，论前后忠勋，进封壮武郡公。华十馀让，中诏敦譬，乃受。数年，代下邳王晃为司空，领著作。…</blockquote>

<h2>用它的诗</h2>
