<h2>出处</h2><p>《韵府群玉·阳韵》</p><blockquote>阮孚持一皂囊，游会稽。客问：「囊中何物？」曰：「但有一钱看囊，恐其羞涩。」…</blockquote>
<h2>别名</h2><p>阮生囊、阮子囊、阮公囊、看囊、一钱留、羞囊、空囊羞涩、留得一钱看、囊空羞涩、一钱羞涩、空囊涩、囊频涩、井冻衣寒、一钱何足看、囊中一钱看、囊中有几钱、阮孚</p>
