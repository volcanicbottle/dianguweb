<h1>弃瓢</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>东汉·蔡邕《琴操》</p><blockquote>《箕山操》，许由作也。许由者，古之贞固之士也。尧时为布衣，夏则巢居，冬则穴处，饥则仍山而食，渴则仍河而饮。无杯器，常以手捧水而饮之。人见其无器，以一瓢遗之。由操饮毕，以瓢挂树。风吹树动，历历有声。由以为烦扰，遂取捐之。（据《平津馆丛书》本）…</blockquote>
<h2>别名</h2><p>风瓢、悬瓢、瓢挂树、挂瓢人、挂瓢、一瓢喧、挂树瓢空、瓢饮、一瓢、一瓢风入、一瓢闲挂、饮水箕山、枝上瓢空、风作瓢生、孤瓢枝上閒寄、枯瓢闲寄、枯瓢枝上寄、厌喧解瓢、一瓢不挂、枝上瓢、许由</p>
