<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>〈秋怀诗十一首〉其九：「霜风侵梧桐，众叶著树乾。空阶一片下，琤若摧琅玕。谓是夜气灭，望舒霣其团。青冥无依倚，飞辙危难安。惊起出户视，倚楹久汍澜。忧愁费晷景，日月如跳丸。迷复不计远，为君驻尘鞍。」…</blockquote>
<h2>别名</h2><p>跳丸日月、两丸日月、跳丸乌兔、心兵语阱、霜风入梧桐</p>
