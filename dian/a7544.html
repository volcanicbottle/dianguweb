<h1>索槟榔</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《南史》</p><blockquote>穆之少时，家贫诞节，嗜酒食，不修拘检。好往妻兄家乞食，多见辱，不以为耻。其妻江嗣女，甚明识，每禁不令往江氏。后有庆会，属令勿来。穆之犹往，食毕求槟榔。江氏兄弟戏之曰：「槟榔消食，君乃常饥，何忽须此？」妻复截发市肴馔，为其兄弟以饷穆之，自此不对穆之梳沐。及穆之为丹阳尹，将召妻兄弟，妻泣而稽颡以致谢。穆之曰：「本不匿怨，无所致忧。」及至醉饱，穆之乃令厨人以金柈贮槟榔一斛以进之。…</blockquote>
<h2>别名</h2><p>一斛贮槟榔</p>
