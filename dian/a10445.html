<h1>南柯梦</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>南柯梦两句：感叹以往的舒适生活像梦那么快地消逝了。李公佐《南柯记》叙述淳于棼梦至槐安国，国王妻以公主，用他做南柯太守，备极荣显，醒来才知道是一场梦。</p>
<h2>出处</h2><p>《南柯记》</p><blockquote>南柯梦两句：感叹以往的舒适生活像梦那么快地消逝了。李公佐《南柯记》叙述淳于棼梦至槐安国，国王妻以公主，用他做南柯太守，备极荣显，醒来才知道是一场梦。…</blockquote>
<h2>别名</h2><p>南柯梦两句</p>
