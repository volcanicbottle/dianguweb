<h1>泪下猿声巴峡</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>桓公入蜀，至三峡中，部伍中有得猿子者。其母缘岸哀号，行百馀里不去，遂跳上船，至便即绝。破视其腹中，肠皆寸寸断。公闻之，怒，命黜其人。南朝梁·刘孝标注引《荆州记》曰：「峡长七百里，两岸连山，略无绝处，重岩叠障，隐天蔽日。常有高猿长啸，属引清远。渔者歌曰：『巴东三峡巫峡长，猿鸣三声泪沾裳。』」…</blockquote>
