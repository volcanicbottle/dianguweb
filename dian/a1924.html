<h1>天子垂衣</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>垂衣：喻帝王以德化治理天下。唐李适《磷德殿宴百僚》：“恭己临群后，垂衣御八荒。”</p>
<h2>出处</h2><p>《周易》</p><blockquote>「黄帝、尧、舜，垂衣裳而天下治，盖取诸乾坤。」唐·孔颖达疏：「垂衣裳者，以前衣皮，其制短小，今衣丝麻布帛，所作衣裳其制长大，故云垂衣裳也。」…</blockquote>
<h2>别名</h2><p>垂衣、垂裳、垂衣天下治</p>
<h2>用它的诗</h2>
<p>古歌行 · 高适 <span class="verse">「天子垂衣方晏如」</span></p>
