<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《宋稗类钞》</p><blockquote>陶学士谷，买得党太尉故妓。取雪水烹团茶，谓妓曰：「党家应不识此。」妓曰：「彼粗人，安得有此。但能销金帐下，浅酌低唱，饮羊羔美酒耳。」陶愧其言。…</blockquote>
<h2>别名</h2><p>浅斟低唱、羔儿酒、党家人笑</p>
