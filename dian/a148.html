<h1>金鸦</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>阳乌：喻指太阳。唐贯休《古意九首》之二：“阳乌烁万物，草木怀春恩。”</p>
<h2>出处</h2><p>《史记》</p><blockquote>孔子闻之曰：「神龟知吉凶，而骨直空枯。日为德而君于天下，辱于三足之乌。月为刑而相佐，见食于虾蟆。」…</blockquote>
<h2>别名</h2><p>金乌、三足乌、赤鸟、天上乌、阳乌、三足老鸦、日乌、三足之鸟、虾蟆食月、朱鸟、日中侣、阳鸟</p>
<h2>用它的诗</h2>
<p>岳麓山道林二寺行 · 杜甫 <span class="verse">「金牓双回三足乌」</span></p>
