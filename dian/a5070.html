<h1>玉生烟</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>相传戴叔伦语&#x27;诗家之景，如蓝田日暖，良玉生烟&#x27;，蓝田自古以产美玉著称</p>
<h2>出处</h2><p>《全唐诗》</p><blockquote>锦瑟无端五十弦，一弦一柱思华年。庄生晓梦迷蝴蝶，望帝春心托杜鹃。沧海月明珠有泪，蓝田日暖玉生烟。此情可待成追忆，只是当时已惘然。…</blockquote>
<h2>别名</h2><p>暖玉生烟、蓝玉暖生烟、蓝田玉生烟</p>
<h2>用它的诗</h2>
<p>锦瑟 · 李商隐 <span class="verse">「蓝田日暖玉生烟」</span></p>
