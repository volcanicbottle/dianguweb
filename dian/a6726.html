<h2>出处</h2><p>《春秋左传正义》</p><blockquote>子皮欲使尹何为邑。子产曰。少。未知可否。子皮曰。愿吾爱之。不吾叛也。使夫往而学焉。夫亦愈知治矣。子产曰。不可。人之爱人。求利之也。今吾子爱人则以政。犹未能操刀而使割也。其伤实多。子之爱人。伤之而已。其谁敢求爱于子。子于郑国。栋也。栋折榱崩。侨将厌焉。敢不尽言。子有美锦。不使人学制焉。大官大邑。身之所庇也。而使学者制焉。其为美锦。不亦多乎。侨闻学而后入政。未闻以政学者也。若果行此。必有所害。譬如田猎。射御贯。则能获禽。若未尝登车射御。则败…</blockquote>
