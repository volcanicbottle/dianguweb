<h1>偷光</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>借壁光：咏勤学。清钱谦益《虫诗十二首·灯蛾》：“未许因人热，那能借壁光。”</p>
<h2>出处</h2><p>《西京杂记》</p><blockquote>匡衡，字稚圭，勤学而无烛。邻舍有烛而不逮，衡乃穿壁引其光，以书映光而读之。…</blockquote>
<h2>别名</h2><p>假馀光、借壁光、匡衡壁、凿壁偷光、凿壁生、穿邻舍壁、光偷凿壁、邻烛馀光、凿壁、凿邻家壁、凿照、穿壁借光、匡壁、烛借邻壁、匡衡</p>
<h2>用它的诗</h2>
<p>秋夕读书幽兴献兵部李侍郎 · 岑参 <span class="verse">「览卷试穿邻舍壁」</span></p>
