<h1>诣公车</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>七年春正月丙申，诏中都官、三辅、郡、国出系囚，非犯殊死，皆一切勿案其罪。见徒免为庶人。耐罪亡命，吏以文除之。又诏曰：「世以厚葬为德，薄终为鄙，至于富者奢僭，贫者单财，法令不能禁，礼义不能止，仓卒乃知其咎。其布告天下，令知忠臣、孝子、慈兄、悌弟薄葬送终之义。」二月辛巳，罢护漕都尉官。三月丁酉，诏曰：「今国有众军，并多精勇，宜且罢轻车、骑士、材官、楼船士及军假吏，令还复民伍。」公孙述立隗嚣为朔宁王。癸亥晦，日有食之，避正殿，寝兵，不听事五日…</blockquote>
