<h1>秾李夭桃</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《毛诗正义》</p><blockquote>桃之夭夭，灼灼其华，之子于归，宜其室家。桃之夭夭，有蕡其实，之子于归，宜其家室。桃之夭夭，其叶蓁蓁，之子于归，宜其家人。汉·毛亨传：「兴也。桃有华之盛者，夭夭，其少壮也。灼灼，华之盛也。」唐·孔颖达疏：「毛以为少壮之桃夭夭然，复有灼灼然此桃之盛华，以兴有十五至十九少壮之女，亦夭夭然复有灼灼之美色，正于秋冬行嫁。」…</blockquote>
<h2>别名</h2><p>夭桃繁李</p>
