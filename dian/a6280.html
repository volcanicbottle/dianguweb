<h1>七不堪</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>又人伦有礼，朝廷有法，自惟至熟，有必不堪者七，甚不可者二：卧喜晚起，而当关呼之不置，一不堪也。抱琴行吟，弋钓草野，而吏卒守之，不得妄动，二不堪也。危坐一时，痹不得摇，性复多虱，把搔无已，而当裹以章服，揖拜上官，三不堪也。素不便书，又不喜作书，而人间多事，堆案盈机，不相酬答，则犯教伤义，欲自勉强，则不能久，四不堪也。不喜吊丧，而人道以此为重，己为未见恕者所怨，至欲见中伤者，虽瞿然自责，然性不可化，欲降心顺俗，则诡故不情，亦终不能获无咎无誉…</blockquote>
<h2>别名</h2><p>嵇康</p>
<h2>用它的诗</h2>
<p>京还赠张维 · 孟浩然 <span class="verse">「其如七不堪」</span></p>
