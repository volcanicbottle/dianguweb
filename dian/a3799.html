<h1>鸿鹄志</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>陈胜者，阳城人也，字涉。吴广者，阳夏人也，字叔。陈涉少时，尝与人佣耕，辍耕之垄上，怅恨久之，曰：「苟富贵，无相忘。」庸者笑而应曰：「若为庸耕，何富贵也？」陈涉太息曰：「嗟乎，燕雀安知鸿鹄之志哉！」…</blockquote>
<h2>别名</h2><p>鸿鹄之志、陇上嗟、忘鸿鹄、燕雀、鸿鹄、垄上兴大楚、陈涉</p>
<h2>用它的诗</h2>
<p>大卤平后移家到永乐县居书怀十韵寄刘韦二前辈二公尝于此县寄居 · 李商隐 <span class="verse">「逸志忘鸿鹄」</span></p>
