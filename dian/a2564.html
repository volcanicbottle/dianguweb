<h1>多病又非才</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《苏轼诗集》</p><blockquote>百年三万日，老病常居半。其间互忧乐，歌笑杂悲叹。颠倒不自知，直为神所玩。须臾便堪笑，万事风雨散。自从识此理，久谢少年伴。逝将游无何，岂暇读城旦。非才更多病，二事可并案。愧烦贤使者，弭节整纷乱。乔侯瑚琏质，清庙尝荐盥。奋髯百吏走，坐变齐俗缓。未遭甘鹢退，并进耻鱼贯。每闻议论馀，凛凛激贪懦。莫邪当自跃，岂复烦炉炭。便应朝秣越，未暮刷燕馆。胡为守故丘，眷恋桑榆暖。为君叩牛角，一咏南山粲。…</blockquote>
