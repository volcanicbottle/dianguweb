<h2>出处</h2><p>《全唐诗》</p><blockquote>居邻北郭古寺空，杏花两株能白红。曲江满园不可到，看此宁避雨与风。二年流窜出岭外，所见草木多异同。冬寒不严地恒泄，阳气发乱无全功。浮花浪蕊镇长有，才开还落瘴雾中。山榴踯躅少意思，照耀黄紫徒为丛。鹧鸪钩辀猿叫歇，杳杳深谷攒青枫。岂如此树一来玩，若在京国情何穷。今旦胡为忽惆怅，万片飘泊随西东。明年更发应更好，道人【案：谓寺僧。】莫忘邻家翁【案：自谓。】。…</blockquote>
