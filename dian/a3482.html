<h1>贵妃醉脸</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《松窗杂录》</p><blockquote>太和、开成中，有程脩己者，以善画得进谒。脩己始以孝廉召入籍，故上不甚以画者流视之。会春暮，内殿赏牡丹花。上颇好诗，因问脩己曰：「今京邑传唱牡丹花诗，谁为首出？」脩己对曰：「臣尝闻公卿者多吟赏中书舍人李正封诗……上闻之，嗟赏移时，杨妃方恃恩宠，上笑谓贤妃曰：「妆镜台前，宜饮以一紫金盏酒，则正封之诗见矣。」…</blockquote>
<h2>别名</h2><p>杨玉环（杨贵妃）</p>
<h2>用它的诗</h2>
<p>多丽 · 李清照 <span class="verse">「也不似、贵妃醉脸」</span></p>
