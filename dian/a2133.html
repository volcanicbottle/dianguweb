<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>儿宽，千乘人也。治《尚书》，事欧阳生。以郡国选诣博士，受业孔安国。贫无资用，尝为弟子都养。时行赁作，带经而锄，休息辄读诵，其精如此。以射策为掌故，功次，补廷尉文学卒史。…</blockquote>
<h2>别名</h2><p>带经而锄、带经人、带经、倪生经锄、儿宽、常林、皇甫谧</p>
