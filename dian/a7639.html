<h1>陶公战舰</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>陈敏之乱，弘以侃为江夏太守，加鹰扬将军。……又加侃为督护，使与诸军并力距恢。侃乃以运船为战舰，或言不可，侃曰：「用官物讨官贼，但须列上有本末耳。」于是击恢，所向必破。侃戎政齐肃，凡有虏获，皆分士卒，身无私焉。后以母忧去职。尝有二客来吊，不哭而退，化为双鹤，冲天而去，时人异之。……侃旋江陵，寻以为侍中、太尉，加羽葆鼓吹，改封长沙郡公，邑三千户，赐绢八千匹，加都督交、广、宁七州军事。以江陵偏远，移镇巴陵。遣咨议参军张诞讨五溪夷，降之。…</blockquote>
<h2>别名</h2><p>陶侃</p>
<h2>用它的诗</h2>
<p>潭州 · 李商隐 <span class="verse">「陶公战舰空滩雨」</span></p>
