<h2>出处</h2><p>《淮南子》</p><blockquote>孔子欲行王道，东西南北，七十说而无所偶。故因卫卫夫人、弥子瑕而欲通其道。此皆欲平险除秽，由冥冥至炤炤，动于权而统于善者也。夫观逐者于其反也，而观行者于其终也。故舜放弟，周公杀兄，犹之为仁也；文公树米，曾子架羊，犹之为知也。…</blockquote>
