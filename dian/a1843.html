<h1>借山鸡</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《尹文子·大道上》</p><blockquote>楚人担山雉者，路人问：「何鸟也？」担雉者欺之曰：「凤凰也。」路人曰：「我闻有凤凰，今直见之。汝贩之乎？」曰：「然。」则十金，弗与。请加倍，乃与之。将欲献楚王，经宿而鸟死。路人不遑惜金，惟恨不得以献楚王。国人传之，咸以为真凤凰，贵，欲以献之，遂闻楚王。王感其欲献于己，召而厚赐之，过于买鸟之金十倍。…</blockquote>
<h2>别名</h2><p>楚郊疑凤、重价求山鸡、楚客山鸡、山鸡献楚、谓凤悦楚</p>
