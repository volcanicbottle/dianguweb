<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《礼记·王制》</p><blockquote>父之齿随行，兄之齿雁行，朋友不相踰。…</blockquote>
<h2>别名</h2><p>断行、鸿雁</p>
<h2>用它的诗</h2>
<p>自河南经乱，关内阻饥，兄弟离散，各在一处。因望月有感，聊书所怀，寄上浮梁大兄、于潜七兄、乌江十五兄兼示符离及下邽弟妹 · 元稹 <span class="verse">「吊影分为千里雁」</span></p>
