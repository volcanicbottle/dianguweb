<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>「壬子，起高庙，建社稷于洛阳，立郊兆于城南，始正火德，色尚赤。」唐·李贤注引《汉礼制度》曰：「人君之居，前有朝，后有寝。终则制庙以象朝，后制寝以象寝。光武都洛阳，乃合高祖以下至平帝为一庙，藏十一帝主于其中。」…</blockquote>
