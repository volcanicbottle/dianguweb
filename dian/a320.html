<h1>傅野</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>梦高宗：指受到帝王的赏识。唐姚合《赠终南山傅山人》：“悲君还姓傅，独不梦高宗。”</p>
<h2>出处</h2><p>《史记》</p><blockquote>帝小乙崩，子帝武丁立。帝武丁即位，思复兴殷，而未得其佐。三年不言，政事决定于冢宰，以观国风。武丁夜梦得圣人，名曰说。以梦所见视群臣百吏，皆非也。于是乃使百工营求之野，得说于傅险中。是时说为胥靡，筑于傅险。见于武丁，武丁曰是也。得而与之语，果圣人，举以为相，殷国大治。故遂以傅险姓之，号曰傅说。…</blockquote>
<h2>别名</h2><p>高宗梦、傅说梦、梦傅野、岩前叟、梦卜庸相、傅说、武丁（殷高宗）</p>
<h2>用它的诗</h2>
<p>秋日荆南述怀三十韵 · 杜甫 <span class="verse">「贤非梦傅野」</span></p>
