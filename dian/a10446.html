<h1>尘昏白羽</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>尘昏白羽：李白《北风行》，“别时提剑救边去，遗此虎文金□。中有一双白羽箭，蜘蛛结网生尘埃。箭空在，人今战死不复回。”这里当是悼念抗金的将士。尘，尘土。白羽，箭名。</p>
<h2>出处</h2><p>《北风行》</p><blockquote>尘昏白羽：李白《北风行》，“别时提剑救边去，遗此虎文金□。中有一双白羽箭，蜘蛛结网生尘埃。箭空在，人今战死不复回。”这里当是悼念抗金的将士。尘，尘土。白羽，箭名。…</blockquote>
