<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>〈曲江二首〉其一：「一片花飞减却春，风飘万点正愁人。且看欲尽花经眼【且看欲尽花惊眼】，莫厌伤多酒入唇。江上小堂巢翡翠【江上小棠巢翡翠】，花【案：即芙蓉苑。】【苑边高冢卧麒麟】。边高冢卧麒麟。细推物理须行乐，何用浮名绊此身【何用浮荣绊此身】【何事浮名绊此身】【何事浮荣绊此身】。」…</blockquote>
<h2>别名</h2><p>飞红万点、花飞春减、故飘万点、花飞减半、一片花飞</p>
