<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《本事诗·情感》</p><blockquote>唐武后时，左司郎中乔知之有婢名窈娘，艺色为当时第一。知之宠爱，为之不婚。武延嗣闻之，求一见，势不可抑。既见即留，无复还理。知之痛愤成疾，因为诗，写以缣素，厚赂阍守以达。窈娘得诗悲惋，结于裙带，赴井而死。延嗣见诗，遣酷吏诬陷知之，破其家。诗曰：「石家金谷重新声，明珠十斛买娉婷。昔日可怜君自许，此时歌舞得人情。君家闺阁不曾难，好将歌舞借人看。富贵雄豪非分理，骄奢势力横相干。别君去君终不忍，徒劳掩袂伤红粉。百年离别在高楼，一旦红颜为君尽。」时…</blockquote>
