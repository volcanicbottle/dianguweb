<h1>梦得文章</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《旧唐书》</p><blockquote>刘禹锡字梦得，彭城人。祖云，父溆，仕历州县令佐，世以儒学称。禹锡贞元九年擢进士第，又登宏辞科。禹锡精于古文，善五言诗，今体文章复多才丽。从事淮南节度使杜佑幕，典记室，尤加礼异。从佑入朝，为监察御史。与吏部郎中韦执谊相善。……大和中，度在中书，欲令知制诰，执政又闻诗序，滋不悦，累转礼部郎中、集贤院学士。度罢知政事，禹锡求分司东都。终以恃才褊心，不得久处朝列。六月，授苏州刺史，就赐金紫。…</blockquote>
<h2>别名</h2><p>刘禹锡</p>
