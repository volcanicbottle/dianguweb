<h1>黄金屋</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>黄金屋：喻女子所居之华丽宫室。唐李白《怨情》：“请看陈后黄金屋，寂寂珠帘生网丝。”</p>
<h2>出处</h2><p>《太平御览》</p><blockquote>旧题汉·班固《汉武帝故事》：「数岁，长公主嫖抱置膝上，问曰：『儿欲得妇不？』胶东王曰：『欲得妇。』长主指左右长御百馀人，皆云不用。末指其女问曰：『阿娇好不？』于是乃笑对曰：『好！若得阿娇作妇，当作金屋贮之也。』长主大悦；乃苦要上，遂成婚焉。」…</blockquote>
<h2>别名</h2><p>金屋、刘彻（汉武帝）</p>
<h2>用它的诗</h2>
<p>杂曲歌辞 妾薄命 · 李白 <span class="verse">「贮之黄金屋」</span></p>
