<h1>拟相如</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>雄少而好学，不为章句，训诂通而已，博览无所不见。为人简易佚荡，口吃不能剧谈，默而好深湛之思，清静亡为，少耆欲，不汲汲于富贵，不戚戚于贫贱，不修廉隅以徼名当世。家产不过十金，乏无儋石之储，晏如也。自有大度，非圣哲之书不好也；非其意，虽富贵不事也。顾尝好辞赋。先是时，蜀有司马相如，作赋甚弘丽温雅，雄心壮之，每作赋，常拟之以为式。…</blockquote>
<h2>别名</h2><p>司马相如</p>
<h2>用它的诗</h2>
<p>汉宫春 · 辛弃疾 <span class="verse">「解拟相如」</span></p>
