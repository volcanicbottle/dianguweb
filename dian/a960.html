<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>西北秋风至，楚客心悠哉。日暮碧云合，佳人殊未来。露采方汎艳，月华始徘徊。宝书为君掩，瑶琴讵能开？相思巫山渚，怅望阳云台。膏炉绝沈燎，绮席生浮埃。桂水日千里，因之平生怀。…</blockquote>
<h2>别名</h2><p>佳人来去、日暮云合，佳人何处</p>
<h2>用它的诗</h2>
<p>兰陵王 · 辛弃疾 <span class="verse">「怅日暮云合，佳人何处」</span></p>
