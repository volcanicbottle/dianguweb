<h1>杖头钱</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>杖头钱：指买酒钱，或人物放荡不羁。唐贺兰进明《行路难》之一：“但愿亲友常含笑，相逢莫吝杖头钱。”</p>
<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>阮宣子常步行，以百钱挂杖头，至酒店，便独酣畅。虽当世贵盛，不肯诣也。…</blockquote>
<h2>别名</h2><p>杖头挂百钱、百钱挂杖、百青铜、挂杖钱、杖钱、杖百钱、杖头沽酒物、阮修钱、百钱挂竹杖、杖头一钱无、杖头饮酒、杖悬酒钱、阮修</p>
<h2>用它的诗</h2>
<p>偪仄行赠毕曜 · 杜甫 <span class="verse">「恰有三百青铜钱」</span></p>
