<h2>出处</h2><p>《诗经·秦风·渭阳》</p><blockquote>「我送舅氏，曰至渭阳。何以赠之，路车乘黄。我送舅氏，悠悠我思。何以赠之，琼瑰玉佩。」《序》：「《渭阳》，康公念母也。康公之母，晋献公之女。文公遭丽姬之难，未反，而秦姬卒，穆公纳文公。康公时为大子，赠送文公于渭之阳。念母之不见也，我见舅氏，如母存焉。及其即位，思而作是诗也。」…</blockquote>
