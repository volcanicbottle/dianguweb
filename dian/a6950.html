<h1>忘肉味</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>忘味：指许久未吃过味美食物。宋陆游《病思》之四：“本自人山缘服玉，不应忘味待闻韶。”</p>
<h2>出处</h2><p>《论语注疏·述而》</p><blockquote>子在齐，闻韶，三月，不知肉味，曰：「不图为乐之至于斯也。」三国魏·何晏集解：「周曰，孔子在齐，闻习韶乐之盛美，故忽忘于肉味。」…</blockquote>
<h2>别名</h2><p>闻韶三月、三月忘味、闻韶忘味、忘味、忘味三月、闻韶、孔子</p>
<h2>用它的诗</h2>
<p>念奴娇 · 辛弃疾 <span class="verse">「为伊忘味三月」</span></p>
