<h1>一戎衣</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《尚书》</p><blockquote>既戊午，师逾孟津，癸亥，陈于商郊，俟天休命。甲子昧爽，受率其旅若林，会于牧野。罔有敌于我师，前徒倒戈，攻于后以北，血流漂杵。一戎衣，天下大定。乃反商政，政由旧。释箕子囚，封比干墓，式商容闾。散鹿台之财，发钜桥之粟。大赉于四海，而万姓悦服。列爵惟五，分土惟三。建官惟贤，位事惟能。重民五教。惟食丧祭。惇信明义，崇德报功，垂拱而天下治。旧题汉·孔安国传：「衣，服也；一著戎服而灭纣。」…</blockquote>
<h2>别名</h2><p>一戎、一衣</p>
<h2>用它的诗</h2>
<p>重经昭陵 · 杜甫 <span class="verse">「社稷一戎衣」</span></p>
