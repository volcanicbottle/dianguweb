<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子集释》</p><blockquote>帝曰：「汝殆其然哉！吾奏之以人，徵之以天，行之以礼义，建之以大清。夫至乐者，先应之以人事，顺之以天理，行之以五德，应之以自然，然后调理四时，太和万物。四时迭起，万物循生；一盛一衰，文武伦经；一清一浊，阴阳调和，流光其声；蛰虫始作，吾惊之以雷霆；其卒无尾，其始无首；一死一生，一偾一起；所常无穷，而一不可待。汝故惧也。…</blockquote>
