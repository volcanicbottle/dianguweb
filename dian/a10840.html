<h1>枯形阅世</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>枯形阅世：枯了的形骸还留在世上经历时世的沧桑。这和上句都是作者用来自比。枯形，指枯蜕（蝉脱的皮）。晋孙楚《蝉赋》：“形如枯槁。”阅，阅历，经历。</p>
