<meta name="description" content="典故「蘅皋赋」：黄初三年，余朝京师，还济洛川。古人有言，斯水之神，名曰宓妃。感宋玉对楚王神女之事，遂作斯赋。其辞曰：余从京域言归东藩。背伊阙，越轘辕。经通谷，陵景山。日既西倾，车殆马烦。尔乃税驾乎蘅皋，秣驷乎芝田。唐·李善注：「蘅，杜蘅也。皋，泽也。」">
