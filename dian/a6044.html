<h1>南山豆</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>恽宰相子，少显朝廷，一朝以晻昧语言见废，内怀不服，报会宗书曰：……其诗曰：『田彼南山，芜秽不治，种一顷豆，落而为萁。人生行乐耳，须富贵何时！』」三国魏·张晏注：「山高而在阳，人君之象也。芜秽不治，言朝廷之荒乱也。一顷百亩，以喻百官也。言豆者，贞实之物，当在囷仓，零落在野，喻己见放弃也。萁曲而不直，言朝臣皆谄谀也。」…</blockquote>
<h2>别名</h2><p>种豆南山、杨郎种豆、杨恽种豆、杨恽</p>
<h2>用它的诗</h2>
<p>新荷叶 · 辛弃疾 <span class="verse">「种豆南山」</span></p>
