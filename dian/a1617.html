<h1>挂冠神武</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《南史》</p><blockquote>未弱冠，齐高帝作相，引为诸王侍读，除奉朝请。虽在朱门，闭影不交外物，唯以披阅为务。朝仪故事，多所取焉。家贫，求宰县不遂。永明十年，脱朝服挂神武门，上表辞禄。诏许之，赐以束帛，敕所在月给伏苓五斤，白蜜二升，以供服饵。及发，公卿祖之征虏亭，供帐甚盛，车马填咽，咸云宋、齐以来未有斯事。于是止于句容之句曲山。…</blockquote>
<h2>别名</h2><p>神武挂冠、衣冠挂神武、神武衣冠、挂神武冠、衣冠神武门、挂衣冠神武、一冠神武悬、陶弘景</p>
