<h1>骅骝</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子集释》</p><blockquote>昔者尧舜让而帝，之哙让而绝；汤武争而王，白公争而灭。由此观之，争让之礼，尧桀之行，贵贱有时，未可以为常也。梁丽可以冲城，而不可以窒穴，言殊器也；骐骥骅骝，一日而驰千里，捕鼠不如狸狌，言殊技也；鸱鸺夜撮蚤，察毫末，昼出瞋目而不见丘山，言殊性也。故曰，盖师是而无非，师治而无乱乎？是未明天地之理，万物之情者也。是犹师天而无地，师阴而无阳，其不可行明矣。然且语而不舍，非愚则诬也。帝王殊禅，三代殊继。差其时，逆其俗者，谓之篡夫；当其时，顺其俗者，…</blockquote>
