<meta name="description" content="典故「功成者去」：应侯闻之，使人召蔡泽。蔡泽入，则揖应侯，应侯固不快，及见之，又倨。应侯因让之曰：「子常宣言代我相秦，岂有此乎？」对曰：「然。」应侯曰：「请闻其说。」蔡泽曰：「吁！何君见之晚也。夫四时之序，成功者去。夫人生手足坚强，耳目聪明圣知，岂非士之所愿与？」">
