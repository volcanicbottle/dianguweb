<h1>众鸟看孤鹗</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>邹阳，齐人也。汉兴，诸侯王皆自治民聘贤。吴王濞招致四方游士，阳与吴严忌、枚乘等俱仕吴，皆以文辩著名。久之，吴王以太子事怨望，称疾不朝，阴有邪谋，阳奏书谏。为其事尚隐，恶指斥言，故先引秦为谕，因道胡、越、齐、赵、淮南之难，然后乃致其意。其辞曰：「臣闻鸷鸟累百，不如一鹗。夫全赵之时，武力鼎士袨服丛台之下者一旦成市，而不能止幽王之湛患。淮南连山东之侠，死士盈朝，不能还厉王之西也。然而计议不得，虽诸、贲不能安其位，亦明矣。故愿大王审画而已。」唐…</blockquote>
