<h1>绿叶成阴</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《唐诗纪事》</p><blockquote>牧佐宣城幕，游湖州，刺史崔君张水戏，使州人毕观，令牧閒行，阅奇丽，得垂髫者十?岁。后十四年，牧刺湖州，其人已嫁生子矣，乃怅而为诗曰：‘自是寻春去校迟，不须惆怅怨芳时。狂风落尽深红色，绿叶成阴子满枝。…</blockquote>
<h2>别名</h2><p>子满芳枝、阴成子满、青子成阴</p>
