<h2>出处</h2><p>《艺文类聚》</p><blockquote>《十洲记》曰：炎洲，在南海中。地方二千里，去崖九万里。上有风生兽，似豹青色，大如狸，张取之，积薪数车以烧之，薪尽而此兽在火中，燃其毛不燋，斫刺不入，打之如皮囊，以铁椎锻其头数十下，乃死。以其口向风，须臾便活而起，以石上菖蒲塞其鼻，即死。取其脑，菊花服之，尽十斤，得寿五百岁。又曰：有火林山，山中有火兽，大如鼠，毛长三四寸。或曰：山可百里许，取其兽毛，绩以为布，名曰火浣布。国人衣服之，此布垢洿，以水浣濯之，终日不絜。以火烧布，两食久许出，其…</blockquote>
