<h1>不死药</h1>
<p class="meta">典故 · 4 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>二十八年，皇帝作始。端平法度，万物之纪。……齐人徐韨等上书，言海中有三神山，名曰蓬莱、方丈、瀛洲，仙人居之。请得斋戒，与童男女求之。于是遣徐韨发童男女数千人，入海求仙人。…</blockquote>
<h2>别名</h2><p>徐福楼船、童男丱女、五百童女、徐福一去、海中童丱、秦帝使、求药使、徐福竟何成、徐福求药、徐生迹、追徐福、徐韨邀、徐韨载女、徐福、徐福不得仙</p>
<h2>用它的诗</h2>
<p>白虎行 · 李贺 <span class="verse">「烧丹未得不死药」</span></p>
