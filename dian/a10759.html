<h1>社日停针线</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>年年社日停针线：张邦基《墨庄漫录》，“今人家闺房，遇春秋社日，不作组□（编织和针线工作），谓之忌作。”张籍的《吴楚词》和周邦彦的《秋蕊香》词都有“社日停针线”语。</p>
