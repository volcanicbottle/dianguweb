<h1>吕虔刀</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>初，吕虔有佩刀，工相之，以为必登三公，可服此刀。虔谓祥曰：「苟非其人，刀或为害。卿有公辅之量，故以相与。」祥固辞，强之乃受。祥临薨，以刀授览，曰：「汝后必兴，足称此刀。」览后奕世多贤才，兴于江左矣。…</blockquote>
<h2>别名</h2><p>赠宝刀、吕刀、宝刀赠、吕虔佩刀、佩刀、虔收宰相刀、识佩刀、重佩刀、宝刀世载、传家宝刀、佩刀世三公、尚书佩刀、王祥贻刀、贻佩刀、玉祥得佩刀、宰相刀、吕虔、王祥、王览</p>
<h2>用它的诗</h2>
<p>喜闻官军已临贼境二十韵 · 杜甫 <span class="verse">「左将吕虔刀」</span></p>
<p>赠华州王司士 · 李白 <span class="verse">「今日还须赠宝刀」</span></p>
