<h1>泪成血</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>玉壶盛泪：指妇人哀伤落泪。宋钱惟演《无题》：“纨扇寄情虽自洁，玉壶盛泪只凝红。”</p>
<h2>出处</h2><p>旧题晋·王嘉《拾遗记》卷七《魏》</p><blockquote>「时文帝选良家子女，以入六宫。习以千金宝赂聘之。既得，便以献文帝。灵芸闻别父母，歔欷累日，泪下沾衣。至升车就路之时，以玉唾壶盛泪壶中，即如红色。既发常山，及至京师，壶中泪凝如血。」…</blockquote>
<h2>别名</h2><p>泪珠红、灵芸泪、玉壶红泪、红泪客、两眼啼红、落红如泪、双泪红垂、玉壶悲、玉壶盛泪、红泪、啼红、薛灵芸、曹丕（魏文帝）</p>
<h2>用它的诗</h2>
<p>望海潮 · 秦观 <span class="verse">「双泪红垂」</span></p>
<p>相和歌辞 蜀国弦 · 李贺 <span class="verse">「谁家红泪客」</span></p>
