<h1>折臂三公</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>人有相羊祜父墓，后应出受命君。祜恶其言，遂掘断墓后，以坏其势。相者立视之曰：「犹应出折臂三公。」俄而祜坠马折臂，位果至公。南朝梁·刘孝标注引《幽明录》曰：「羊祜工骑乘。有一儿五六岁，端明可喜。掘墓之后，儿即亡。羊时为襄阳都督，因盘马落地，遂折臂。于时士林咸叹其忠诚。」…</blockquote>
<h2>别名</h2><p>全折到三公、三公臂折</p>
<h2>用它的诗</h2>
<p>秘书山崔少监见示坠马长句因而和之 · 刘禹锡 <span class="verse">「折臂三公定送方」</span></p>
