<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>晋十有四年，余春秋三十有二，始见二毛。以太尉掾兼虎贲中郎将，寓直于散骑之省。高阁连云，阳景罕曜，珥蝉冕而袭纨绮之士，此焉游处。…</blockquote>
<h2>别名</h2><p>潘省、散骑省、安仁省、骑省、潘生骖阁、潘安寓直、散骑云阁、潘岳</p>
