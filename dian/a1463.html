<h1>长鲸吞吐</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>百川派别，归海而会。控清引浊，混涛并濑。濆薄沸腾，寂寥长迈。濞焉汹汹，隐焉磕磕。出乎大荒之中，行乎东极之外。经扶桑之中林，包汤谷之滂沛。潮波汨起，回复万里。歊雾漨浡，云蒸昏昧。泓澄奫潫，澒溶沆瀁。莫测其深，莫究其广。澶湉漠而无涯，𠫤有流而为长。瑰异之所丛育，鳞甲之所集往。于是乎长鲸吞航，修鲵吐浪。跃龙腾蛇，鲛鲻琵琶。旧题晋·刘渊林注引《异物志》云：「鲸鱼，长者数十里，小者数十丈，雄曰鲸，雌曰鲵，或死于沙上，得之者皆无目，俗言其目化为明月…</blockquote>
