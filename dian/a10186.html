<h1>右军书</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>右军书：喻指书画作品。唐高适《途中寄徐录事》：“空多箧中赠，长见右军书。”</p>
<h2>出处</h2><p>《晋书·王羲之传》</p><blockquote>尝在蕺山见一老姥，持六角竹扇卖之。（王）羲之书其扇，各为五字。姥初有愠色。因谓姥曰：‘但言是王右军书，以求百钱邪。&#x27;姥如其言，人竞买之。…</blockquote>
<h2>别名</h2><p>王羲之</p>
<h2>用它的诗</h2>
<p>途中寄徐录事 · 高适 <span class="verse">「长见右军书」</span></p>
