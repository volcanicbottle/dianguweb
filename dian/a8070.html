<h1>魏豹俘</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>汉使曹参等虏魏王豹，以其国为郡，而薄姬输织室。豹已死，汉王入织室，见薄姬，有诏内后宫，岁馀不得幸。始姬少时，与管夫人、赵子儿相爱，约曰：「先贵毋相忘！」已而管夫人、赵子儿先幸汉王。汉王四年，坐河南成皋灵台，此两美人侍，相与笑薄姬初时约。汉王问其故，两人俱以实告。汉王心悽然怜薄姬，是日召欲幸之。对曰：「昨暮梦龙据妾胸。」上曰：「是贵徵也，吾为汝成之。」遂幸，有身。岁中生文帝，年八岁立为代王。自有子后，希见。高祖崩，诸幸姬戚夫人之属，吕后怒…</blockquote>
<h2>别名</h2><p>薄姬、魏豹</p>
<h2>用它的诗</h2>
<p>杜秋娘诗 · 杜牧 <span class="verse">「织室魏豹俘」</span></p>
