<h1>伯牛灾</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>伯牛灾：指不治之症。唐王维《哭褚司马》：“谁言老龙吉，未免伯牛灾。”</p>
<h2>出处</h2><p>《论语》</p><blockquote>伯牛有疾，子问之，自牖执其手，曰：「亡之，命矣夫！斯人也而有斯疾也！斯人也而有斯疾也！」…</blockquote>
<h2>别名</h2><p>冉耕（伯牛）、孔子</p>
<h2>用它的诗</h2>
<p>哭褚司马 · 王维 <span class="verse">「未免伯牛灾」</span></p>
