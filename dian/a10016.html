<h1>浊醪妙理</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>朝光入瓮牖，尸寝惊敝裘【方寝惊敝裘】【宴寝惊敝裘】。起行视天宇，春气渐和柔。兴来不暇懒【得兴不暇懒】【乘兴不暇懒】，今晨梳我头。出门无所待，徒步觉自由。杖藜复恣意，免值公与侯。晚定崔李交，会心真罕俦。每过得酒倾【每过得酒吃】，二宅可淹留。喜结仁里欢，况因令节求。李生园欲荒，旧竹颇修修【有竹颇修修】。引客看扫除，随时成献酬。崔侯初筵色，已畏空尊愁。未知天下士，至性有此不【志性有此不】。草牙既青出，蜂声亦暖游。思见农器陈，何当甲兵休。上古葛…</blockquote>
