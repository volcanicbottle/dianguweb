<h1>晋君听琴</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《韩非子》</p><blockquote>平公提觞而起为师旷寿，反坐而问曰：「音莫悲于清徵乎？」师旷曰：「不如清角。」平公曰：「清角可得而闻乎？」师旷曰：「不可。昔者黄帝合鬼神于泰山之上，……作为清角。今主君德薄，不足听之，听之将恐有败。」平公曰：「寡人老矣，所好者音也，愿遂听之。」师旷不得已而鼓之。一奏之，有玄云从西北方起；再奏之，大风至，大雨随之，裂帷幕，破俎豆，隳廊瓦，坐者散走，平公恐惧，伏于廊室之间。晋国大旱，赤地三年。平公之身遂癃病。…</blockquote>
<h2>别名</h2><p>师旷</p>
<h2>用它的诗</h2>
<p>荅王十二寒夜独酌有怀 · 李白 <span class="verse">「晋君听琴枉清角」</span></p>
