<h1>王褒颂</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>王褒字子渊，蜀人也。宣帝时修武帝故事，讲论六艺群书，博尽奇异之好，徵能为楚辞九江被公，召见诵读，益召高材刘向、张子侨、华龙、柳等待诏金马门。神爵、五凤之间，天下殷富，数有嘉应。上颇作歌诗，欲兴协律之事，丞相魏相奏言知音善鼓雅琴者渤海赵定、梁国龚德，皆召见待诏。于是益州刺史王襄欲宣风化于众庶，闻王褒有俊材，请与相见，使作中和、乐职、宣布诗，选好事者令依鹿鸣之声习而歌之。时氾乡侯何武为僮子，选在歌中。久之，武等学长安，歌太学下，转而上闻…</blockquote>
<h2>别名</h2><p>子渊新曲、王褒</p>

<p>河满子 · 苏轼 <span class="verse">「唱著子渊新曲」</span></p>
