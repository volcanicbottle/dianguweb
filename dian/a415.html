<h1>爱妾换马</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>唐·李冗《独异志》卷中</p><blockquote>后魏曹彰性倜傥，偶逢骏马爱之，其主所惜也。彰曰：「予有美妾可换，惟君所选。」马主因指一妓，彰遂换之。马号曰「白鹘」。后因猎，献于文帝。…</blockquote>
<h2>别名</h2><p>妾换马、换妾、换佳人、赤骥换青娥、换马邯郸娼、换美妾、娇姿骏骨、骏马换蛾眉、骏马换倾城、愧青骊、龙媒欲换、骢子换、骏马换妾、行雨水换追风、曹彰</p>
<h2>用它的诗</h2>
<p>夔州窦员外使君见示悼妓诗顾余尝识之因命同作 · 刘禹锡 <span class="verse">「龙媒欲换叹无期」</span></p>
<p>谢宣州崔相公赐马 · 刘禹锡 <span class="verse">「不是换佳人」</span></p>
