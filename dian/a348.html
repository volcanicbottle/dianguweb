<h2>出处</h2><p>《昭明文选》</p><blockquote>公子敬爱客，终宴不知疲。清夜游西园，飞盖相追随。明月澄清景，列宿正参差。秋兰被长阪，朱华冒绿池。潜鱼跃清波，好鸟鸣高枝。神飙接丹毂，轻辇随风移。飘飖放志意，千秋长若斯。…</blockquote>
