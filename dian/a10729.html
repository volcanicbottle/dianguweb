<h1>冲梯屡舞</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>边上冲梯屡舞：边城受到了敌军的围攻。冲，冲车。梯，云梯。冲车和云梯都是攻城的工具。《后汉书·公孙瓒传》：“袁氏之攻，状若鬼神，梯冲舞吾城上，鼓角鸣于地中。”</p>
<h2>出处</h2><p>《后汉书·公孙瓒传》</p><blockquote>边上冲梯屡舞：边城受到了敌军的围攻。冲，冲车。梯，云梯。冲车和云梯都是攻城的工具。《后汉书·公孙瓒传》：“袁氏之攻，状若鬼神，梯冲舞吾城上，鼓角鸣于地中。”…</blockquote>
<h2>别名</h2><p>边上冲梯屡舞</p>
