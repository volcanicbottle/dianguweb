<h1>不系舟</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《庄子集释》</p><blockquote>曰：「已矣，吾固告汝曰人将保汝，果保汝矣。非汝能使人保汝，而汝不能使人无保汝也，而焉用之感豫出异也！必且有感，摇而本才，又无谓也。与汝游者又莫汝告也，彼所小言，尽人毒也。莫觉莫悟，何相孰也！巧者劳而知者忧，无能者无所求，饱食而敖游，汎若不系之舟，虚而敖游者也。…</blockquote>
<h2>别名</h2><p>虚舟不系、附舟不系、庄子</p>
