<h1>随何</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>项籍死，天下定，上置酒。上折随何之功，谓何为腐儒，为天下安用腐儒。随何跪曰：「夫陛下引兵攻彭城，楚王未去齐也，陛下发步卒五万人，骑五千，能以取淮南乎？」上曰：「不能。」随何曰：「陛下使何与二十人使淮南，至，如陛下之意，是何之功贤于步卒五万人骑五千也。然而陛下谓何腐儒，为天下安用腐儒，何也？」上曰：「吾方图子之功。」乃以随何为护军中尉。布遂剖符为淮南王，都六，九江、庐江、衡山、豫章郡皆属布。…</blockquote>
<h2>别名</h2><p>健儿胜腐儒、刘邦（汉高祖）</p>
