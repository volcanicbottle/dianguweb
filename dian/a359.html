<h1>绿耳</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>八骏：指骏马。唐韦应物《酬郑户曹骊山感怀》：“万马自腾踏，八骏按辔行。”</p>
<h2>出处</h2><p>《列子集释》</p><blockquote>王大悦。不恤国事，不乐臣妾，肆意远游。命驾八骏之乘，右服骅骝而左绿耳，右骖赤骥而左白羲，主车则造父为御，泰丙为右；次车之乘，右服渠黄而左踰轮，左骖盗骊而右山子，柏夭主车，参百为御，奔戎为右。…</blockquote>
<h2>别名</h2><p>穆王八骏、周王八骏、八骏马、瑶池八骏、八骏蹄、八骏、穆驭、周王八马、八骏驹、姬满骏、芝田八骏、追穆后、八马、西征瑶池、巡瑶水、周穆王、西王母</p>
<h2>用它的诗</h2>
<p>九成宫 · 李商隐 <span class="verse">「风逐周王八骏蹄」</span></p>
