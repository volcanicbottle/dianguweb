<h1>二十四老翁</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《孔子家语》</p><blockquote>孔子谓宓子贱曰：「子治单父众悦，子何施而得之也？子语丘所以为之者。」对曰：「不齐之治也，父恤其子，其子恤诸孤，而哀丧纪。」孔子曰：「善小节也，小民附矣，犹未足也。」曰：「不齐所父事者三人，所兄事者五人，所友事者十一人。」孔子曰：「父事三人，可以教孝矣；兄事五人，可以教悌矣；友事十一人，可以举善矣。中节也，中人附矣，犹未足也。」曰：「此地民有贤于不齐者五人，不齐事之而禀度焉，皆教不齐之道。」…</blockquote>
<h2>别名</h2><p>宓子贱</p>
<h2>用它的诗</h2>
<p>观李九少府翥树宓子贱神祠碑 · 高适 <span class="verse">「二十四老翁」</span></p>
