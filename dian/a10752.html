<h1>摇落</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>且莫令两句：不要让秋来边塞的榆柳空悲摇落。这表示要把握时机，争取北伐胜利，不要让沦陷区的人民失望。古时北方边塞多种榆柳，因此称为榆塞。摇落，衰落。宋玉《九辩》：“草木摇落而变衰。”</p>
<h2>出处</h2><p>《九辩》</p><blockquote>且莫令两句：不要让秋来边塞的榆柳空悲摇落。这表示要把握时机，争取北伐胜利，不要让沦陷区的人民失望。古时北方边塞多种榆柳，因此称为榆塞。摇落，衰落。宋玉《九辩》：“草木摇落而变衰。”…</blockquote>
<h2>别名</h2><p>且莫令两句</p>
<h2>用它的诗</h2>
<p>满江红 · 黄机 <span class="verse">「且莫令榆柳塞门秋悲摇落」</span></p>
<p>在狱咏蝉并序 · 骆宾王 <span class="verse">「未摇落而先衰」</span></p>
