<h1>越甲鸣君</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>耻令句，意谓以敌人甲兵惊动国君为可耻。《说苑·立节》：越国甲兵入齐，雍门子狄请齐君让他自杀，因为这是越甲在鸣国君，自己应当以身殉之，遂自刎死。鸣，这里是惊动的意思。</p>
<h2>出处</h2><p>《说苑·立节》</p><blockquote>耻令句，意谓以敌人甲兵惊动国君为可耻。《说苑·立节》：越国甲兵入齐，雍门子狄请齐君让他自杀，因为这是越甲在鸣国君，自己应当以身殉之，遂自刎死。鸣，这里是惊动的意思。…</blockquote>
<h2>别名</h2><p>耻令句</p>
<h2>用它的诗</h2>
<p>老将行 · 王维 <span class="verse">「耻令越甲鸣吾君」</span></p>
