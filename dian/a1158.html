<h1>不负平生学</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《旧唐书》</p><blockquote>八年四月，窦参得罪，以贽为中书侍郎、门下同平章事。贽久为邪党所挤，困而得位，意在不负恩，悉心报国，以天下事为己任。上即位之初，用杨炎、卢杞秉政，树立朋党，排摈良善，卒致天下沸腾，銮舆奔播。惩是之失，贞元已后，虽立辅臣，至于小官除拟，上必再三详问，久之方下。及贽知政事，请许台省长官自荐属官，仍保任之，事有旷败，兼坐举主。上许之，俄又宣旨曰：「外议云：『诸司所举，多引用亲党，兼通赂遗，不得实才。』此法行之非便，今后卿等宜自选择，勿用诸司延…</blockquote>
