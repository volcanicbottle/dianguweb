<h1>梨园</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《新唐书》</p><blockquote>，隋有法曲，其音清而近雅。其器有铙、钹、钟、磬、幢箫、琵琶。琵琶圆体修颈而小，号曰「奏汉子」，盖弦之遗制，出于胡中，传为秦、汉所作。其声金、石、丝、竹以次作，隋炀帝厌其声澹，曲终复加解音。玄宗既知音律，又酷爱法曲，选坐部伎子弟三百教于梨园，声有误者，帝必觉而正之，号「皇帝梨园弟子」。宫女数百，亦为梨园弟子，居宜春北院。梨园法部，更置小部音声三十馀人。帝幸骊山，杨贵妃生日，命小部张乐长生殿，因奏新曲，未有名，会南方进荔枝，因名曰荔枝香。…</blockquote>

<h2>用它的诗</h2>
<p>好事近 · 韩元吉 <span class="verse">「多少梨园声在」</span></p>
