<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《战国策》</p><blockquote>秦王闻之，大喜·乃朝服，设九宾，见燕使者咸阳宫·荆轲奉樊于期头函，而秦武阳奉地图匣，以次进至陛下。秦武阳色变振恐，群臣怪之，荆轲顾笑武阳，前为谢曰：「北蛮夷之鄙人，未尝见天子，故振慑，愿大王少假借之，使毕使于前。」…</blockquote>
<h2>别名</h2><p>武阳坚紫、武阳死灰、舞阳坚紫、秦武阳</p>
