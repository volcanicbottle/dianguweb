<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>嵇绍字延祖，魏中散大夫康之子也。十岁而孤，事母孝谨。以父得罪，靖居私门。山涛领选，启武帝曰：「康诰有言：『父子罪不相及。』嵇绍贤侔郤缺，宜加旌命，请为秘书郎。」帝谓涛曰：「如卿所言，乃堪为丞，何但郎也。」乃发诏徵之，起家为秘书丞。…</blockquote>
<h2>别名</h2><p>山公访嵇绍、山涛、嵇康、嵇绍</p>
<h2>用它的诗</h2>
<p>赠宇文中丞 · 李商隐 <span class="verse">「人间只有嵇延祖」</span></p>
