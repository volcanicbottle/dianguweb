<h1>绣衣郎</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>御史大夫，秦官，位上卿，银印青绶，掌副丞相。有两丞，秩千石。一曰中丞，在殿中兰台，掌图籍秘书，外督部刺史，内领侍御史员十五人，受公卿奏事，举劾按章。成帝绥和元年更名大司空，金印紫绶，禄比丞相，置长史如中丞，官职如故。哀帝建平二年复为御史大夫，元寿二年复为大司空，御史中丞更名御史长史。侍御史有绣衣直指，出讨奸猾，治大狱，武帝所制，不常置。唐·颜师古注引服虔曰：「指事而行，无阿私也。」师古曰：「衣以绣者，尊宠之也。」…</blockquote>
