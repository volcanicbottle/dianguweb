<h2>出处</h2><p>《晋书》</p><blockquote>山涛字巨源，河内怀人也。……与宣穆后有中表亲，是以见景帝。帝曰：「吕望欲仕邪？」命司隶举秀才，除郎中。转骠骑将军王昶从事中郎。久之，拜赵国相，迁尚书吏部郎。……及羊祜执政，时人欲危裴秀，涛正色保持之。由是失权臣意，出为冀州刺史，加宁远将军。……舆疾归家。以太康四年薨，时年七十九。…</blockquote>
