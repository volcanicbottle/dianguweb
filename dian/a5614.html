<h1>鲁诸生</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>叔孙通者，薛人也。秦时以文学徵，待诏博士。数岁，陈胜起山东，使者以闻，二世召博士诸儒生问曰：「楚戍卒攻蕲入陈，于公如何？」……群臣饮酒争功，醉或妄呼，拔剑击柱，高帝患之。叔孙通知上益厌之也，说上曰：「夫儒者难与进取，可与守成。臣愿徵鲁诸生，与臣弟子共起朝仪。」…</blockquote>
<h2>别名</h2><p>诸生、叔孙通</p>
<h2>用它的诗</h2>
<p>奉送郭中丞兼太仆卿充陇右节度使三十韵 · 杜甫 <span class="verse">「祗似鲁诸生」</span></p>
<p>淮阴书怀寄王宗成 · 李白 <span class="verse">「不是鲁诸生」</span></p>
