<h1>却羡井中蛙</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《南史》</p><blockquote>庚午，贺若弼攻陷南徐州。辛未，韩擒又陷南豫州。隋军南北道并进。辛巳，贺若弼进军钟山，顿白土冈之东南，众军败绩。弼乘胜进军宫城，烧北掖门。是时，韩擒率众自新林至石子冈，镇东大将军任忠出降擒，仍引擒经朱雀航趣宫城，自南掖门入。城内文武百司皆遁出，唯尚书仆射袁宪、后閤舍人夏侯公韵侍侧。宪劝端坐殿上，正色以待之。后主曰：「锋刃之下，未可及当，吾自有计。」乃逃于井。二人苦谏不从，以身蔽井，后主与争久之方得入。沈后居处如常。太子深年十五，闭閤而坐，…</blockquote>
