<h1>向重华诉</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《楚辞补注》</p><blockquote>固时俗之工巧兮，偭规矩而改错。背绳墨以追曲兮，竞周容以为度。忳郁邑余侘傺兮，吾独穷困乎此时也。宁溘死以流亡兮，余不忍为此态也。鸷鸟之不群兮，自前世而固然。何方圜之能周兮，夫孰异道而相安。屈心而抑志兮，忍尤而攘诟。伏清白以死直兮，固前圣之所厚。……佩缤纷其繁饰兮，芳菲菲其弥章。民生各有所乐兮，余独好脩以为常。虽体解吾犹未变兮，岂余心之可惩。……依前圣以节中兮，喟凭心而历玆。济沅湘以南征兮，就重华而陈词。…</blockquote>
<h2>别名</h2><p>舜</p>
<h2>用它的诗</h2>
<p>贺新郎 · 辛弃疾 <span class="verse">「叹灵均、欲向重华诉」</span></p>
