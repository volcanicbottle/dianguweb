<p class="meta">典故 · 4 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>吴丝蜀桐张高秋，空白凝云颓不流【空山凝云颓不流】。江娥啼竹素女愁，李凭中国弹箜篌。昆山玉碎凤凰叫，芙蓉泣露香兰笑。十二门前融冷光，二十三丝动紫皇。女娲鍊石补天处，石破天惊逗秋雨。梦入坤山教神妪【梦入神山教神妪】，老鱼跳波瘦蛟舞。吴质不眠倚桂树，露脚斜飞湿寒兔。…</blockquote>
<h2>别名</h2><p>露脚斜飞、香兰如笑</p>
