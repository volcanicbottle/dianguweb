<h1>向河梁</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>向河梁两句：写李陵送别苏武。是说别后回头来看同游的河梁，就要相隔万里，和老朋友永远分别了。河梁，桥。故人，指苏武。《文选》载李陵《与苏武诗》：“携手上河梁，游子暮何之？”</p>
<h2>出处</h2><p>《报任安书》</p><blockquote>将军百战声名裂：汉武帝时，李陵率领少数部队与匈奴连战十余日，“矢尽道穷，救兵不至，士卒死伤如积”，因而失败投降（见司马迁《报任安书》）。声名裂，说他投降敌人，毁掉了声名。…</blockquote>
<h2>别名</h2><p>向河梁两句、将军百战声名裂</p>
<h2>用它的诗</h2>
<p>贺新郎 · 辛弃疾 <span class="verse">「将军百战声名裂」</span></p>
