<h1>聚散抟沙</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《苏轼诗集》</p><blockquote>寒鸡知将晨，饥鹤知夜半。亦如老病客，遇节尝感叹。光阴等敲石，过眼不容玩。亲友如抟沙，放手还复散。羁孤每自笑，寂寞谁肯伴。元达号神君，高论森月旦。纪明本贤将，汨没事堆案。欣然肯相顾，夜阁灯火乱。盘空愧不饱，酒薄仅堪盥。雍容许著帽，不怪安石缓。虽无窈窕人，清唱弄珠贯。幸有纵横舌，说剑起慵懦。二豪沉下位，暗火埋湿炭。岂似草玄人，默默老儒馆。行看富贵逼，炙手借馀暖。应念苦思归，登楼赋王粲。…</blockquote>
<h2>别名</h2><p>交友抟沙、抟沙一散</p>
