<h2>出处</h2><p>《史记》</p><blockquote>屈平疾王听之不聪也，谗谄之蔽明也，邪曲之害公也，方正之不容也，故忧愁幽思而作离骚。离骚者，犹离忧也。夫天者，人之始也；父母者，人之本也。人穷则反本，故劳苦倦极，未尝不呼天也；疾痛惨怛，未尝不呼父母也。屈平正道直行，竭忠尽智以事其君，谗人閒之，可谓穷矣。信而见疑，忠而被谤，能无怨乎？屈平之作离骚，盖自怨生也。国风好色而不淫，小雅怨诽而不乱。若离骚者，可谓兼之矣。上称帝喾，下道齐桓，中述汤武，以刺世事。明道德之广崇，治乱之条贯，靡不毕见。其…</blockquote>
