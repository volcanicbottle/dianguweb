<h2>出处</h2><p>《礼记注疏》</p><blockquote>子曰：「愚而好自用，贱而好字专。生乎今之世，反古之道。如此者菑及其身者也。」非天子不议礼，不制度，不考文。今天下，车同轨，书同文，行同伦。虽有其位，苟无其德，不敢作礼乐焉。虽有其德，苟无其位，亦不敢作礼乐焉。子曰，「吾说夏礼，杞不足徵也。吾学殷礼，有宋存焉。吾学周礼，今用之。吾从周。」…</blockquote>
