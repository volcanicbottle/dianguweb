<h1>山中宰相</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>山中宰相：指处士议政。唐徐寅《岚似屏风》：“山中宰相陶弘景，谷口耕夫郑子真。”</p>
<h2>出处</h2><p>《南史》</p><blockquote>永明十年，脱朝服挂神武门，上表辞禄，诏许之，赐以束帛。……于是止于句容之句曲山。……武帝既早与之游，及即位后，恩礼愈笃，书问不绝，冠盖相望。……国家每有吉凶征讨大事，无不前以咨询。月中常有数信，时人谓为山中宰相。…</blockquote>
<h2>别名</h2><p>山中相、华阳处士、陶山相、华阳计、山中陶弘景、陶弘景、陶隐居</p>
<h2>用它的诗</h2>
<p>送虞城刘明府谒魏郡苗太守 · 高适 <span class="verse">「吾为陶隐居」</span></p>
