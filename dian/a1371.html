<h1>酥雨</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>〈早春呈水部张十八员外二首〉其一：「天街小雨润如酥，草色遥看近却无。最是一年春好处，绝胜烟柳满皇都【绝胜花柳满皇都】。」…</blockquote>
<h2>别名</h2><p>润如酥、小雨如酥、草色遥看近却无、天街小雨润如酥、微雨如酥</p>
<h2>用它的诗</h2>
<p>减字木兰花 · 苏轼 <span class="verse">「微雨如酥」</span></p>
<p>南乡子 · 苏轼 <span class="verse">「小雨如酥落便收」</span></p>
