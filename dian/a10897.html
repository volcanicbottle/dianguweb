<h1>羽化登仙</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>蜕其皮也两句，蜕，指蝉脱皮，道家则用蜕质为死亡之讳称，即是“解脱”。这里是说，蝉蜕质之后，便羽化（道家成仙之称）飞天，上登仙都。夏侯湛《东方朔画赞序》：“蝉蜕龙变，弃俗登仙。”</p>
<h2>出处</h2><p>《东方朔画赞序》</p><blockquote>蜕其皮也两句，蜕，指蝉脱皮，道家则用蜕质为死亡之讳称，即是“解脱”。这里是说，蝉蜕质之后，便羽化（道家成仙之称）飞天，上登仙都。夏侯湛《东方朔画赞序》：“蝉蜕龙变，弃俗登仙。”…</blockquote>
<h2>别名</h2><p>蜕其皮也两句</p>
