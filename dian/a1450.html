<h2>出处</h2><p>《全唐诗》</p><blockquote>云物凄凉拂曙流【云物凄清拂曙流】，汉家宫阙动高秋。残星几点雁横塞，长笛一声人倚楼。紫艳半开篱菊静，红衣落尽渚莲愁。鲈鱼正美不归去，空戴南冠学楚囚。…</blockquote>
