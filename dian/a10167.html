<h1>丹徒布衣</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>丹徒布衣：指平民，或喻识破官场诡危之人。唐李白《玉真公主别馆苦雨赠上尉张卿二首》之二：“丹徒布衣者，慷慨末可量。”</p>
<h2>出处</h2><p>《晋书·诸葛长民传》</p><blockquote>义熙初，慕容超寇下郊长民遣部将徐淡击走之，进位使持节……领晋陵太守、镇丹徒。后因骄纵贪侈，不恤政事，为刘裕所疑，欲杀之，诸葛长民欲谋乱，犹豫未发，既而叹曰：‘贫贱常思富贵，富贵必履危机。今日欲为丹徒布衣，岂可得也！’…</blockquote>

<h2>用它的诗</h2>
<p>玉真公主别馆苦雨赠卫尉张卿二首 二 · 李白 <span class="verse">「丹徒布衣者」</span></p>
