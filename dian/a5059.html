<h1>来日苦无多</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>盆城去鄂渚，风便一日耳。不枉故人书，无因帆【案：去声。】江水。故人辞礼闱，旌节镇江圻。而我窜逐者，龙钟初得归。别来已三岁，望望长迢递。咫尺不相闻，平生那可计。我齿落且尽，君鬓白几何【君须白几何】。年皆过半百，来日苦无多。少年乐新知，衰暮思故友。譬如亲骨肉，宁免相可不。我昔实愚蠢，不能降色辞。子犯亦有言，臣犹自知之。公其务贳【案：音世。】过，我亦请改事。桑榆傥可收，愿寄相思字。…</blockquote>
