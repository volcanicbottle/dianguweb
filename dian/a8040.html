<h1>韦娘局上</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《新唐书》</p><blockquote>中宗庶人韦氏，京兆万年人。祖弘表，贞观中曹王府典军……帝在东宫，后被选为妃。嗣圣初，立为皇后。俄与帝处房陵，每使至，帝辄恐，欲自杀。后止曰：「祸福何常，早晚等死耳，无遽！」及帝复即位，后居中宫……是时，上官昭容与政事，方敬晖等将尽诛诸武，武三思惧，乃因昭容入请，得幸于后，卒谋晖等诛之。初，帝幽废，与后约：「一朝见天日，不相制。」至是与三思升御床博戏，帝从旁典筹，不为忤。…</blockquote>
<h2>别名</h2><p>唐中宗、韦皇后</p>
<h2>用它的诗</h2>
