<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《礼记注疏》</p><blockquote>「将由夫修饰之君子与？则三年之丧，二十五月而毕，若驷马之过隙」东汉·郑玄注：「驷之过隙，喻疾也。」唐·孔颖达疏：「驷谓驷马，隙谓空隙。驷马骏疾，空隙狭小，以骏疾而过狭小，言急速之甚。」…</blockquote>
<h2>别名</h2><p>白驹催、过隙、白驹留、白驹过隙、驻隙、隙驹、白驹隙光</p>

<p>秋日荆南述怀三十韵 · 杜甫 <span class="verse">「身世白驹催」</span></p>
