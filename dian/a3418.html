<h2>出处</h2><p>《汉书》</p><blockquote>初，帝姑馆陶公主号窦太主，堂邑侯陈午尚之。午死，主寡居，年五十馀矣，近幸董偃。始偃与母以卖珠为事，偃年十三，随母出入主家。左右言其姣好，主召见，曰：「吾为母养之。」因留第中，教书计相马御射，颇读传记。至年十八而冠，出则执辔，入则侍内。为人温柔爱人，以主故，诸公接之，名称城中，号曰董君。主因推令散财交士，令中府曰：「董君所发，一日金满百斤，钱满百万，帛满千匹，乃白之。」安陵爰叔者，爰盎兄子也，与偃善，谓偃曰：「足下私侍汉主，挟不测之罪，将…</blockquote>
