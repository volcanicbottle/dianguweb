<h1>元戎小队</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>元戎小队出郊坰，问柳寻花到野亭。川合东西瞻使节，地分南北任流萍【地分南北任孤萍】。扁舟不独如张翰，白帽还应似管宁【白帽应兼似管宁】【皂帽还应似管宁】【皂帽应兼似管宁】。寂寞江天云雾里【今日江天云雾里】，何人道有少微星。…</blockquote>
<h2>别名</h2><p>寻花问柳、小队出郊、小队红旗、小队春行、小队登临</p>
<h2>用它的诗</h2>
