<h1>百万呼卢</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《宋书》</p><blockquote>玄自闻军起，忧惧无复为计。或曰：「刘裕等众力甚弱，岂办之有成，陛下何虑之甚。」玄曰：「刘裕足为一世之雄；刘毅家无担石之储，摴蒲一掷百万；何无忌，刘牢之甥，酷似其舅。共举大事，何谓无成。」…</blockquote>
<h2>别名</h2><p>彩卢连掷、赢如刘毅、呼卢、一掷成卢、呼卢胜、摴蒲百万、绕床呼卢、一掷、刘毅掷、绕床呼一掷、五木尽作炉、掷卢使气、刘毅输百万、希乐豪、刘毅（字希乐）</p>
<h2>用它的诗</h2>
