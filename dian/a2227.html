<h1>仙风道骨</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐文》</p><blockquote>予昔于江陵见天台司马子微，谓予有仙风道骨，可与神游八极之表，因著〈大鹏遇稀有鸟赋〉以自广。此赋已传于世，往往人间见之。悔其少作，未穷宏达之旨，中年弃之。及读《晋书》，睹阮宣子《大鹏赞》，鄙心陋之。遂更记忆，多将旧本不同。今腹存手集，岂敢传诸作者，庶可示之子弟而已。…</blockquote>
<h2>别名</h2><p>道骨仙风</p>
