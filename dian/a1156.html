<h1>买山钱</h1>
<p class="meta">典故 · 4 首诗使用</p>

<h2>出处</h2><p>《世说新语》</p><blockquote>「支道林因人就深公买印山，深公答曰：『未闻巢、由买山而隐。』」…</blockquote>
<h2>别名</h2><p>买青山、买山隐、买山赀、卖山、买山而隐、无钱买山、钱买山、道林钱、买峰、买山、作意买山、不费青蚨买、不用道林钱、买得前山、买山归老、西山买白云、买山巢由笑、支遁不惜钱、支公计、支遁、深公、巢父、许由</p>
