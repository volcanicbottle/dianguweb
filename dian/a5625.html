<h1>陆抗尝药</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>祜与陆抗相对，使命交通，抗称祜之德量，虽乐毅、诸葛孔明不能过也。抗尝病，祜馈之药，抗服之无疑心。人多谏抗，抗曰：「羊祜岂酖人者！」时谈以为华元、子反复见于今日。抗每告其戍曰：「彼专为德，我专为暴，是不战而自服也。各保分界而已，无求细利。」孙闻二境交和，以诘抗。抗曰：「一邑一乡，不可以无信义，况大国乎！臣不如此，正是彰其德，于祜无伤也。」…</blockquote>
<h2>别名</h2><p>羊公人不疑、叔子持药、羊祜（字叔子）、陆抗</p>
<h2>用它的诗</h2>
<p>河南观察使故相国袁公挽歌三首 一 · 刘禹锡 <span class="verse">「羊公人不疑」</span></p>
