<h1>学贯天人际</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>司马迁《报任安书》：……仆窃不逊，近自托于无能之辞，网罗天下放失旧闻，考之行事，稽其成败兴坏之理，凡百三十篇，亦欲以究天人之际，通古今之变，成一家之言。草创未就，适会此祸，惜其不成，是以就极刑而无愠色。仆诚已著此书，藏之名山，传之其人通邑大都，则仆偿前辱之责，虽万被戮，岂有悔哉！然此可为智者道，难为俗人言也。…</blockquote>
<h2>别名</h2><p>述作究天人、著论穷天人、司马迁</p>
<h2>用它的诗</h2>
<p>八哀诗 赠秘书监江夏李公邕 · 杜甫 <span class="verse">「学贯天人际」</span></p>
