<h2>出处</h2><p>《南史》</p><blockquote>当时能棋人琅邪王抗第一品，吴郡褚思庄、会稽夏赤松第二品。赤松思速，善于大行，思庄戏迟，巧于斗棋。宋文帝时，羊玄保为会稽，帝遣思庄入东，与玄保戏，因置局图，还于帝前覆之。…</blockquote>
