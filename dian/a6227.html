<h1>平阳客</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>融既博览典雅，精核数术，性好音，能鼓琴吹笛，而为督邮，无留事，独卧郿平阳邬中。有雒客舍逆旅，吹笛为气出精列相和。融去京师，踰年，暂闻，甚悲而乐之。追慕王子渊枚乘刘伯康傅武仲等箫琴笙颂，唯笛独无，故聊复备数，作〈长笛赋〉。唐·李善注引《汉书》：「右扶风有郿县。平阳邬，聚邑之名也。京师，谓洛阳也。」…</blockquote>
<h2>别名</h2><p>平阳曲、平阳笛、有客高卧平阳坞</p>
<h2>用它的诗</h2>
<p>大 · 周邦彦 <span class="verse">「未怪平阳客」</span></p>
