<h1>论心论相</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《荀子·非相篇》</p><blockquote>相人，古之人无有也，学者不道也。古者有姑布子卿，今之世梁有唐举，相人之形状颜色，而知其吉凶妖祥，世俗称之。古之人无有也，学者不道也。故相形不如论心，论心不如择术；形不胜心，心不胜术；术正而心顺之，则形相虽恶而心术善，无害为君子也。形相虽善而心术恶，无害为小人也。君子之谓吉，小人之谓凶。故长短小大，善恶形相，非吉凶也。古之人无有也，学者不道也。…</blockquote>
