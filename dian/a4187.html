<h1>珊瑚枝</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《世说新语》</p><blockquote>石崇与王恺争豪，并穷绮丽，以饰舆服。武帝，恺之甥也，每助恺。尝以一珊瑚树，高二尺许赐恺。枝柯扶疏，世罕其比。恺以示崇。崇视讫，以铁如意击之，应手而碎。恺既惋惜，又以为疾己之宝，声色甚厉。崇曰：「不足恨，今还卿。」乃命左右悉取珊瑚树，有三尺四尺，条干绝世，光彩溢目者六七枚，如恺许比甚众。恺惘然自失。…</blockquote>
<h2>别名</h2><p>击珊瑚、珊瑚碎、击碎珊瑚、齐奴珊瑚、珊瑚敲碎、击碎珊瑚玉、石崇</p>
