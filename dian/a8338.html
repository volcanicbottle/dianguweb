<h1>误置代籍</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>太后出宫人以赐诸王各五人，窦姬与在行中。家在清河，愿如赵，近家，请其主遣宦者吏「必置我籍赵之伍乃」。宦者忘之，误置籍代伍中。籍奏，诏可。当行，窦姬涕泣，怨其宦者，不欲往，相彊乃肯行。至代，代王独幸窦姬，生女嫖。孝惠七年，生景帝。代王王后生四男，先代王未入立为帝而王后卒，及代王为帝后，王后所生四男更病死。文帝立数月，公卿请立太子，而窦姬男最长，立为太子。窦姬为皇后，女为馆陶长公主。明年，封少子武为代王，后徙梁，是为梁孝王。……窦皇后疾，失…</blockquote>
<h2>别名</h2><p>窦姬</p>
<h2>用它的诗</h2>
<p>杜秋娘诗 · 杜牧 <span class="verse">「误置代籍中」</span></p>
