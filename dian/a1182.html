<h1>心如死灰</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子》</p><blockquote>南郭子綦隐机而坐，仰天而嘘，荅焉似丧其耦。颜成子游立侍乎前，曰：「何居乎？形固可使如槁木，而心固可使如死灰乎？今之隐机者，非昔之隐机者也。」晋·郭象注：「死灰槁木，取其寂寞无情耳。夫任自然而忘是非者，其体中独任天真而已，又何所有哉！故止若立枯木，动若运槁枝，坐若死灰，行若游尘。动止之容，吾所不能一也；其于无心而自得，吾所不能二也。」…</blockquote>
<h2>别名</h2><p>死灰、灰无焰、不然灰、灰心、心灰、南郭子</p>
<h2>用它的诗</h2>
<p>詶杨司业巨源见寄 · 刘禹锡 <span class="verse">「其如心似不然灰」</span></p>
