<h2>出处</h2><p>旧题周·尹文《尹文子·大道上》</p><blockquote>齐有黄公者，好谦卑。有二女，皆国色。以其美也，常谦辞毁之，以为丑恶。丑恶之名远布，年过而一国无聘者。卫有鳏夫，时冒娶之，果国色。然后曰：「黄公好谦，故毁其子不姝美。」…</blockquote>
