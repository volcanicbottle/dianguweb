<h2>出处</h2><p>《史记》</p><blockquote>司马穰苴者，田完之苗裔也。齐景公时，晋伐阿、甄，而燕侵河上，齐师败绩。景公患之。晏婴乃荐田穰苴曰：「穰苴虽田氏庶，然其人文能附众，武能威敌，愿君试之。」景公召穰苴，与语兵事，大说之，以为将军，将兵捍燕晋之师。穰苴曰：「臣素卑贱，君擢之闾伍之中，加之大夫之上，士卒未附，百姓不信，人微权轻，愿得君之宠臣，国之所尊，以监军，乃可。」于是景公许之，使庄贾往。穰苴既辞，与庄贾约曰：「旦日日中会于军门。」穰苴先驰至军，立表下漏[六]待贾。贾素骄贵…</blockquote>
