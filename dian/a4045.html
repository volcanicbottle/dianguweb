<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《孔子家语》</p><blockquote>孔子见罗雀者所得，皆黄口小雀。夫子问之曰：「大雀独不得，何也？」罗者曰：「大雀善惊而难得，黄口贪食而易得。黄口从大雀则不得，大雀从黄口亦不得。」孔子顾谓弟子曰：「善惊以远害，利食而忘患，自其心矣，而以所从为祸福。故君子慎其所从，以长者之虑，则有全身之阶，随小者之戆，而有危亡之败也。」…</blockquote>
