<h1>龙眠能画</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《容斋随笔·容斋四笔》</p><blockquote>陈正敏遁斋閒览：「梁灏八十二岁，雍熙二年状元及第。其谢启云：『白首穷经，少伏生之八岁；青云得路，多太公之二年。』后终秘书监，卒年九十馀。」此语既著，士大夫亦以为口实。予以国史考之，梁公字太素，雍熙二年，廷试甲科，景德元年，以翰林学士知开封府，暴疾卒，年四十二。子固亦进士甲科，至直史馆，卒年三十三。史臣谓：「梁方当委遇，中途夭谢。」又云：「梁之秀颖，中道而摧。」明白如此，遁斋之妄不待攻也。…</blockquote>
