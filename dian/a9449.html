<h1>元戎十乘</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《毛诗正义》</p><blockquote>六月栖栖，戎车既饬。四牡骙骙，载是常服。猃狁孔炽，我是用急。王于出征，以匡王国。比物四骊，闲之维则。维此六月，既成我服。我服既成，于三十里。王于出征，以佐天子。四牡脩广，其大有颙。薄伐猃狁，以奏肤公。有严有翼，共武之服。共武之服，以定王国。猃狁匪茹，整居焦穫。侵镐及方，至于泾阳。织文鸟章，白?央央。元戎十乘，以先启行。戎车既安，如轾如轩。四牡既佶，既佶且闲。薄伐猃狁，至于大原。文武吉甫，万邦为宪。吉甫燕喜，既多受祉。来归自镐，我行永久。…</blockquote>
