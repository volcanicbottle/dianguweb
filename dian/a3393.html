<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>「杨震字伯起，弘农华阴人也。」「震少好学，受欧阳尚书于太常桓郁，明经博览，无不穷究。诸儒为之语曰：『关西孔子杨伯起。』常客居于湖，不荅州郡礼命数十年，人谓之晚暮，而震志愈笃。」…</blockquote>
<h2>别名</h2><p>关西杨伯起、杨震（字伯起）</p>
