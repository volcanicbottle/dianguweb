<h1>橘井</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《神仙传》</p><blockquote>苏仙公者，桂阳人也，汉文帝时得道。先生早丧所怙，乡中以仁孝闻……乃跪白母，曰：「某受命当仙，被召有期，仪卫已至，当违春色，即便拜辞。」……先生曰：「明年天下疫疾，庭中井水，檐边桔树，可以代养。井水一升桔叶一枚，可疗……」……来年果有疾疫，远近悉求母疗之，皆以水及桔叶，无不愈者。…</blockquote>
<h2>别名</h2><p>苏耽井、桔井、苏耽宅、苏仙橘井、苏耽</p>
<h2>用它的诗</h2>
<p>八哀诗 故右仆射相国张公九齢 · 杜甫 <span class="verse">「痛迫苏耽井」</span></p>
<p>出郴山口至叠石湾野人室中寄张十一 · 王昌龄 <span class="verse">「昨临苏耽井」</span></p>
<p>奉赠张荆州 · 王昌龄 <span class="verse">「苏耽宅中意遥缄」</span></p>
