<h1>漱流枕石</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《宋书》</p><blockquote>〈秋胡行〉：晨上散关山，此道当何难！晨上散关山，此道当何难！牛顿不起，车堕谷间。坐磐石之上，弹五弦之琴，作为清角韵，意中述烦。歌以言志，晨上散关山。一解有何三老公，卒来在我傍。有何三老公，卒来在我傍。员掩被裘，似非恒人。谓卿云何，困苦以自怨，徨徨所欲，来到此间。歌以言志，有何三老公。二解我居昆仑山，所谓者真人。我居昆仑山，所谓者真人。道深有可得。名山历观，遨游八极。枕石漱流饮泉。沈吟不决，遂上升天。歌以言志，我居昆仑山。三解去去不可追，…</blockquote>
