<h2>出处</h2><p>《昭明文选》</p><blockquote>夫忠直之迕于主，独立之负于俗，理势然也。故木秀于林，风必摧之；堆出于岸，流必湍之；行高于人，众必非之。前监不远，覆车继轨。然而志士仁人，犹蹈之而弗悔，操之而弗失，何哉？将以遂志而成名也。…</blockquote>
