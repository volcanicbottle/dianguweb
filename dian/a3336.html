<h1>鼓车</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>鼓车：指大材小用。唐杜甫《送从弟亚赴安西判官》：“吾闻驾鼓车，不合用骐骥。”</p>
<h2>出处</h2><p>《后汉书》</p><blockquote>建武十三年，异国有献名马者，日行千里，又进宝剑，贾兼百金，诏以马驾鼓车，剑赐骑士。…</blockquote>
<h2>别名</h2><p>驾鼓车、刘秀（汉光武帝）</p>
<h2>用它的诗</h2>
<p>送从弟亚赴安西判官 · 杜甫 <span class="verse">「吾闻驾鼓车」</span></p>
<p>复愁十二首 八 · 杜甫 <span class="verse">「先宜驾鼓车」</span></p>
