<h1>垂帷</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>下帷：喻指专心读书。唐李白《行行且游猎篇》：“儒生不及游侠人，白首下帷复何益。”</p>
<h2>出处</h2><p>《汉书》</p><blockquote>「董仲舒，广川人也。少治春秋，孝景时为博士。下帷讲诵，弟子传以久次相授业，或莫见其面。盖三年不窥园，其精如此。进退容止，非礼不行，学士皆师尊之。」唐·颜师古注：「虽有园圃，不窥视之，言专学也。」…</blockquote>
<h2>别名</h2><p>董帷、董生帷、下书帷、董子帷、仲舒帷、董生下帷、下帷人、舒帷、仲舒不窥园、仲舒园、不知门外有园蔬、窥园、下帷、闭户、绝窥园、三年不窥园树、董仲舒</p>
<h2>用它的诗</h2>
<p>和董庶中古散调词赠尹果毅 · 刘禹锡 <span class="verse">「长吟下书帷」</span></p>
