<h1>伛偻丈人</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子》</p><blockquote>「仲尼适楚，出于林中，见痀偻者承蜩，犹掇之也。仲尼曰：『子巧乎？有道邪？』曰：『我有道也。五六月累丸，二而不坠，则失者锱铢；累三而不坠，则失者十一；累五而不坠，犹掇之也。吾处身也若厥株拘，吾执臂也若槁木之枝，虽天地之大，万物之多，而唯蜩翼之知。吾不反不侧，不以万物易蜩之翼，何为而不得！』孔子顾谓弟子曰：『用志不分，乃凝于神，其痀偻丈人之谓乎！』」…</blockquote>
