<h2>出处</h2><p>《全唐诗》</p><blockquote>佳人绝代歌，独立发皓齿。满堂惨不乐，响下清虚里【响下浮云里】。江城带素月，况乃清夜起。老夫悲暮年，壮士泪如水。玉杯久寂寞，金管迷宫徵。勿云听者疲，愚智心尽死。古来杰出士【古来杰出事】，岂待一知己【岂特一知己】。吾闻昔秦青，倾侧天下耳【倾倒天下耳】。…</blockquote>
