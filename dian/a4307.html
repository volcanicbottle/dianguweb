<h1>佳人锦瑟</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>城上春云覆苑墙，江亭晚色静年芳【江亭晚色静天芳】。林花著雨燕脂落【林花著雨燕脂湿】，水荇牵风翠带长。龙武新军深驻辇【龙武新军经驻辇】，芙蓉别殿谩焚香。何时诏此金钱会【何时重此金钱会】，暂醉佳人锦瑟旁【案：钱谦益曰。此亦怀上皇南内之诗也。玄宗用万骑军以平韦氏。改为龙武军。亲近宿卫。于兴庆宫南楼。每置酒眺望。必由夹城以达曲江芙蓉苑。今深居南内。昔日之驻辇游幸。皆不可得。金钱之会。亦无复开元之盛矣。】【烂醉佳人锦瑟旁】。…</blockquote>
<h2>别名</h2><p>锦瑟旁边醉、雨滴花腮胭脂落</p>
<h2>用它的诗</h2>
<p>曲江对雨 · 杜甫 <span class="verse">「暂醉佳人锦瑟旁」</span></p>
