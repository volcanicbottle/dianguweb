<h2>出处</h2><p>《昭明文选》</p><blockquote>「少加孤露，母兄见骄，不涉经学。性复疏懒，筋驽肉缓，头面常一月十五日不洗，不大闷痒，不能沐也。每常小便，而忍不起，令胞中略转乃起耳。」…</blockquote>
