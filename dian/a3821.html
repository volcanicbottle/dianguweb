<h1>猴雕刺</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《韩非子》</p><blockquote>宋人有请为燕王以棘刺之端为母猴者，必三月斋然后能观之，燕王因以三乘养之。右御、治工言王曰：「臣闻人主无十日不燕之斋。今知王不能久斋以观无用之器也，故以三月为期。凡刻削者，以其所以削必小。今臣治人也，无以为之削，此不然物也，王必察之。」王因囚而问之，果妄，乃杀之。治人谓王曰：「计无度量，言谈之士多棘刺之说也。」…</blockquote>
