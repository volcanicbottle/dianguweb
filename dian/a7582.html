<h1>泰伯让</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>吴太伯，太伯弟仲雍，皆周太王之子，而王季历之兄也。季历贤，而有圣子昌，太王欲立季历以及昌，于是太佰、仲雍二人乃奔荆蛮，文身断发，示不可用，以避季历。季历果立，是为王季，而昌为文王。太伯之奔荆蛮，自号句吴。荆蛮义之，从而归之千馀家，立为吴太伯。……太史公曰：孔子言「太伯可谓至德矣，三以天下让，民无得而称焉」。…</blockquote>
<h2>别名</h2><p>太伯</p>
<h2>用它的诗</h2>
<p>叙旧赠江阳宰陆调 · 李白 <span class="verse">「泰伯让天下」</span></p>
