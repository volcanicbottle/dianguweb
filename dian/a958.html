<h1>刘碧玉</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《乐府诗集》</p><blockquote>其一：「碧玉破瓜时，相为情颠倒。感郎不羞赧，回身就郎抱。」其二：「碧玉小家女，不敢攀贵德。感郎千金意，惭无倾城色。」其三：「碧玉小家女，不敢贵德攀。感郎意气重，遂得结金兰。」题解引《乐苑》：《碧玉歌》者，宋汝南王所作也。碧玉，汝南王妾名。以宠爱之甚，所以歌之。…</blockquote>
<h2>别名</h2><p>小家碧玉、碧玉、汝南王</p>
<h2>用它的诗</h2>
<p>洛阳女儿行 · 王维 <span class="verse">「自怜碧玉亲教舞」</span></p>
