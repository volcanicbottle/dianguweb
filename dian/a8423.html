<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《杜诗详注》</p><blockquote>《神仙传》：「老子生而能言，指李树曰：以此为我姓。」《老子内传》：「太上老君，姓李名耳，字伯阳，其母见日精下落如流星，飞入口中，因有娠。七十二岁，于陈涡水李树下，剖左掖而生。」《述异记》：「中山有缥李大如拳者，呼为仙李。」又云：「濑乡老子祠有红缥李，一李二色。」唐太宗（李世民）《老子庙》诗：「盘根古树底。」…</blockquote>
