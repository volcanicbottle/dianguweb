<h2>出处</h2><p>《庄子集释》</p><blockquote>郑有神巫曰季咸，知人之死生存亡，祸福寿天，期以岁月旬日，若神。郑人见之，皆弃而走。列子见之而心醉，归，以告壶子，曰：「始吾以夫子之道为至矣，则又有至焉者矣。」壶子曰：「吾与汝既其文，未既其实，而固得道与？」众雌而无雄，而又奚卵焉！而以道与世亢必信，夫故使人得而相女。尝试与来，以予示之。」明日，列子与之见壶子。出而谓列子曰：「嘻！子之先生死矣，弗活矣，不以旬数矣！吾见怪焉，见湿灰焉。」列子入，泣涕沾襟，以告壶子。壶子曰：「乡吾示之以地文，…</blockquote>
