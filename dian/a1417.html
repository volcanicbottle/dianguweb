<h1>禅云亭</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>秦缪公即位九年，齐桓公既霸，会诸侯于葵丘，而欲封禅。管仲曰：「古者封泰山禅梁父者七十二家，而夷吾所记者十有二焉。昔无怀氏封泰山，禅云云；虙羲封泰山，禅云云；神农封泰山，禅云云；炎帝封泰山，禅云云；黄帝封泰山，禅亭亭；颛顼封泰山，禅云云；帝封泰山，禅云云；尧封泰山，禅云云；舜封泰山，禅云云；禹封泰山，禅会稽；汤封泰山，禅云云；周成王封泰山，禅社首：皆受命然后得封禅。」…</blockquote>
