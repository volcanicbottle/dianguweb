<h1>浔阳江上泪</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>浔阳江上泪：白居易《琵琶行》，“浔阳江头夜送客，枫叶荻花秋瑟瑟。……坐中泣下谁最多，江州司马青衫湿。”此用其意。浔阳江，指流经江西境内的一段长江。</p>
<h2>出处</h2><p>《琵琶行》</p><blockquote>浔阳江上泪：白居易《琵琶行》，“浔阳江头夜送客，枫叶荻花秋瑟瑟。……坐中泣下谁最多，江州司马青衫湿。”此用其意。浔阳江，指流经江西境内的一段长江。…</blockquote>
