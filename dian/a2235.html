<h1>稻粱谋</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>高标跨苍天【高标跨苍穹】，烈风无时休。自非旷士怀【自非壮士怀】，登兹翻百忧。方知象教力，足可追冥搜【立可追冥搜】。仰穿龙蛇窟，始出枝撑幽【始惊枝撑幽】。七星在北户【七星在户北】，河汉声西流。羲和鞭白日，少昊行清秋。秦山忽破碎【泰山忽破碎】，泾渭不可求。俯视但一气，焉能辨皇州。回首叫虞舜，苍梧云正愁。惜哉瑶池饮【惜哉瑶池燕】，日宴昆崙丘。黄鹄去不息，哀鸣何所投。君看随阳雁，各有稻粱谋。…</blockquote>
<h2>别名</h2><p>回首叫虞舜、舜</p>
