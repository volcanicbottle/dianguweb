<h1>宋玉田</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《古文苑》</p><blockquote>楚襄王既登阳云之台，令诸大夫景差、唐勒、宋玉等并造《大言赋》，赋毕而宋玉受赏。王曰：「……贤人有能为《小言赋》者，赐之云梦之田。……」……宋玉曰：「无内之中，微物潜生，比之无象，言之无名，蒙蒙灭景，昧昧遗形，超于大虚之域，出于未兆之庭，纤于毳末之微蔑，陋于茸毛之方生，视之则眇眇，望之则冥冥，离朱为之叹闷，神明不能察其情，二子之言磊磊皆不小，何如此之为精。」王曰：「善，赐以云梦之田。」…</blockquote>
<h2>别名</h2><p>宋玉</p>
