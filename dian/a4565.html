<h1>金风玉露</h1>
<p class="meta">典故 · 4 首诗使用</p>
<h2>释义</h2><p>金风玉露一相逢：指七夕相会事。金风玉露，秋天的气候。诗赋家多把金风和玉露并用，如李世民《秋日》诗：“菊散金风起，荷疏玉露圆。”</p>
<h2>出处</h2><p>《全唐诗》</p><blockquote>恐是仙家好别离，故教迢递作佳期。由来碧落银河畔，可要金风玉露时。清漏渐移相望久，微云未接过来迟。岂能无意酬乌鹊，惟与蜘蛛乞巧丝。…</blockquote>
<h2>别名</h2><p>玉露金风、露玉风金、金风玉露一相逢</p>
<h2>用它的诗</h2>
<p>鹊桥仙 · 秦观 <span class="verse">「金风玉露一相逢」</span></p>
<p>辛未七夕 · 李商隐 <span class="verse">「可要金风玉露时」</span></p>
<p>长生乐 · 晏殊 <span class="verse">「玉露金风月正圆」</span></p>
<p>宴清都 · 吴文英 <span class="verse">「对玉露金风送晚」</span></p>
