<h1>风月今夕</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《南史》</p><blockquote>六年，除给事中、五兵尚书，迁吏部尚书。勉居选官，彝伦有序。既闲尺牍，兼善辞令，虽文案填积，坐客充满，应对如流，手不停笔。又该综百氏，皆避其讳。尝与门人夜集，客有虞皓求詹事五官。勉正色答云：「今夕止可谈风月，不宜及公事。」故时人服其无私。天监初，官名互有省置，勉撰立选簿奏之，有诏施用。其制开九品为十八班，自是贪冒苟进者以财货取通，守道沦退者以贫寒见没矣。…</blockquote>

<h2>用它的诗</h2>
<p>念奴娇 · 辛弃疾 <span class="verse">「莫孤风月今夕」</span></p>
