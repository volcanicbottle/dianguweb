<h1>明年谁健</h1>
<p class="meta">典故 · 4 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>老去悲秋强自宽，兴来今日尽君欢【兴来终日尽君欢】。羞将短发还吹帽，笑倩旁人为正冠。蓝水远从千涧落，玉山高并两峰寒。明年此会知谁健【明年此会知谁在】，醉把茱萸子细看【再把茱萸子细看】。…</blockquote>
<h2>别名</h2><p>细把茱萸看、此会明年谁健、今年身健、明年虽健、醉把茱萸仔细看、两峰倚高寒、茱萸仔细重看</p>
