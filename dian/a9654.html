<h1>章台献颖</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐文》</p><blockquote>毛颖者，中山人也。其先明视，视佐禹治东方土，养万物有功，因封于卯地，死为十二神。尝曰：「吾子孙神明之后，不可与物同，当吐而生。」已而果然。明视八世孙需兔世传当殷时居中山，得神仙之术，能匿光使物，窃姮娥、骑蟾蜍入月，其后代遂隐不仕云。居东郭者曰皴，狡而善走，与韩卢争能，卢不及，卢怒，与宋鹊谋而杀之，醢其家。秦始皇时，蒙将军恬南伐楚，次中山，将大猎以惧楚，召左右庶长与军尉，以连山筮之，得天与人文之兆，筮者贺曰：「今日之获，不角不牙，衣褐之徒…</blockquote>
