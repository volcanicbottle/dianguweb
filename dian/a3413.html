<h1>凝碧池</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《明皇杂录》</p><blockquote>天宝末，群贼陷两京，大掠文武朝臣及黄门宫嫔乐工骑士，每获数百人，以兵仗严卫送于洛阳。……禄山尤致意乐工，求访颇切，于旬日获梨园弟子数百人。群贼因相与大会于凝碧池，宴伪官数十人，大陈御库珍宝，罗列前后。乐既作，梨园旧人不觉歔欷，相对泣下。群逆皆露刃持满以胁之，而悲不能已。有乐工雷海清者，投乐器于地，西向恸哭，逆党乃缚海清于戏马殿，支解以示众，闻之者莫不伤痛。王维时为贼拘于菩提寺中，闻之赋诗曰：「……」…</blockquote>
<h2>别名</h2><p>管弦凝碧池、王维</p>
