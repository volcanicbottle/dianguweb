<h1>燕寝凝香</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>兵卫森画戟，宴寝凝清香。海上风雨至，逍遥池阁凉。烦痾近消散【烦痾正消散】，嘉宾复满堂。自惭居处崇，未睹斯民康。理会是非遣，性达形迹忘。鲜肥属时禁，蔬果幸见尝。俯饮一杯酒，仰聆金玉章。神欢体自轻，意欲凌风翔【意欲凌云翔】。吴中盛文史，群彦今汪洋。方知大藩地【方知大藩盛】，岂曰财赋疆【岂曰财赋彊】。…</blockquote>
<h2>别名</h2><p>燕寝香凝、清香画戟、清香燕寝、宴寝凝香、凝香之乐、风清画戟、清香凝夜宴、燕寝香润、燕香清袅</p>
