<h1>轻尺璧</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《淮南子》</p><blockquote>夫日回而月周，时不与人游，故圣人不贵尺之璧，而重寸之阴，时难得而易失也。禹之趋时也，履遗而弗取，冠挂而弗顾，非争其先也，而争其得时也。是故圣人守清道而抱雌节，因循应变，常后而不先。…</blockquote>
<h2>别名</h2><p>惜寸阴、重寸阴、尺璧寸阴、尺璧分光、寸晷尺璧、寸晷尺玉、寸阴</p>
<h2>用它的诗</h2>
<p>罢郡归洛阳闲居 · 刘禹锡 <span class="verse">「依前惜寸阴」</span></p>
