<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>王羲之曾任右军将军、会稽内史。「尝在蕺山见一老姥，持六角竹扇卖之。羲之书其扇，各为五字。姥初有愠色。因谓姥曰：『但言是王右军书，以求百钱邪。』姥如其言，人竞买之。」《白氏六帖》卷九：「王右军草书于团扇。」…</blockquote>
<h2>别名</h2><p>王羲之</p>
