<h2>出处</h2><p>《全唐诗》</p><blockquote>「金殿销香闭绮栊【金殿香销闭绮栊】【金殿香销闭绮笼】，玉壶传点咽铜龙【玉壶传响咽铜龙】。狂飙不惜萝阴薄，清露偏知桂叶浓。斑竹岭边无限泪，景阳宫里及时钟。岂知为雨为云处【岂知为雨为云意】，只有高唐十二峰。」清·冯浩笺注：「巫山十二峰，诗家习见。放翁《入蜀记》曰：『巫山峰峦上入霄汉，十二峰者不可悉见，惟神女峰最为纤丽奇峭，当即十二峰中之朝云也。」…</blockquote>
