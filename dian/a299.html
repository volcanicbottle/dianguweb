<h1>渥洼种</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>渥洼种：指骏马。唐李群玉《骆马》：“由来渥洼种，本是苍龙儿。”</p>
<h2>出处</h2><p>《史记》</p><blockquote>「又尝得神马渥洼水中，复次以为《太一之歌》。」南朝宋·裴骃《史记集解》：「李斐曰：『南阳新野有暴利长，当武帝时遭刑，屯田燉煌界。人数于此水旁见群野马中有奇异者，与凡马异，来饮此水旁。利长先为土人持勒靽于水旁，后马玩习久之，代土人持勒靽，收得其马，献之。欲神异此马，云从水中出。』」…</blockquote>

<h2>用它的诗</h2>
<p>水调歌头 · 辛弃疾 <span class="verse">「千里渥洼种」</span></p>
