<h1>曲突徙薪</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>徙薪：喻深谋远虑。唐李商隐《失题》：“拯溺休规步，防虞要徙薪。”</p>
<h2>出处</h2><p>《淮南子》</p><blockquote>圣人者，常治无患之患，故无患也。夫至巧不用剑，善闭者不用关楗。淳于髡之告失火者，此其类。汉·高诱注：「淳于髡齐人也，告其邻，突将失火，使曲突徙薪，邻人不从。后竟失火，言者不为功，救火者焦头烂额为上客。」…</blockquote>
<h2>别名</h2><p>焦头烂额、烂额焦头、谋曲突、移突、报赏焦头、焦烂客、烂额收功、曲突不见宾、曲突、曲突烂鹅、徙薪、徐福（西汉）</p>
<h2>用它的诗</h2>
<p>李给事中敏二首 一 · 杜牧 <span class="verse">「曲突徙薪人不会」</span></p>
