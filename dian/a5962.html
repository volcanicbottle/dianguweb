<h2>出处</h2><p>《史记》</p><blockquote>当是之时，东胡彊而月氏盛。匈奴单于曰头曼，头曼不胜秦，北徙。十馀年而蒙恬死，诸侯畔秦，中国扰乱，诸秦所徙适戍边者皆复去，于是匈奴得宽，复稍度河南与中国界于故塞。单于有太子名冒顿。后有所爱阏氏，生少子，而单于欲废冒顿而立少子，乃使冒顿质于月氏。冒顿既质于月氏，而头曼急击月氏。月氏欲杀冒顿，冒顿盗其善马，骑之亡归。头曼以为壮，令将万骑。冒顿乃作为鸣镝，习勒其骑射，令曰：「鸣镝所射而不悉射者，斩之。」行猎鸟兽，有不射鸣镝所射者，辄斩之。已而冒…</blockquote>
