<h1>沈李浮瓜</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>五月十八日，丕白：季重无恙。涂路虽局，官守有限，愿言之怀，良不可任。足下所治僻左，书问致简，益用增劳。每念昔日南皮之游，诚不可忘。既妙思六经，逍遥百氏；弹棋閒设，终以六博，高谈娱心，哀筝顺耳。驰骋北场，旅食南馆，浮甘瓜于清泉，沈朱李于寒水。白日既匿，继以朗月，同乘并载，以游后园，舆轮徐动，参从无声，清风夜起，悲笳微吟，乐往哀来，怆然伤怀。余顾而言，斯乐难常，足下之徒，咸以为然。今果分别，各在一方。元瑜长逝，化为异物，每一念至，何时可言！…</blockquote>
<h2>别名</h2><p>沉李</p>

<p>女冠子 · 柳永 <span class="verse">「沈李浮瓜忍轻诺」</span></p>
