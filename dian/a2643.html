<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《说苑》</p><blockquote>介子推行年十五而相荆，仲尼闻之，使人往视，还曰：「廊下有二十五俊士，堂上有二十五老人。」仲尼曰：「合二十五人之智，智于汤武；并二十五人之力，力于彭祖。以治天下，其固免矣乎！」…</blockquote>
<h2>别名</h2><p>介之推</p>
<h2>用它的诗</h2>
<p>赠潘侍御论钱少阳 · 李白 <span class="verse">「虽无二十五老者」</span></p>
