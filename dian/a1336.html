<h1>童子是苍蝇</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>「坚之将为赦也，与王猛、苻融密议于露堂，悉屏左右。坚亲为赦文，猛、融供进纸墨。有一大苍蝇入自间，鸣声甚大，集于笔端，驱而复来。俄而长安街巷市里人相告曰：『官今大赦。』有司以闻。坚惊谓融、猛曰：『禁中无耳属之理，事何从泄也？』于是敕外穷推之，咸言有一小人衣黑衣，大呼于市曰：『官今大赦。』须臾不见。坚叹曰：『其向苍蝇乎？声状非常，吾固恶之。』」…</blockquote>
<h2>别名</h2><p>蝇栖笔、苍蝇先知、苻坚</p>
<h2>用它的诗</h2>
<p>浙西李大夫述梦四十韵幷浙东元相公酬和斐然继声 · 刘禹锡 <span class="verse">「议赦蝇栖笔」</span></p>
