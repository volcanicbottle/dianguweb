<h1>射日弓</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>九日落：喻为民除害，或喻勇猛。唐杜甫《观公孙大娘弟子舞剑器行》：“[火霍]如羿射九日落，矫如群帝骖龙翔。”</p>
<h2>出处</h2><p>《楚辞补注》</p><blockquote>「羿焉彃日？乌焉解羽？」东汉·王逸注：「《淮南》言：尧时十日并出，草木焦枯，尧命羿仰射十日，中其九日，日中九乌皆死，堕其羽翼，故留其一日也。」…</blockquote>
<h2>别名</h2><p>射九乌留白日、十日、九轮烛照、羿落九乌、羿弓、九日落、羿射九日、九乌落、弯弓射乌、羿中九乌、射日落、夏羿弓、尧射十日、后羿</p>
<h2>用它的诗</h2>
<p>观公孙大娘弟子舞剑器行并序 · 杜甫 <span class="verse">「羿射九日」</span></p>
<p>杂歌谣辞 邺城童子谣 · 李贺 <span class="verse">「射日弓」</span></p>
