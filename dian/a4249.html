<h1>季伦家</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《世说新语》</p><blockquote>「石崇与王恺争豪，并穷绮丽，以饰舆服。」南朝·刘孝标注：「《续文章志》曰：『崇资产累巨万金，宅室舆马，僭拟王者。庖膳必穷水陆之珍。后房百数，皆曳纨绣，珥金翠，而丝竹之蓺，尽一世之选。筑榭开沼，殚极人巧。与贵戚羊琇、王恺之徒竞相高以侈靡，而崇为居最之首，琇等每愧羡，以为不及也。』」…</blockquote>
<h2>别名</h2><p>季伦园、季伦沼、石崇、金谷园</p>
