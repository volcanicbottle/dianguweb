<h1>乡关何处是</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>昔人已乘白云去【昔人已乘黄鹤去】，此地空馀黄鹤楼【兹地空馀黄鹤楼】【兹地空留黄鹤楼】【此地空留黄鹤楼】。黄鹤一去不复返，白云千载空悠悠。晴川历历汉阳树【晴川历历汉阳戍】，春草萋萋鹦鹉洲【芳草萋萋鹦鹉洲】【芳草青青鹦鹉洲】【春草青青鹦鹉洲】。日暮乡关何处是【日暮乡关何处在】，烟波江上使人愁。…</blockquote>
<h2>别名</h2><p>芳草晴川、骑黄鹤</p>
