<h1>锐头儿</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>晋·孔衍《春秋后语·赵语》</p><blockquote>平原君对赵王曰：「渑池之会，臣察武安君之为人也，小头而锐，瞳子白黑分明，视瞻不转。小头而锐，断敢行也。瞳子白黑分明，见事明也。视瞻不转，执志强也，可以持久，难与争锋，廉颇足以当之。」（据《汉学堂丛本》）…</blockquote>
<h2>别名</h2><p>锐头将军、白起（武安君）、赵胜（平原君）</p>
<h2>用它的诗</h2>
<p>久雨期王将军不至 · 杜甫 <span class="verse">「锐头将军来何迟」</span></p>
