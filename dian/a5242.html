<h1>廉叔度</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>廉叔度：喻指有佳政之太守。唐高适《真定即事奉赠韦使君二十八韵》：“郡称廉叔度，朝议管吏吾。”</p>
<h2>出处</h2><p>《后汉书》</p><blockquote>举茂才，数月，再迁为云中太守。……后频历武威、武都二郡太守，随俗化导，各得治宜。建初中，迁蜀郡太守，其俗尚文辩，好相持短长，范每厉以淳厚，不受偷薄之说。…</blockquote>
<h2>别名</h2><p>廉度、廉范、叔度歌</p>
<h2>用它的诗</h2>
<p>真定即事奉赠韦使君二十八韵 · 高适 <span class="verse">「郡称廉叔度」</span></p>
