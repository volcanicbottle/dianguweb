<h1>汉武帝开边(借汉喻唐)</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>武皇即汉武帝，以其连年用兵、开拓边疆、穷兵黩武，借指唐玄宗黩武开边，含讽刺意</p>
<h2>出处</h2><p>《汉书·武帝纪》</p><blockquote>武皇，汉武帝，他在历史上以开疆拓土著称。这里暗喻唐玄宗。钱谦益笺云：“唐人诗称明皇多云武皇。王昌龄‘白马金鞍从武皇’，韦应物‘少事武皇帝’，公亦云‘武帝旌旗在眼中’也。”白居易《长恨歌》也云：“汉皇重色思倾国。”开边意未已，含有讽黩武意。…</blockquote>
<h2>别名</h2><p>武皇</p>
<h2>用它的诗</h2>
<p>兵车行 · 杜甫 <span class="verse">「武皇开边意未已」</span></p>
