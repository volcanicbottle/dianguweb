<h1>良辰美景</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>建安末，余时在邺宫，朝游夕宴，究欢愉之极。天下良辰美景，赏心乐事，四者难并。今昆弟友朋，二三诸彦，共尽之矣。古来此娱，书籍未见，何者？楚襄王时有宋玉、唐景，梁孝王时有邹、枚、严、马，游者美矣，而其主不文；汉武帝徐乐诸才，备应对之能，而雄猜多忌，岂获晤言之适？不诬方将，庶必贤于今日尔。岁月如流，零落将尽，撰文怀人，感往增怆。…</blockquote>
<h2>别名</h2><p>岁月如流</p>
<h2>用它的诗</h2>
<p>客舍悲秋有怀两省旧游呈幕中诸公 · 岑参 <span class="verse">「人间岁月如流水」</span></p>
<p>雨中花・夜行船 · 欧阳修 <span class="verse">「良辰美景」</span></p>
<p>绮寮怨 · 周邦彦 <span class="verse">「念去来、岁月如流」</span></p>
