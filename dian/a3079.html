<h2>出处</h2><p>《昭明文选》</p><blockquote>归去来兮，请息交以绝游。世与我而相遗，复驾言兮焉求？悦亲戚之情话，乐琴书以消忧。农人告余以春兮，将有事乎西畴。或命巾车，或棹孤舟。既窈窕以寻壑，亦崎岖而经丘。木欣欣以向荣，泉涓涓而始流。善万物之得时，感吾生之行休！已矣乎！寓形宇内复几时，曷不委心任去留！胡为遑遑欲何之？富贵非吾愿，帝乡不可期。…</blockquote>
<h2>别名</h2><p>富贵非吾事</p>
