<h1>白龙鱼服</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>鱼服困：指落难，或运气不佳而遇到灾祸。清赵翼《淮阴钓台》：“与哙伍怜鱼服困，假齐王伏狗烹灾。”</p>
<h2>出处</h2><p>《艺文类聚》</p><blockquote>《说苑》曰：吴王欲从民饮酒。子胥谏曰：「不可。昔日白龙下清泠之渊，化为鱼，渔者豫且，射中其目，白龙上诉天帝。天帝曰：『当是之时，若安置而形。』对曰：『我化为鱼，固人之所射也。豫且何罪？今君弃万乘之位，而从布衣之士饮酒，臣恐有豫且之患。』王乃止。」…</blockquote>
<h2>别名</h2><p>豫且网、鱼服困、豫且困、豫且制、鱼服诉、豫且</p>
<h2>用它的诗</h2>
<p>杂曲歌辞 枯鱼过河泣 · 李白 <span class="verse">「偶被豫且制」</span></p>
