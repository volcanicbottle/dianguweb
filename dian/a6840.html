<h1>三寸舌</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>三寸舌：指能言善辩、能以言语胜人。唐于渍《南越谣》：“三寸陆贾舌，万里汉山川。”</p>
<h2>出处</h2><p>《史记》</p><blockquote>平原君已定从而归，归至于赵，曰：「胜不敢复相士。胜相士多者千人，寡者百数，自以为不失天下之士，今乃于毛先生而失之也。毛先生一至楚，而使赵重于九鼎大吕。毛先生以三寸之舌，彊于百万之师。胜不敢复相士。…</blockquote>
<h2>别名</h2><p>毛遂</p>
<h2>用它的诗</h2>
<p>笑歌行 · 李白 <span class="verse">「张仪所以只掉三寸舌」</span></p>
