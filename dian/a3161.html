<h1>鸿飞冥冥</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>汉·扬雄《法言·问明》</p><blockquote>或问「君子」。「在治曰若凤，在乱曰若凤。」或人不谕。曰：「未之思矣。」曰：「治则见，乱则隐。鸿飞冥冥，弋人何慕焉？鹪明遴集，食其絜者矣；凤鸟跄跄，匪尧之庭。」晋·李轨注：「君子潜神重玄之域，世网不能制御之。」…</blockquote>
<h2>别名</h2><p>冥冥避、弋者篡、弋者慕、弋慕鸿、高鸿避弋、歌鸿冥、鸿惊避弋、弋人空慕、高鸿、孤鸿避弋、鸿入冥冥、冥鸿</p>
