<h1>千骑</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>千骑拥高牙：古乐府《陌上桑》，“东方千余骑，夫婿居上头。”是说太守级的地方官随从千骑之多。高牙，军前大旗，借指高级官吏，这首词据说是柳永写给老朋友孙何的。孙何这时任两浙转运使，驻节杭州。高牙疑即指他。</p>
<h2>出处</h2><p>《陌上桑》</p><blockquote>千骑拥高牙：古乐府《陌上桑》，“东方千余骑，夫婿居上头。”是说太守级的地方官随从千骑之多。高牙，军前大旗，借指高级官吏，这首词据说是柳永写给老朋友孙何的。孙何这时任两浙转运使，驻节杭州。高牙疑即指他。…</blockquote>
<h2>别名</h2><p>千骑拥高牙</p>
