<h1>茂陵女</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>白头吟：喻心境哀伤幽怨。唐骆宾王《在狱咏蝉》；“那堪玄鬓影，来对白头吟。”</p>
<h2>出处</h2><p>旧题晋·葛洪《西京杂记》卷三</p><blockquote>司马相如将聘茂陵人女为妾。卓文君作《白头吟》以自绝。相如乃止。…</blockquote>
<h2>别名</h2><p>文君恨、文君与马卿、文君绝、文君白头句、卓文君、司马相如</p>
<h2>用它的诗</h2>
<p>相和歌辞 白头吟二首 一 · 李白 <span class="verse">「一朝将聘茂陵女」</span></p>
