<h1>报琼瑶</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《毛诗正义》</p><blockquote>投我以木瓜，报之以琼琚，匪报也，永以为好也。投我以木桃，报之以琼瑶，匪报也，永以为好也。投我以木李，报之以琼玖，匪报也，永以为好也。…</blockquote>
<h2>别名</h2><p>投琼、报琼瑰、桃李投、投桃李、赠桃李、报琼玉、木瓜报珍投、木李投君、琼琚报木瓜、无物报投瓜、瑶琼重、报木瓜投、报琼、报无瑶琼、木瓜、木李先琼玖、木桃、木桃报汝、琼玖先木李、投木桃报琼瑶、卫武公</p>
