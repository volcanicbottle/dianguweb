<h1>含鸡舌</h1>
<p class="meta">典故 · 3 首诗使用</p>
<h2>释义</h2><p>含香：指郎官。唐杜甫《西阁二首》之二：“不道合香贱，其如镊白体。”</p>
<h2>出处</h2><p>《汉官仪》</p><blockquote>尚书郎奏事明光殿，省中皆胡粉涂壁，其边以丹漆地，故曰丹墀。尚书郎含鸡舌香，伏其下奏事。（据《汉学堂丛书》本）…</blockquote>
<h2>别名</h2><p>汉署香、含香、鸡香、鸡舌</p>
<h2>用它的诗</h2>
<p>七月一日题终明府水楼二首 一 · 杜甫 <span class="verse">「不去非无汉署香」</span></p>
<p>朗州窦员外见示与澧州元郎中郡斋赠答长句二篇因以继和 · 刘禹锡 <span class="verse">「昨日同含鸡舌香」</span></p>
<p>行次昭应县道上送户部李郎中充昭义攻讨 · 李商隐 <span class="verse">「远含鸡舌过新丰」</span></p>
