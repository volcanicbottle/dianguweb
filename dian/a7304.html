<h1>瓮中天</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子集释》</p><blockquote>孔子出，以告颜回曰：「丘之于道也，其犹醯鸡与！微夫子之发吾覆也，吾不知天地之大全也。」唐·成玄英疏：「醯鸡，醋瓮中之蠛蠓，每遭物盖瓮头，故不见二仪也。亦犹仲尼遭圣迹蔽覆，不见事理，若无老子为发覆盖，则终身不知天地之大全，虚通之妙道也。」郭象注：「醯鸡者，醋瓮中之蠛蠓。」…</blockquote>
<h2>别名</h2><p>醯鸡瓮里、瓮中醯鸡、守瓮天、舞瓮天、醯鸡、醯鸡仰瓮口</p>
<h2>用它的诗</h2>
<p>有僧言罗浮事因为诗以写之 · 刘禹锡 <span class="verse">「醯鸡仰瓮口」</span></p>
