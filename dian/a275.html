<h1>客星</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《艺文类聚》</p><blockquote>《会稽典录》曰：严遵字子陵，与世祖俱受业长安。建武五年，下诏徵遵，设乐阳明殿。命宴会，暮留宿，遵以足荷上，其夜客星犯天子宿。明旦，太史以闻，上曰：「此无异也，昨夜与严子陵俱卧耳。」…</blockquote>
<h2>别名</h2><p>加帝腹、足加帝腹、犯帝坐、钓濑客星、犯星夜、汉光腹、骄同卧、踏帝腹、御榻星辰动、足加刘公腹、足加天子腹、足磨汉榻、共卧加腹、星辰凌帝坐、严光</p>
<h2>用它的诗</h2>
<p>寄岳州贾司马六丈巴州严八使君两阁老五十韵 · 杜甫 <span class="verse">「钓濑客星悬」</span></p>
