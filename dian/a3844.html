<h1>问绢</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《三国志》</p><blockquote>「子威嗣。六年，诏书褒述质清行，赐其家钱谷。语在徐邈传。威，咸熙中官至徐州刺史。」南朝宋·裴松之注引《晋阳秋》：「威字伯虎。少有志尚，厉操清白。质之为荆州也，威自京都省之。家贫，无车马童仆，威自驱驴单行，拜见父。停中十馀日，告归。临辞，质赐绢一疋。为道路粮。威跪曰：『大人清白，不审于何得此绢？」质曰：「是吾俸禄之馀，故以为汝粮耳。」威受之，辞归。』」…</blockquote>
<h2>别名</h2><p>胡威绢、胡威、胡质</p>
