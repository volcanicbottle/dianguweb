<h1>天香满袖</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>银烛熏天紫陌长【银烛朝天紫陌长】，禁城春色晓苍苍。千条弱柳垂青琐，百啭流莺绕建章【百啭流莺满建章】。剑佩声随玉墀步，衣冠身惹御炉香【衣冠身染御炉香】。共沐恩波凤池上【共沐恩波凤池里】，朝朝染翰侍君王。…</blockquote>
<h2>别名</h2><p>惹御香、朝衣染御香、满袖疑香雾、贾至</p>
<h2>用它的诗</h2>
<p>寄左省杜拾遗 · 岑参 <span class="verse">「惹御香」</span></p>
<p>南乡子 · 陆游 <span class="verse">「曾是朝衣染御香」</span></p>
