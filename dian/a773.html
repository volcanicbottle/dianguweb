<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>头玉硗硗眉刷翠，杜郎生得真男子。骨重神寒天庙器，一双瞳人剪秋水。竹马梢梢摇绿尾，银鸾睒【案：音闪。】光踏半臂。东家娇娘求对值，浓笑画空作唐字【浓笑书空作唐字】。眼大心雄知所以，莫忘作歌人姓李。…</blockquote>
<h2>别名</h2><p>秋波如剪、眼裁秋水、李贺</p>
<h2>用它的诗</h2>
<p>更漏子 · 晏殊 <span class="verse">「一寸秋波如剪」</span></p>
