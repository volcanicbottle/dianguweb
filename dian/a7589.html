<h1>谈何容易</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>又设非有先生之论，其辞曰：非有先生仕于吴，进不称往古以厉主意，退不能扬君美以显其功，默然无言者三年矣。吴王怪而问之，曰：「寡人获先人之功，寄于众贤之上，夙兴夜寐，未尝敢怠也。今先生率然高举，远集吴地，将以辅治寡人，诚窃嘉之，体不安席，食不甘味，目不视靡曼之色，耳不听钟鼓之音，虚心定志欲闻流议者三年于兹矣。今先生进无以辅治，退不扬主誉，窃不为先生取之也。盖怀能而不见，是不忠也；见而不行，主不明也。意者寡人殆不明乎？」非有先生伏而唯唯。吴王…</blockquote>
