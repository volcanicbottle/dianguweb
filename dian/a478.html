<h1>八斗才</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>八斗才：喻有才之人。唐李商隐《可叹》：“宓妃愁坐芝田馆，用尽陈王八斗才。”</p>
<h2>出处</h2><p>《释常谈》</p><blockquote>八斗之才：文章多，谓之八斗之才。谢灵运尝曰：「天下才有一石，曹子建独占八斗，我得一斗，天下共分一斗。」…</blockquote>
<h2>别名</h2><p>才论斗</p>
<h2>用它的诗</h2>
<p>可叹 · 李商隐 <span class="verse">「用尽陈王八斗才」</span></p>
