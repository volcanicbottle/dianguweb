<h1>八凯</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>「昔高阳氏有才子八人，世得其利，谓之『八恺』。高辛氏有才子八人，世谓之『八元』。此十六族者，世济其美，不陨其名。至于尧，尧未能举。舜举八恺，使主后土，以揆百事，莫不时序。举八元，使布五教于四方，父义，母慈，兄友，弟恭，子孝，内平外成。」唐·司马贞《史记索隐》：「谓元、恺各有亲族，故称族也。」…</blockquote>
<h2>别名</h2><p>舜、高辛氏、高阳氏、八族、高阳多夔龙、夔龙</p>
<h2>用它的诗</h2>
<p>同卢拾遗过韦给事东山别业二十韵给事首春休沐维已陪游及乎是行亦预闻命会无车马不果斯诺 · 王维 <span class="verse">「高阳多夔龙」</span></p>
