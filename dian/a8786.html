<h1>荀倩</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《三国志》</p><blockquote>南朝宋·裴松之注引《晋阳秋》：「粲字奉倩，粲诸兄并以儒术论议，而粲独好言道，常以为子贡称夫子之言性与天道，不可得闻，然则六籍虽存，固圣人之糠秕。粲兄俣难曰：『易亦云圣人立象以尽意，系辞焉以尽言，则微言胡为不可得而闻见哉？』粲答曰：『盖理之微者，非物象之所举也。今称立象以尽意，此非通于意外者也。系辞焉以尽言，此非言乎系表者也；斯则象外之意，系表之言，固蕴而不出矣。』及当时能言者不能屈也。又论父彧不如从兄攸。彧立德高整，轨仪以训物，而攸不治…</blockquote>
<h2>别名</h2><p>荀奉倩、荀粲</p>
<h2>用它的诗</h2>
<p>后园凿井歌 · 李贺 <span class="verse">「荀奉倩」</span></p>
