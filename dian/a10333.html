<h1>夕阳红尽处</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>回首夕阳红尽处两句：白居易《题岳阳楼》诗，“夕阳红处是长安。”长安，今陕西西安市，汉唐时代的京城，这里借指宋朝的汴京。</p>
<h2>出处</h2><p>《题岳阳楼》</p><blockquote>回首夕阳红尽处两句：白居易《题岳阳楼》诗，“夕阳红处是长安。”长安，今陕西西安市，汉唐时代的京城，这里借指宋朝的汴京。…</blockquote>
<h2>别名</h2><p>回首夕阳红尽处两句</p>
<h2>用它的诗</h2>
<p>卖花声 · 张舜民 <span class="verse">「回首夕阳红尽处应是长安」</span></p>
