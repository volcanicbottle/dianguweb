<h1>矍铄翁</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>「武威将军刘尚击武陵五溪蛮夷，深入，军没，援因复请行。时年六十二，帝悯其老，未许之。援自请曰；『臣尚能被甲上马。』帝令试之。援据鞍顾眄，以示可用。帝笑曰：『矍铄哉是翁也！』遂遣援率中郎将马武、耿舒、刘匡、孙永等，将十二郡募士及刑四万馀人征五溪。」唐·李贤注：「矍铄，勇貌也。」…</blockquote>
<h2>别名</h2><p>是翁矍铄、据鞍、盘马不甘老、马援</p>
<h2>用它的诗</h2>
<p>流夜郎半道承恩放还兼欣克复之美书怀示息秀才 · 李白 <span class="verse">「谁念矍铄翁」</span></p>
