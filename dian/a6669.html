<meta name="description" content="典故「鸲鹆舞」：谢尚字仁祖，豫章太守鲲之子也。幼有至性。……善音乐，博综众艺。司徒王导深器之，比之王戎，常呼为「小安丰」，辟为掾。袭父爵咸亭侯。始到府通谒，导以其有胜会，谓曰：「闻君能作鸲鹆舞，一坐倾想，宁有此理不？」尚曰：「佳。」便著衣帻而舞。导令坐者抚掌击节，尚俯仰在中，傍若无人，其率诣如此。">

<h1>鸲鹆舞</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>谢尚字仁祖，豫章太守鲲之子也。幼有至性。……善音乐，博综众艺。司徒王导深器之，比之王戎，常呼为「小安丰」，辟为掾。袭父爵咸亭侯。始到府通谒，导以其有胜会，谓曰：「闻君能作鸲鹆舞，一坐倾想，宁有此理不？」尚曰：「佳。」便著衣帻而舞。导令坐者抚掌击节，尚俯仰在中，傍若无人，其率诣如此。…</blockquote>
<h2>别名</h2><p>舞鸲鹆、谢尚</p>
