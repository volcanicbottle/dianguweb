<h2>出处</h2><p>《史记》</p><blockquote>太史公曰：汉兴，孝文施大德，天下怀安，至孝景，不复忧异姓，晁错刻削诸侯，遂使七国俱起，合从而西乡，以诸侯太盛，而错为之不以渐也。及主父偃言之，而诸侯以弱，卒以安。安危之机，岂不以谋哉？…</blockquote>
