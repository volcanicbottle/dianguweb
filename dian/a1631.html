<h1>龙蟠虎踞</h1>
<p class="meta">典故 · 4 首诗使用</p>

<h2>出处</h2><p>《太平御览》</p><blockquote>刘备曾使诸葛亮至京，因睹秣陵山阜，叹曰：「钟山龙盘，石头虎踞，此帝王之宅。」（据《太平御览》卷一五六引）…</blockquote>
<h2>别名</h2><p>虎踞龙蟠、龙盘虎踞、龙虎地、龙虎势、龙盘王气、金陵龙虎势、钟山龙盘、成龙成虎、势盘龙虎、虎踞、诸葛亮（字孔明）</p>
<h2>用它的诗</h2>

<p>永王东巡歌十一首 四 · 李白 <span class="verse">「龙蟠虎踞帝王州」</span></p>
