<h1>贵贱随时</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子集释》</p><blockquote>北海若曰：「以道观之，物无贵贱；以物观之，自贵而相贱；以俗观之，贵贱不在己。以差观之，因其所大而大之，则万物莫不大；因其所小而小之，则万物莫不小；知天地之为稊米也，知豪末之为丘山也，则差数睹矣。以功观之，因其所有而有之，则万物莫不有；因其所无而无之，则万物莫不无；知东西之相反而不可以相无，则功分定矣。以趣观之，因其所然而然之，则万物莫不然；因其所非而非之，则万物莫不非；知尧桀之自然而相非，则趣操睹矣。」…</blockquote>
