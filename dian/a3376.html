<h1>一字千金</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>千金字：喻妙文佳作。唐王维《上张令公》：“市阅千金字，朝闻五色书。”</p>
<h2>出处</h2><p>《史记》</p><blockquote>吕不韦乃使其客人人著所闻，集论以为八览、六论、十二纪，二十馀万言。以为备天地万物古今之事，号曰吕氏春秋。布咸阳市门，悬千金其上，延诸侯游士宾客有能增损一字者予千金。…</blockquote>
<h2>别名</h2><p>千金字、挂秦金、吕相金、吕不韦</p>
<h2>用它的诗</h2>
<p>上张令公 · 王维 <span class="verse">「市阅千金字」</span></p>
