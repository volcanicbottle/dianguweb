<h1>齐姬</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《古今注》</p><blockquote>牛享问曰：「蝉名齐女者何也？」答曰：「齐王后忿而死，尸变为蝉，登庭树，嘒唳而鸣，王悔恨。故世名蝉曰齐女也。」…</blockquote>
<h2>别名</h2><p>宫魂、怨齐王、故宫怨、宫魂断、齐鬓、齐蝉、惆怅齐姬、当时齐女、齐宫路杳、齐女、怨结齐姬、蝉怨齐王、齐宫魂消、齐后化蝉、齐庭遗恨、一襟余恨宫魂断</p>
