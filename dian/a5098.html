<h1>老当益壮</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>援年十二而孤，少有大志，诸兄奇之。尝受齐诗，意不能守章句，乃辞况，欲就边郡田牧。况曰：「汝大才，当晚成。良工不示人以朴，且从所好。」会况卒，援行服期年，不离墓所；敬事寡，不冠不入庐。后为郡督邮，送囚至司命府，囚有重罪，援哀而纵之，遂亡命北地。遇赦，因留牧畜，宾客多归附者，遂役属数百家。转游陇汉閒，常谓宾客曰：「丈夫为志，穷当益坚，老当益壮。」因处田牧，至有牛马羊数千头，谷数万斛。既而叹曰：「凡殖货财产，贵其能施赈也，否则守钱虏耳。」乃…</blockquote>
