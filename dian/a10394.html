<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>袜□金钗溜：急忙中来不及穿鞋，就穿着袜子在地上走；头上的金钗冷不防也滑脱了。李煜《浣溪沙》词：“佳人舞点金钗溜。”又《菩萨蛮》词：“□袜步香阶，手提金缕鞋。”</p>
