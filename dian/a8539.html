<h2>出处</h2><p>《全唐诗》</p><blockquote>斗鸡台下东西道，柳覆班骓蝶萦草。坱霭韶容锁澹愁，青筐叶尽蚕应老【青筐叶尽春蚕老】。绿渚幽香生白蘋【绿渚幽香注白蘋】，差差小浪吹鱼鳞。王孙骑马有归意【王孙骑马有归思】，林彩著空如细尘【林彩空中如细尘】。安得人生各相守【安得一生各相守】，烧船破栈休驰走【烧船破栈休狂走】。世上方应无别离【世上多应无别离】，路傍更长千株柳。…</blockquote>
