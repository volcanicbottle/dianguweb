<h1>司马相如琴挑卓文君</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>蜀琴指司马相如（蜀人）之琴，相如以琴奏《凤求凰》挑动卓文君；&#x27;鸳鸯弦&#x27;承此典，喻以琴诉男女相思之情</p>
<h2>出处</h2><p>《史记·司马相如列传》</p><blockquote>蜀琴句，旧注谓蜀琴与司马相如琴挑故事有关。按，鲍照有“蜀琴抽白雪”句。白居易也有“蜀琴安膝上，《周易》在床头”句。李贺“吴丝蜀桐张高秋”，王琦注云：“蜀中桐木宜为乐器，故曰蜀桐。”蜀桐实即蜀琴。似古人诗中常以蜀琴喻佳琴，恐与司马相如、卓文君事无关。鸳鸯弦也只是为了强对凤凰柱。…</blockquote>
<h2>别名</h2><p>蜀琴句</p>
<h2>用它的诗</h2>
<p>长相思二首（其2） · 李白 <span class="verse">「蜀琴欲奏鸳鸯弦」</span></p>
