<h1>堕马妆</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>弘农人宰宣素性佞邪，欲取媚于冀，乃上言大将军有周公之功，今既封诸子，则其妻宜为邑君。诏遂封冀妻孙寿为襄城君，兼食阳翟租，岁入五千万，加赐赤绂，比长公主。寿色美而善为妖态，作愁眉，啼妆，墯马髻，折腰步，龋齿笑，以为媚惑。冀亦改易舆服之制，作平上軿车，埤帻，狭冠，折上巾，拥身扇，狐尾单衣。寿性钳忌，能制御冀，冀甚宠惮之。…</blockquote>
<h2>别名</h2><p>堕髻、折腰行、梁家黛、孙眉、孙寿愁眉、龋齿孙娘、啼妆、妆浅休啼脸、孙寿妖态、孙寿眉、折步、孙寿折腰、梁冀、孙寿</p>
<h2>用它的诗</h2>
<p>多丽 · 李清照 <span class="verse">「也不似、孙寿愁眉」</span></p>
