<h1>飞箭无全目</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>飞箭（一作“飞雀”）无全目，鲍照《拟古诗》：“惊雀无全目。”李善注引《帝王世纪》：吴贺使羿射雀，贺要羿射雀左目，却误中右目。这里只是强调羿能使雀双目不全，于此见其射艺之精。</p>
<h2>出处</h2><p>《拟古诗》</p><blockquote>飞箭（一作“飞雀”）无全目，鲍照《拟古诗》：“惊雀无全目。”李善注引《帝王世纪》：吴贺使羿射雀，贺要羿射雀左目，却误中右目。这里只是强调羿能使雀双目不全，于此见其射艺之精。…</blockquote>
<h2>别名</h2><p>飞箭（一作“飞雀”）无全目</p>
<h2>用它的诗</h2>
<p>老将行 · 王维 <span class="verse">「昔时飞箭无全目」</span></p>
