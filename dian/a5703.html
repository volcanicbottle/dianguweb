<h1>罗含宅里香</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>罗含菊：咏菊，或喻花主德行高尚。唐李商隐《寄太原卢司空三十韵》：“罗含黄菊宅，柳挥白蘋汀。”</p>
<h2>出处</h2><p>《晋书》</p><blockquote>累迁散骑常侍、侍中，仍转廷尉、长沙相。年老致仕，加中散大夫，门施行马。初，含在官舍，有一白雀栖集堂宇，及致仕还家，阶庭忽兰菊丛生，以为德行之感焉。…</blockquote>
<h2>别名</h2><p>罗含菊、罗含</p>
<h2>用它的诗</h2>
<p>菊 · 李商隐 <span class="verse">「罗含宅里香」</span></p>
