<h1>新亭堕泪</h1>
<p class="meta">典故 · 3 首诗使用</p>
<h2>释义</h2><p>新亭堕泪：见前194页辛弃疾《水龙吟》注。</p>
<h2>出处</h2><p>《水龙吟》</p><blockquote>多少新亭挥泪客两句：指责当时士大夫对国事只会痛哭感叹，谁都没有真正重视中原那一大块土地。新亭，见前194页辛弃疾《水龙吟》注。谁梦，谁思量。…</blockquote>
<h2>别名</h2><p>多少新亭挥泪客两句、新亭挥泪客、芳景犹自如故</p>
<h2>用它的诗</h2>
<p>贺新郎 · 刘克庄 <span class="verse">「多少新亭挥泪客谁梦中原块土」</span></p>

<p>永遇乐 · 刘辰翁 <span class="verse">「芳景犹自如故」</span></p>
