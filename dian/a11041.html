<h1>万里犹比邻</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>化用曹植《赠白马王彪》「丈夫志四海，万里犹比邻」，谓知己相契，虽远隔天涯亦如近邻。</p>
<h2>出处</h2><p>曹植《赠白马王彪》</p><blockquote>海内两句，意谓得一知己，千里同心（俞陛云《诗境浅说》语）。天涯，指极远的地方。比邻，近邻。唐人习用语。杜甫《兵车行》：“生女犹得嫁比邻。”唐制，四家为邻。…</blockquote>
<h2>别名</h2><p>海内两句</p>
<h2>用它的诗</h2>
<p>杜少府之任蜀州 · 王勃 <span class="verse">「天涯若比邻」</span></p>
