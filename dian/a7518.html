<h1>碎玉斗</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>张良入谢，曰：「沛公不胜杯杓，不能辞。谨使臣良奉白璧一双，再拜献大王足下；玉斗一双，再拜奉大将军足下。」项王曰：「沛公安在？」良曰︰「闻大王有意督过之，脱身独去，已至军矣。」项王则受璧，置之坐上。亚父受玉斗，置之地，拔剑撞而破之，曰：「唉！竖子不足与谋。夺项王天下者，必沛公也，吾属今为之虏矣。」沛公至军，立诛杀曹无伤。…</blockquote>
<h2>别名</h2><p>亚父玉斗、掷地玉斗、刘邦（汉高祖）、张良、范增、项羽</p>
<h2>用它的诗</h2>
<p>久雨期王将军不至 · 杜甫 <span class="verse">「忆昔范增碎玉斗」</span></p>
