<h1>断红湿歌纨金缕</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>断红湿句：惜别的红泪沾湿了歌扇和舞衣。歌纨，歌唱时用的纨扇。金缕，金线绣的舞衣。唐杜秋娘《金缕衣》诗：“劝君莫惜金缕衣，劝君惜取少年时。”</p>
<h2>出处</h2><p>《金缕衣》</p><blockquote>断红湿句：惜别的红泪沾湿了歌扇和舞衣。歌纨，歌唱时用的纨扇。金缕，金线绣的舞衣。唐杜秋娘《金缕衣》诗：“劝君莫惜金缕衣，劝君惜取少年时。”…</blockquote>
<h2>别名</h2><p>断红湿句</p>
