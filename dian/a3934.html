<h1>鹊印</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《搜神记》</p><blockquote>常山张颢为梁州牧，天新雨后，有鸟如山鹊，飞翔入市，忽然坠地。人争取之，化为圆石。颢椎破之，得一金印，文曰：「忠孝侯印。」颢以上闻，藏之秘府。后议郎汝南樊衡夷上言：「尧舜时旧有此官。今天降印，宜可复置。」颢后官至太尉。…</blockquote>
<h2>别名</h2><p>怀印、化金印、鹊衔金印、石印飞、喜鹊捧金印</p>
<h2>用它的诗</h2>
<p>吐绶鸟词 · 刘禹锡 <span class="verse">「鹊衔金印空为瑞」</span></p>
<p>北庭西郊候封大夫受降回军献上 · 岑参 <span class="verse">「喜鹊捧金印」</span></p>
