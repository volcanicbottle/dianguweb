<h1>张硕</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《艺文类聚》</p><blockquote>晋·曹毗《杜兰香别传》曰：香降张硕，硕既成婚，香便去，绝不来。年馀，硕船行，忽见香乘车于山际。硕不胜惊喜，遥往造香，见香悲喜。香亦有悦色，言语顷时，硕欲登其车。其婢举捍之，嶷然山立。硕复欲车前上，车奴攘臂排之，于是遂退。…</blockquote>
<h2>别名</h2><p>杜兰香</p>

<p>重过圣女祠 · 李商隐 <span class="verse">「杜兰香去未移时」</span></p>
