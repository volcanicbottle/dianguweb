<h1>天竺去来</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>天竺去来六句：白居易在杭州时，很欣赏灵隐、天竺（寺）一带的景色。他的《寄韬光禅师》诗“东涧水流西涧水，南山云起北山云”，便是写东西二涧和南北两高峰的。</p>
<h2>出处</h2><p>《寄韬光禅师》</p><blockquote>天竺去来六句：白居易在杭州时，很欣赏灵隐、天竺（寺）一带的景色。他的《寄韬光禅师》诗“东涧水流西涧水，南山云起北山云”，便是写东西二涧和南北两高峰的。…</blockquote>
<h2>别名</h2><p>天竺去来六句</p>
<h2>用它的诗</h2>
<p>沁园春 · 辛弃疾 <span class="verse">「”二公者皆掉头不顾只管传杯白言“天竺去来图画里峥嵘楼阁开爱纵横二涧东西水绕两峰南北高下云堆」</span></p>
