<h1>青箱家</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>青箱传学：指世传家学。唐刘禹锡《忂州徐员外使君遗以缟纻兼竹书箱因成一篇用答佳贶》：“远放歌声分白巴，知传家学与青箱。”</p>
<h2>出处</h2><p>《宋书》</p><blockquote>王淮之字元曾，琅邪临沂人。高祖彬，尚书仆射。曾祖彪之，尚书令。祖临之，父讷之，并御史中丞。彪之博闻多识，练悉朝仪，自是家世相传，并谙江左旧事，缄之青箱，世人谓之「王氏青箱学」。…</blockquote>
<h2>别名</h2><p>青箱传学、家学青箱、青箱、王淮之</p>
<h2>用它的诗</h2>
<p>南海马大夫见惠著述三通勒成四帙上自邃古达于国朝采其菁华至简如富钦受嘉贶诗以谢之 · 刘禹锡 <span class="verse">「青箱传学远」</span></p>
