<h2>释义</h2><p>乘鸾来去两句：王□《龙城录》载唐玄宗游月宫，见一大宫府，榜曰“广寒清虚之府”，“有素娥十余人，皆皓衣乘白鸾往来，舞于大桂树下”。</p>
<h2>出处</h2><p>《龙城录》</p><blockquote>乘鸾来去两句：王□《龙城录》载唐玄宗游月宫，见一大宫府，榜曰“广寒清虚之府”，“有素娥十余人，皆皓衣乘白鸾往来，舞于大桂树下”。…</blockquote>
