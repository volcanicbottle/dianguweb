<h1>欲济句</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>&#x27;舟楫&#x27;喻辅弼之臣，典出《尚书·说命上》商王武丁命傅说之语：&#x27;若济巨川，用汝作舟楫。&#x27;孟浩然《望洞庭湖赠张丞相》&#x27;欲济无舟楫&#x27;即借此以喻欲出仕而苦无人援引。</p>
<h2>出处</h2><p>《尚书·说命》</p><blockquote>欲济句，比喻自己想出仕却无人引荐。济，渡。楫，橹，也指船。孟浩然另有《洞庭湖寄阎九》诗，末二句云：“迟尔为舟楫，相将济巨川。”亦此意。…</blockquote>

<h2>用它的诗</h2>
<p>临洞庭上张丞相 · 孟浩然 <span class="verse">「欲济无舟揖」</span></p>
