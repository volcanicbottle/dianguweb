<h1>金陵王气</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《三国志》</p><blockquote>「纮建计宜出都秣陵，权从之。」南朝宋·裴松之注引《江表传》曰：「纮谓权曰：『秣陵，楚武王所置，名为金陵。地势冈阜连石头，访问故老，云昔秦始皇东巡会稽经此县，望气者云金陵地形有王者都邑之气，故掘断连冈，改名秣陵。今处所具存，地有其气，天之所命，宜为都邑。』」…</blockquote>
<h2>别名</h2><p>天子气、佳气、孙权气、孙权</p>
<h2>用它的诗</h2>
<p>西塞山怀古 · 刘禹锡 <span class="verse">「金陵王气」</span></p>
