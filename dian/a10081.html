<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《三国志》</p><blockquote>「权乘骏马越津桥得去。」南朝宋·裴松之注引《献帝春秋》曰：「张辽问吴降人：『向有紫髯将军，长上短下，便马善射，是谁？』降人答曰：『是孙会稽。』辽及乐进相遇，言不早知之，急追自得，举军叹恨。」…</blockquote>
