<p class="meta">典故 · 4 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>「乃作书，往往摭《离骚》文而反之，自岷山投诸江流以吊屈原，名曰《反离骚》；又旁《离骚》作重一篇，名曰《广骚》；又旁《惜诵》以下至《怀沙》一卷，名曰《畔牢愁》。」李奇注「畔，离也。牢，聊也。与君相离，愁而无聊也。」…</blockquote>
