<h1>阳关</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>阳关：即《阳关三叠》，是送别的曲子。源出王维《送元二使安西》诗。见前87页张舜民《卖花声》注。</p>
<h2>出处</h2><p>《送元二使安西》</p><blockquote>不是渭城西去客两句：王维《送元二使安西》诗，“渭城朝雨□轻尘，客舍青青柳色新。劝君更尽一杯酒，西出阳关无故人。”张舜民这时羁旅南方，不是西行，故云。但这还是表面的话，实际上是怕听离别的曲子，以免增加羁旅的哀愁。阳关，根据王维这首诗谱成的《阳关三叠》。…</blockquote>
<h2>别名</h2><p>不是渭城西去客两句、渭城</p>
<h2>用它的诗</h2>
<p>卖花声 · 张舜民 <span class="verse">「不是渭城西去客休唱阳关」</span></p>
<p>凤凰台上忆吹箫 · 李清照 <span class="verse">「这回去也千万遍阳关」</span></p>
