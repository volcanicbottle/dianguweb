<h1>放太甲</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>汤崩，太子太丁未立而卒，于是乃立太丁之弟外丙，是为帝外丙。帝外丙即位三年，崩，立外丙之弟中壬，是为帝中壬。帝中壬即位四年，崩，伊尹乃立太丁之子太甲。太甲，成汤适长孙也，是为帝太甲。帝太甲元年，伊尹作伊训，作肆命，作徂后。帝太甲既立三年，不明，暴虐，不遵汤法，乱德，于是伊尹放之于桐宫。三年，伊尹摄行政当国，以朝诸侯。帝太甲居桐宫三年，悔过自责，反善，于是伊尹乃迎帝太甲而授之政。…</blockquote>
<h2>别名</h2><p>伊尹（名挚，又名阿衡）、太甲</p>
<h2>用它的诗</h2>
<p>纪南陵题五松山 · 李白 <span class="verse">「桐宫放太甲」</span></p>
