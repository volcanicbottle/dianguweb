<h1>鲁伯禽</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>于是卒相成王，而使其子伯禽代就封于鲁。周公戒伯禽曰：「我文王之子，武王之弟，成王之叔父，我于天下亦不贱矣。然我一沐三捉发，一饭三吐哺，起以待士，犹恐失天下之贤人。子之鲁，慎无以国骄人。」……周公卒，子伯禽固已前受封，是为鲁公。鲁公伯禽之初受封之鲁，三年而后报政周公。周公曰：「何迟也？」伯禽曰：「变其俗，革其礼，丧三年然后除之，故迟。」…</blockquote>
<h2>别名</h2><p>鲁公、鲁公伯禽</p>
<h2>用它的诗</h2>
<p>题李别驾壁 · 高适 <span class="verse">「礼乐遥传鲁伯禽」</span></p>
