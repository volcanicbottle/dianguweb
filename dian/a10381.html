<h1>一咏一觞</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>一咏一觞（shāng）谁共：跟谁一道作诗、喝酒呢？觞，酒杯。谁，指志同道合的朋友。王羲之《兰亭集序》：“一觞一咏，亦足以畅叙幽情。”</p>
<h2>出处</h2><p>《兰亭集序》</p><blockquote>一咏一觞（shāng）谁共：跟谁一道作诗、喝酒呢？觞，酒杯。谁，指志同道合的朋友。王羲之《兰亭集序》：“一觞一咏，亦足以畅叙幽情。”…</blockquote>
<h2>别名</h2><p>一咏一觞（shāng）谁共</p>
<h2>用它的诗</h2>
<p>好事近 · 吕渭老 <span class="verse">「从今日日在南栖发自此时白一咏一觞谁共」</span></p>
<p>贺新郎 · 辛弃疾 <span class="verse">「一咏一觞成底事」</span></p>
