<h1>墨悲丝染</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>素丝染就已堪悲：素丝染后，失掉本来的洁白之色，所以兴悲。《淮南子·说林训》：“墨子见练丝而泣之，为其可以黄，可以黑。”</p>
<h2>出处</h2><p>《淮南子·说林训》</p><blockquote>素丝染就已堪悲：素丝染后，失掉本来的洁白之色，所以兴悲。《淮南子·说林训》：“墨子见练丝而泣之，为其可以黄，可以黑。”…</blockquote>
<h2>别名</h2><p>素丝染就已堪悲</p>
<h2>用它的诗</h2>
<p>九张机 · 无名氏 <span class="verse">「四张机鸳鸯织就欲双飞可怜未老头先白春波碧草晓寒深处相对浴红衣七张机春蚕吐尽一生丝莫教容易裁罗绮无端剪破仙鸾彩凤分作两边衣春衣素丝染就已堪悲」</span></p>
