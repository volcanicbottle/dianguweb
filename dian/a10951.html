<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>百越，即百粤，指当时五岭以南各少数民族地区。文身，古代南方少数民族有在身上刺花纹的风俗。《庄子·逍遥游》：“越人断发文身。”</p>
<h2>出处</h2><p>《庄子·逍遥游》</p><blockquote>百越，即百粤，指当时五岭以南各少数民族地区。文身，古代南方少数民族有在身上刺花纹的风俗。《庄子·逍遥游》：“越人断发文身。”…</blockquote>
