<h1>毫发皆帝力</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>七年，高祖从平城过赵，赵王旦暮自上食，体甚卑，有子婿礼。高祖箕踞骂詈，甚慢之。赵相贯高、赵午年六十馀，故耳客也，怒曰：「吾王孱王也！」说敖曰：「天下豪桀并起，能者先立，今王事皇帝甚恭，皇帝遇王无礼，请为王杀之。」敖齧其指出血，曰：「君何言之误！且先王亡国，赖皇帝得复国，德流子孙，秋豪皆帝力也。愿君无复出口。」贯高等十馀人相谓曰：「吾等非也。吾王长者，不背德。且吾等义不辱，今帝辱我王，故欲杀之，何乃污王为？事成归王，事败独身坐耳。」…</blockquote>
<h2>别名</h2><p>张敖</p>
