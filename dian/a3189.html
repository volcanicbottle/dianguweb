<h1>歌来晚</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>交阯屯兵反，执刺史及合浦太守，自称「柱天将军」。灵帝特敕三府精选能吏，有司举琮为交阯刺史。琮到部，讯其反状，咸言赋敛过重，百姓莫不空单，京师遥远，告冤无所，民不聊生，故聚为盗贼。琮即移书告示，各使安其资业，招抚荒散，蠲复徭役，诛斩渠帅为大害者，简选良吏试守诸县，岁閒荡定，百姓以安。巷路为之歌曰：「贾父来晚，使我先反；今见清平，吏不敢饭。」在事三年，为十三州最，徵拜议郎。…</blockquote>
<h2>别名</h2><p>贾琮</p>
<h2>用它的诗</h2>
<p>奉酬睢阳李太守 · 高适 <span class="verse">「梁国歌来晚」</span></p>
