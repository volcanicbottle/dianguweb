<h1>闻鸡起舞</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>闻鸡起舞：指少年立志。清蒲松龄《夜坐悲歌》：“半夜闻鸡欲起舞，把酒问天天不语。”</p>
<h2>出处</h2><p>《晋书》</p><blockquote>与司空刘琨俱为司州主簿，情好绸缪，共被同寝。中夜闻荒鸡鸣，蹴琨觉曰：「此非恶声也。」因起舞。逖、琨并有英气，每语世事，或中宵起坐，相谓曰：「若四海鼎沸，豪杰并起，吾与足下当相避于中原耳。」…</blockquote>
<h2>别名</h2><p>中夜舞、刘琨舞、中宵舞、鸡鸣起舞、听鸡舞、起舞闻鸡、起舞看吴钩、舞闻鸡、鸡声非恶、刘琨（字越石）、祖逖</p>
<h2>用它的诗</h2>
<p>伤春五首 五 · 杜甫 <span class="verse">「得无中夜舞」</span></p>
<p>贺新郎 · 辛弃疾 <span class="verse">「我最怜君中宵舞」</span></p>
