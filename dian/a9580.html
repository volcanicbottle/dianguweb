<h2>出处</h2><p>《后汉书》</p><blockquote>范冉字史云，陈留外黄人也。少为县小吏，年十八，奉檄迎督邮，冉耻之，乃遁去。到南阳，受业于樊英。又游三辅，就马融通经，历年乃还。冉好违时绝俗，为激诡之行。常慕梁伯鸾、闵仲叔之为人。与汉中李固、河内王奂亲善，而鄙贾伟节、郭林宗焉。奂后为考城令，境接外黄，屡遣书请冉，冉不至。及奂迁汉阳太守，将行，冉乃与弟协步赍麦酒，于道侧设坛以待之。冉见奂车徒骆驿，遂不自闻，惟与弟共辩论于路。奂识其声，即下车与相揖对。奂曰：「行路仓卒，非陈契阔之所，可共到前…</blockquote>
