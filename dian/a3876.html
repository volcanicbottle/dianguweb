<h1>过虎溪</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>虎溪相送：咏僧人。明吴廷翰《怀白云寺僧》：“几度南山不得归，虎溪相送迹应稀。”</p>
<h2>出处</h2><p>《莲社高贤传·百二十三人传》</p><blockquote>时远法师居东林。其处流泉匝寺下入于溪。每送客过此。辄有虎号鸣。因名虎溪。后送客未尝过。独陶渊明与修静至。语道契合不觉过溪。因相与大笑。…</blockquote>
<h2>别名</h2><p>虎溪僧、虎溪相送、虎溪远、远公不出、虎溪、勿过虎溪、长隔虎溪、三笑、陶潜、僧慧远</p>
<h2>用它的诗</h2>
<p>疾愈过龙泉寺精舍呈易业二公 · 孟浩然 <span class="verse">「虎溪相送出」</span></p>
<p>别东林寺僧 · 李白 <span class="verse">「何烦过虎溪」</span></p>
