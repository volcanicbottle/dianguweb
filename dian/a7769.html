<h1>田文好客</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>孟尝君在薛，招致诸侯宾客及亡人有罪者，皆归孟尝君。孟尝君舍业厚遇之，以故倾天下之士。食客数千人，无贵贱一与文等。孟尝君待客坐语，而屏风后常有侍史，主记君所与客语，问亲戚居处。客去，孟尝君已使使存问，献遗其亲戚。孟尝君曾待客夜食，有一人蔽火光。客怒，以饭不等，辍食辞去。孟尝君起，自持其饭比之。客惭，自刭。士以此多归孟尝君。孟尝君客无所择，皆善遇之。人人各自以为孟尝君亲己。…</blockquote>
<h2>别名</h2><p>孟尝君</p>
<h2>用它的诗</h2>
<p>与诸公送陈郎将归衡阳 · 李白 <span class="verse">「世人皆比孟尝君」</span></p>
