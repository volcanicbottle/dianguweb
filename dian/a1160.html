<h1>息夫人</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《春秋左传正义》</p><blockquote>蔡哀侯为莘故。绳息妫以语楚子。楚子如息。以食入享。遂灭息。以息妫归。生堵敖。及成王焉。未言。楚子问之。对曰。吾一妇人。而事二夫。纵弗能死。其又奚言。楚子以蔡侯灭息。遂伐蔡。秋。七月。楚入蔡。君子曰。商书所谓恶之易也。如火之燎于原。不可乡迩。其犹可扑灭者。其如蔡哀侯乎。…</blockquote>
<h2>别名</h2><p>脉脉无言、不共楚王言、不语息夫人、无言息妫、息国不言、亡国无言、无言楚妃、无言为息侯、息妫不语、楚文王</p>
