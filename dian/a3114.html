<h1>覆舟如芥</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子集释》</p><blockquote>且夫水之积也不厚，则其负大舟也无力。覆杯水于坳堂之上，则芥为之舟；置杯焉则胶，水浅而舟大也。风之积也不厚，则其负大翼也无力。故九万里，则风斯在下矣，而后乃今培风；背负青天而莫之夭阏者，而后乃今将图南。唐·成玄英疏：「芥，草也。胶，黏也。此起譬也。夫翻覆一杯之水于坳污堂地之间，将草叶为舟，则浮汎靡滞；若还用杯为舟，理必不可。何者？水浅舟大，则黏地不行故也。」…</blockquote>
