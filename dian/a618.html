<h1>白马小儿</h1>
<p class="meta">典故 · 4 首诗使用</p>
<h2>释义</h2><p>青丝白马：指叛乱军马。唐杜甫《洗兵马》：“青丝白马谁家子，粗豪且逐风尘起。”</p>
<h2>出处</h2><p>《隋书》</p><blockquote>「大同中，童谣曰：『青丝白马寿阳来。』其后侯景破丹阳，乘白马，以青丝为羁勒。」…</blockquote>
<h2>别名</h2><p>白骑贼、青袍白马、青丝白马、青袍过寿阳、侯景</p>
<h2>用它的诗</h2>
<p>洗兵马 · 杜甫 <span class="verse">「青袍白马更何有」</span></p>
<p>青丝 · 杜甫 <span class="verse">「青丝白马谁家子」</span></p>
<p>至后 · 杜甫 <span class="verse">「青袍白马有何意」</span></p>
<p>金陵歌送别范宣 · 李白 <span class="verse">「白马小儿谁家子」</span></p>
