<h1>少年场</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>永治、元延间，上怠于政，贵戚骄恣，红阳长仲兄弟交通轻侠，臧匿亡命。而北地大豪浩商等报怨，杀义渠长妻子六人，往来长安中。丞相御史遣掾求逐党与，诏书召捕，久之乃得。长安中奸滑浸多，闾里少年群辈杀吏，受赇报仇，相与探丸为弹，得赤丸者斫武吏，得黑丸者斫文吏，白者主治丧；城中薄暮尘起，剽劫行者，死伤横道，枹鼓不绝。赏以三辅高第选守长安令，得壹切便宜从事。赏至，修治长安狱，穿地方深各数丈，致令辟为郭，以大石覆其口，名为「虎穴」。乃部户曹掾史，与乡吏…</blockquote>
