<h1>怀橘</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>陆绩橘：咏孝顺。唐张祜《送卢弘本浙东觐省》：“怀中陆绩橘，江上伍员涛。”</p>
<h2>出处</h2><p>《三国志》</p><blockquote>陆绩字公纪，吴郡吴人也。父康，汉末为庐江太守。绩年六岁，于九江见袁术。术出橘，绩怀三枚，去，拜辞堕地，术谓曰：「陆郎作宾客而怀橘乎？」绩跪答曰：「欲归遗母。」术大奇之。…</blockquote>
<h2>别名</h2><p>陆绩怀橘、陆绩怀、比橘、陆绩橘、陆生言、陆氏橘、怀桔、陆绩孝、陆与潘、袖中香味、红堕双桔、陆郎承颜、潘岳、陆绩、板舆、潘舆、版舆</p>
<h2>用它的诗</h2>
<p>送许员外江外置常平仓 · 岑参 <span class="verse">「仍怀陆氏橘」</span></p>
