<h1>卜商</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>子夏索居：指寂寥独居。唐杜甫《上韦左相二十韵》：“长卿多病久，子夏索居频。”</p>
<h2>出处</h2><p>《礼记·檀弓上》</p><blockquote>子夏丧其子而丧其明，曾子吊之，哭。子夏曰：「天乎！予之无罪也！」曾子怒曰：「商！汝何无罪也？吾与汝事夫子于洙、泗之间，退而老于西河之上，使西河之民，疑汝于夫子，尔罪一也。丧尔亲，使民未有异闻，尔罪二也。丧尔子，丧尔明，尔罪三也。而曰汝何无罪欤？」子夏投其杖而拜，曰：「吾过矣！吾过矣！吾离群而索居，亦以久矣！」…</blockquote>
<h2>别名</h2><p>子夏索居、子夏、子夏离群、卜商（子夏）</p>
<h2>用它的诗</h2>
<p>上韦左相二十韵 · 杜甫 <span class="verse">「子夏索居频」</span></p>
