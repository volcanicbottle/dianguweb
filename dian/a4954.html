<h1>空梁燕</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《容斋随笔·容斋续笔》</p><blockquote>薛道衡以「空梁落燕泥」之句，为隋炀帝所嫉。考其诗名昔昔盐，凡十韵：「垂柳覆金堤，蘼芜叶复齐。水溢芙蓉沼，花飞桃李蹊。采桑秦氏女，织锦窦家妻。关山别荡子，风月守空闺。常敛千金笑，长垂双玉啼。盘龙随镜隐，彩凤逐帷低。飞魂同夜鹊，倦寝忆晨鸡。暗牖悬蛛网，空梁落燕泥。前年过代北，今岁往辽西。一去无消息，那能惜马蹄！」…</blockquote>
<h2>别名</h2><p>燕泥落空梁、泥落梁燕</p>
<h2>用它的诗</h2>
<p>蝶恋花 · 辛弃疾 <span class="verse">「曾道空梁燕」</span></p>
