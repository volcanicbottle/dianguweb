<h1>薰风句</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《新唐书》</p><blockquote>公权博贯经术，于诗、书、左氏春秋、国语、庄周书尤邃，每解一义，必数十百言。通音律，而不喜奏乐，曰：「闻之令人骄怠。」其书法结体劲媚，自成一家。文宗尝召与联句，帝曰：「人皆苦炎热，我爱夏日长。」公权属曰：「薰风自南来，殿阁生馀凉。」它学士亦属继，帝独讽公权者，以为词情皆足，命题于殿壁，字率径五寸，帝叹曰：「钟、王无以尚也！」…</blockquote>
<h2>别名</h2><p>薰风手、薰风殿属和</p>
<h2>用它的诗</h2>
<p>水龙吟 · 辛弃疾 <span class="verse">「看公重试薰风手」</span></p>
