<h1>回旗走懿</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《三国志》</p><blockquote>九年，亮复出祁山，以木牛运，粮尽退军，与魏将张合交战，射杀合。十二年春，亮悉大众由斜谷出，以流马运，据武功五丈原，与司马宣王对于渭南。亮每患粮不继，使己志不申，是以分兵屯田，为久驻之基。耕者杂于渭滨居民之间，而百姓安堵，军无私焉。相持百馀日。其年八月，亮疾病，卒于军，时年五十四。及军退，宣王案行其营垒处所，曰：「天下奇才也！」南朝宋·裴松之注引《汉晋春秋》曰：「杨仪等整军而出，百姓奔告宣王，宣王追焉。姜维令仪反旗鸣鼓，若将向宣王者，宣王…</blockquote>
<h2>别名</h2><p>仲达奔忙</p>

<p>念奴娇 · 文天祥 <span class="verse">「回旗走懿」</span></p>
