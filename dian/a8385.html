<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《艺文类聚》</p><blockquote>《六韬》曰：文王问散宜生：「卜伐殷，吉乎？」曰：「不吉。钻龟，龟不兆。数蓍，蓍不交而如折。将行之日，雨，辎重车至轸。行之日，帜折为三。」散宜生曰：「此凶，四不祥，不可举事。」太公进曰：「是非子之所知也。祖行之日，雨辎重车至轸，是洗濯甲兵也。」…</blockquote>
<h2>别名</h2><p>洗兵马、洗兵雨、洗兵、洗兵甘雨、洗甲、洗清兵甲</p>
