<h1>马革裹尸</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>初，援军还，将至，故人多迎劳之，平陵人孟冀，名有计谋，于坐贺援。援谓之曰：「吾望子有善言，反同众人邪？昔伏波将军路博德开置七郡，裁封数百户；今我微劳，猥飨大县，功薄赏厚，何以能长久乎？先生奚用相济？」冀曰：「愚不及。」援曰：「方今匈奴、乌桓尚扰北边，欲自请击之。男儿要当死于边野，以马革裹尸还葬耳，何能卧上在儿女子手中邪？」冀曰：「谅为烈士，当如此矣。」…</blockquote>
<h2>别名</h2><p>裹革、裹尸、马革敛尸、马援</p>
<h2>用它的诗</h2>
<p>满江红 · 辛弃疾 <span class="verse">「马革裹尸当自誓」</span></p>
