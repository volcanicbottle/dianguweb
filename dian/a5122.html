<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《周易注疏》</p><blockquote>《易》与天地准，故能弥纶天地之道。仰以观于天文，俯以察于地理，是故知幽明之故；原始反终，故知死生之说；精气为物，游魂为变，是故知鬼神之情状。与天地相似，故不违；知周乎万物，而道济天下，故不过；旁行而不流，乐天知命，故不忧；安土敦乎仁，故能爱。范围天地之化而不过，曲成万物而不遗，通乎昼夜之道而知，故神无方而《易》无体。唐·孔颖达疏：「弥，谓弥缝补合。纶，谓经纶牵引。」唐·孔颖达疏：「顺天施化是欢乐于天，识物始终是自知性命。顺天道之常数，知…</blockquote>
