<h1>五王宅</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《旧唐书》</p><blockquote>初，玄宗兄弟圣历初出閤，列第于东都积善坊，五人分院同居，号「五王宅」。大足元年，从幸西京，赐宅于兴庆坊，亦号「五王宅」。及先天之后，兴庆是龙潜旧邸，因以为宫。宪于胜业东南角赐宅，申王撝、岐王范于安兴坊东南赐宅，薛王业于胜业西北角赐宅，邸第相望，环于宫侧。玄宗于兴庆宫西南置楼，西面题曰花萼相辉之楼，南面题曰勤政务本之楼。玄宗时登楼，闻诸王音乐之声，咸召登楼同榻宴谑，或便幸其第，赐金分帛，厚其欢赏。诸王每日于侧门朝见，归宅之后，即奏乐纵饮，…</blockquote>
