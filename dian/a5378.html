<h1>授衣时节</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《毛诗正义》</p><blockquote>七月流火，九月授衣。汉·毛亨传：「火，大火也；流，下也。」汉·郑玄笺：「大火者，寒暑之候也。火星中而寒暑退，故将言寒先著火所在。」唐·孔颖达疏：「《尧典》云：日永星火，以正仲夏。注云：司马之职，治南岳之事，得则夏气和。夏至之气，昏，火星中，所以五月得火星中者。」…</blockquote>
<h2>别名</h2><p>星流大火、流空大火将西</p>
<h2>用它的诗</h2>
<p>渔家傲 · 欧阳修 <span class="verse">「授衣时节轻寒嫩」</span></p>
<p>翦征袍・捣练子 · 贺铸 <span class="verse">「授衣时节也思家」</span></p>
