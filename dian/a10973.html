<h1>海燕</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>海燕，即越燕，多在梁上作巢。玳瑁（旧读妹mèi）梁，指画梁。玳瑁，龟属海产动物，可作装饰品。这句是以双燕起兴，先比夫妇相守，后托少妇独处。卢照邻《长安古意》：“双燕双飞绕画梁，罗帏翠被郁金香。”</p>
