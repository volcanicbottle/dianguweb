<h1>五铢钱</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>五铢钱为汉武帝以来汉家法定货币，刘备定蜀后铸行五铢钱，寓意兴复汉室正统</p>
<h2>出处</h2><p>《史记》</p><blockquote>有司言三铢钱轻，易奸诈，乃更请诸郡国铸五铢钱，周郭其下，令不可磨取鋊焉。…</blockquote>
<h2>别名</h2><p>五铢钱复汉正统</p>
<h2>用它的诗</h2>
<p>蜀先主庙 · 刘禹锡 <span class="verse">「业复五铢钱」</span></p>
