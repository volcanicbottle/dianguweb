<h2>出处</h2><p>《楚辞补注》</p><blockquote>曰：遂古之初，谁传道之？上下未形，何由考之？冥昭瞢闇，谁能极之？冥昭瞢闇，谁能极之？明明闇闇，惟时何为？阴阳三合，何本何化？圜则九重，孰营度之？惟玆何功？孰初作之？斡维焉系？天极焉加？八柱何当？东南何亏？九天之际，安放安属？隅隈多有，谁知其数？天何所沓？十二焉分？日月安属？列星安陈？出自汤谷，次于蒙汜。自明及晦，所行几里？夜光何德，死则又育？厥利维何，而顾菟在腹？女岐无合，夫焉取九子？伯强何处？惠气安在？何阖而晦？何开而明？角宿未旦，曜…</blockquote>
