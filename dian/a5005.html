<h1>哭征西</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>明年秋，肃宗即位，拜秉征西将军。遣案行凉州边境，劳赐保塞羌胡，进屯酒泉，救戊己校尉。建初元年，拜度辽将军。视事七年，匈奴怀其恩信。徵为执金吾，甚见亲重。帝每巡郡国及幸宫观，秉常领禁兵宿卫左右。除三子为郎。章和二年，复拜征西将军，副车骑将军窦宪击北匈奴，大破之。事并事宪传。封秉美阳侯。食邑三千户。秉性勇壮而简易于事，军行常自被甲在前，休止不结营部，然远斥候，明要誓，有警，军陈立成，士卒皆乐为死。永元二年，代桓虞为光禄勋。明年夏卒，时年五十…</blockquote>
