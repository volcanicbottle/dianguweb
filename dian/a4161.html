<h1>饥餐胡虏肉</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>缘边大饥，人相食。谏大夫如普行边兵，还言「军士久屯塞苦，边郡无以相赡。今单于新和，宜因是罢兵。」校尉韩威进曰：「以新室之威而吞胡虏，无异口中蚤虱。臣愿得勇敢之士五千人，不赍斗粮，饥食虏肉，渴饮其血，可以横行。」莽壮其言，以威为将军。然采普言，徵还诸将在边者。免陈钦等十八人，又罢四关填都尉诸屯兵。会匈奴使还，单于知侍子登前诛死，发兵寇边，莽复发军屯。于是边民流入内郡，为人奴婢，乃禁吏民敢挟边民者弃市。…</blockquote>
