<h1>障狂澜</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《旧唐书》</p><blockquote>言未既，有笑于列者曰：「先生欺予哉！弟子事先生，于兹有年矣。先生口不绝吟于六艺之文，手不停披于百家之编。记事者必提其要，纂言者必钩其玄。贪多务得，细大不捐。烧膏油以继晷，常矻矻以穷年。先生之业，可谓勤矣。抵排异端，攘斥佛、老，补苴罅漏，张皇幽眇。寻坠绪之茫茫，独旁搜而远绍；障百川而东之，回狂澜于既倒。先生之于儒，可谓有劳矣。沉浸醲郁，含英咀华，作为文章，其书满家。上规姚、姒，浑浑无涯。周诰、殷盘，佶屈聱牙。春秋谨严，左氏浮誇。易奇而法，…</blockquote>
<h2>别名</h2><p>力障狂澜</p>
<h2>用它的诗</h2>
<p>沁园春 · 吴文英 <span class="verse">「独障狂澜」</span></p>
