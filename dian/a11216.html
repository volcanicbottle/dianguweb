<h1>折杨柳曲</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>汉乐府横吹曲《折杨柳》，多写离别怀远之情</p>
<h2>出处</h2><p>《鼓角横吹曲》</p><blockquote>羌笛两句，北朝乐府《鼓角横吹曲》有《折杨柳枝》，词云：“上马不捉鞭，反拗杨柳枝。下马吹横笛，愁杀行客儿。”此用其意。古人常以笛吹《杨柳》，喻别离之凄苦，怨《杨柳》实是怨别。这里意谓春风既不度玉门关，羌笛又何必怨《杨柳》之作哀音呢。羌笛，注见卷二李颀《古意》。玉门关，注见卷一李白《关山月》。…</blockquote>
<h2>别名</h2><p>羌笛两句、怨杨柳</p>
<h2>用它的诗</h2>
<p>出塞 · 王昌龄 <span class="verse">「春风不度玉门关」</span></p>
<p>听安万善吹觱篥歌 · 李颀 <span class="verse">「变调如闻《杨柳》春」</span></p>
