<h1>出胯下</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>淮阴屠中少年有侮信者，曰：「若虽长大，好带刀剑，中情怯耳。」众辱之曰：「信能死，刺我；不能死，出我裤下。」于是信孰视之，俛出裤下，蒲伏。一市人皆笑信，以为怯。…</blockquote>
<h2>别名</h2><p>胯下辱、淮阴胯、胯下人、笑韩信、一市人皆笑、忍辱胯下、韩信</p>
<h2>用它的诗</h2>
<p>杂曲歌辞 行路难三首 二 · 李白 <span class="verse">「淮阴市井笑韩信」</span></p>
