<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>名都多妖女，京洛出少年。宝剑直千金，被服光且鲜。斗鸡东郊道，走马长楸间。驰驰未能半，双过我前。揽弓捷鸣镝，长驱上南山。左挽因右发，一纵两禽连。馀巧未及展，仰手接飞鸢。观者咸称善，众工归我妍。我归宴平乐，美酒斗十千。脍鲤臇胎，寒鳖炙熊蹯。鸣俦啸匹旅，列坐竟长筵。连翩击鞠壤，巧捷惟万端。白日西南驰，光景不可攀。云散还城邑，清晨复来还。…</blockquote>
