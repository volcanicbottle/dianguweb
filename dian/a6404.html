<h1>千树橘</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>谚曰：「百里不贩樵，千里不贩籴。」居之一岁，种之以谷；十岁，树之以木；百岁，来之以德。德者，人物之谓也。今有无秩禄之奉，爵邑之入，而乐与之比者。命曰「素封」。封者食租税，岁率户二百。千户之君则二十万，朝觐聘享出其中。庶民农工商贾，率亦岁万息二千，百万之家则二十万，而更徭租赋出其中。衣食之欲，恣所好美矣。故曰陆地牧马二百蹄，牛蹄角千，千足羊，泽中千足彘，水居千石鱼陂，山居千章之材。安邑千树枣；燕、秦千树栗；蜀、汉、江陵千树橘；淮北、常山已…</blockquote>
