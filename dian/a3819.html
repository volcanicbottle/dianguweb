<h1>王侯蝼蚁</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>野寺隐乔木，山僧高下居。石门日色异，绛气横扶疏。窈窕入风磴【窅窕入风磴】，长芦纷卷舒。庭前猛虎卧，遂得文公庐。俯视万家邑，烟尘对阶除。吾师雨花外，不下十年馀。长者自布金，禅龛只晏如。大珠脱玷翳【火珠脱玷翳】，白月当空虚【白日当空虚】。甫也南北人，芜蔓少耘锄。久遭诗酒污，何事忝簪裾。王侯与蝼蚁，同尽随丘墟。愿闻第一义，回向心地初。金篦刮眼膜，价重百车渠。无生有汲引，兹理傥吹嘘。…</blockquote>
<h2>别名</h2><p>蝼蚁王侯、侯王蚁</p>
