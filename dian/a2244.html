<h2>出处</h2><p>《庄子集释》</p><blockquote>荃者所以在鱼，得鱼而忘荃；蹄者所以在兔，得兔而忘蹄；言者所以在意，得意而忘言。吾安得夫忘言之人而与之言哉！…</blockquote>
<h2>别名</h2><p>忘蹄、忘筌蹄、得鱼忘筌、忘筌、弃筌、筌蹄弃、筌蹄、忘筌得鱼、问旧蹄、得兔忘筌、钓罢忘筌</p>
