<h2>出处</h2><p>《吴越春秋》</p><blockquote>种曰：「吴王好起宫室，用工不辍。王选名山神材，奉而献之。」越王乃使木工三千馀人，入山伐木，献之吴，一年，师无所幸，作士思归，皆有怨望之心，而歌〈木客〉之吟。一夜，天生神木一双，大二十围，长五十寻，阳为文梓，阴为缏楠。……乃使大夫种献之于吴王。…</blockquote>
