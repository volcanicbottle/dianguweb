<h1>汉武眼穿</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>上思念李夫人不已，方士齐人少翁言能致其神。乃夜张灯烛，设帷帐，陈酒肉，而令上居他帐，遥望好女如李夫人之貌，还幄坐而步。又不得就视，上愈益相思悲感，为作诗曰：「是邪，非邪？立而望之，偏何姗姗其来迟！」令乐府诸音家弦歌之。…</blockquote>
<h2>别名</h2><p>隔绛纱、刘彻（汉武帝）、李夫人</p>
