<h1>缩地</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>长房术：咏仙术，亦指赶路心情急切而倍道兼行。唐岑参《安西馆中思长安》：“遥凭长房术，为缩地山东。”</p>
<h2>出处</h2><p>《神仙传》</p><blockquote>（费长）房有神术，能缩地脉，千里存在，目前宛然，放之复舒如旧也。…</blockquote>
<h2>别名</h2><p>长房术、地难缩、缩地仙、缩地符、缩地无方、长房缩地术、地能缩、缩却地、缩山川、缩地树、费长房</p>
<h2>用它的诗</h2>
<p>安西馆中思长安 · 岑参 <span class="verse">「遥凭长房术」</span></p>
<p>题井陉双谿李道士所居 · 岑参 <span class="verse">「唯求缩却地」</span></p>
