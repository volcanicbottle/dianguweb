<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>登兹楼以四望兮，聊暇日以销忧。览斯宇之所处兮，实显敞而寡仇。接清漳之通浦兮，倚曲阻之长洲。北弥陶牧，西接昭丘，虽信美而非吾土兮，曾何足以少留。凭轩槛以遥望，向北风而开襟。…</blockquote>
<h2>别名</h2><p>仲宣情、王粲（字仲宣）</p>
