<h1>金石两青荧</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《新序·杂事第四》</p><blockquote>勇士一呼，三军皆辟，士之诚也。昔者，楚熊渠子夜行，见寝石以为伏虎，关弓射之，灭矢饮羽，下视，知石也。却复射之，矢摧无迹。熊渠子见其诚心而金石为之开，况人心乎？唱而不和，动而不随，中必有不全者矣。夫不降席而匡天下者，求之己也。孔子曰：「其身正，不令而行；其身不正，虽令不从。」先王之所以拱揖指挥，而四海宾者，诚德之至，已形于外。故诗曰：「王犹允塞，徐方既来。」此之谓也。…</blockquote>
<h2>别名</h2><p>熊渠子</p>
