<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《太平广记》</p><blockquote>司马承祯，字子微。博学能文，攻篆，迥为一体，号曰金剪刀书。隐于天台山玉霄峰，自号白云子。有服饵之术，则天累征之不起。睿宗雅尚道教，屡加尊异，承祯方赴召。睿宗问阴阳术数之事。承祯对曰：「老子经云：『损之又损，以至于无为。』且心目所见知，每损之尚未能已，岂复攻乎异端而增智虑哉？」睿宗曰：「理身无为，则清高矣；理国无为，如之何？」对曰：「国犹身也。老子曰：『留心于淡，合气于漠，顺物自然，乃无私焉，而天下理。』易曰：『圣人者与天地合其德。』是知…</blockquote>
