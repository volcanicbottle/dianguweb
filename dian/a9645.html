<h1>张征虏</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《三国志》</p><blockquote>张飞字益德，涿郡人也，少与关羽俱事先主。羽年长数岁，飞兄事之。先主从曹公破吕布，随还计，曹公拜飞为中郎将。先主背曹公依袁绍、刘表。表卒，曹公入荆州，先主奔江南。曹公追之，一日一夜，及于当阳之长阪。先主闻曹公卒至，弃妻子走，使飞将二十骑拒后。飞据水断桥，瞋目横矛曰：「身是张益德也，可来共决死！」敌皆无敢近者，故遂得免。先主既定江南，以飞为宜都太守、征虏将军，封新亭侯。…</blockquote>
<h2>别名</h2><p>张飞</p>
