<h1>投壶乐</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>遵为将军，取士皆用儒术，对酒设乐，必雅歌投壶。唐·颜师古注曰：「雅歌谓雅诗也。」引《礼记投壶经》曰：「壶颈脩七寸，腹脩五寸，口径二寸半，容斗五升。壶中实小豆焉，为其矢之跃而出也。矢以柘若棘，长二尺八寸，无去其皮，取其坚而重。投之胜者饮不胜者，以为优劣也。」…</blockquote>
<h2>别名</h2><p>雅咏投壶、宾从投壶、投壶接高宴、军中歌吟、投壶歌兴、徵虏投壶</p>
<h2>用它的诗</h2>
