<h1>锦缆龙舟</h1>
<p class="meta">典故 · 4 首诗使用</p>

<h2>出处</h2><p>《隋书》</p><blockquote>又造龙舟凤艒，黄龙赤舰，楼船篾舫。募诸水工，谓之殿脚，衣锦行?，执青丝缆挽船，以幸江都。帝御龙舟，文武官五品已上给楼船，九品已上给黄篾舫，舳舻相接，二百馀里。…</blockquote>
<h2>别名</h2><p>半作帆、锦帆龙舟、龙艘锦缆、青娥殿脚、纹锦制帆、长堤帆影、采绳纤手、锦帆、锦缆</p>
