<h1>我醉欲眠</h1>
<p class="meta">典故 · 5 首诗使用</p>

<h2>出处</h2><p>《宋书》</p><blockquote>潜不解音声，而畜素琴一张，无弦，每有酒适，辄抚弄以寄其意。贵贱造之者，有酒辄设，潜若先醉，便语客：「我醉欲眠，卿可去。」其真率如此。…</blockquote>
<h2>别名</h2><p>醉欲眠、容我醉时眠、我眠君且去、君醉我且归、卿去我欲睡、我眠君且归、醉眠陶令、陶潜</p>
<h2>用它的诗</h2>
<p>满庭芳 · 周邦彦 <span class="verse">「容我醉时眠」</span></p>
<p>山中与幽人对酌 · 李白 <span class="verse">「我醉欲眠卿且去」</span></p>
<p>沁园春 · 辛弃疾 <span class="verse">「记醉眠陶令」</span></p>
<p>祝英台近 · 辛弃疾 <span class="verse">「我眠君且归休」</span></p>
<p>念奴娇 · 姜夔 <span class="verse">「我醉欲眠伊伴我」</span></p>
