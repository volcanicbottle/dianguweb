<h1>将无同</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>三语掾：代称幕府官员。唐元稹《答姨兄胡灵之见寄五十韵》：“官曹三语掾，国器万寻帧。”又借指椽史之官。唐柳宗元《同刘二十八院长述旧言怀感时书事奉寄遵州张员外使君五十二韵之作用其韵增至八十通赠二君子》：“谁采中原寂，徒巾下泽车。”</p>
<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>阮宣子（修）有令闻，太尉王夷甫（衍）见而问曰：「老、庄与圣教同异？」对曰：「将无同？」太尉善其言，辟之为掾。世谓「三语掾」。…</blockquote>
<h2>别名</h2><p>语无同、三语掾、工三语、求三语、三语作掾、三语契、王戎、王衍、阮修、阮瞻</p>
<h2>用它的诗</h2>
<p>同崔傅答贤弟 · 王维 <span class="verse">「更闻台阁求三语」</span></p>
