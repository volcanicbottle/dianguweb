<h1>五色棒</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《三国志》</p><blockquote>「太祖少机警，有权数，而任侠放荡，不治行业，故世人未之奇也；惟梁国桥玄、南阳何颙异焉。玄谓太祖曰：『天下将乱，非命世之才不能济也，能安之者，其在君乎！』年二十，举孝廉为郎，除洛阳北部尉，迁顿丘令，徵拜议郎。」南朝梁·刘孝标注引《曹瞒传》曰：「太祖初入尉廨，缮治四门。造五色棒，县门左右各十馀枚，有犯禁，不避豪彊，皆棒杀之。后数月，灵帝爱幸小黄门蹇硕叔父夜行，即杀之。京师敛，莫敢犯者。」…</blockquote>
<h2>别名</h2><p>悬棒、曹操（魏武帝）</p>
<h2>用它的诗</h2>
<p>有感二首 二 · 李商隐 <span class="verse">「苍黄五色棒」</span></p>
