<h1>种柳营中</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>侃在军四十一载，雄毅有权，明悟善决断。自南陵迄于白帝数千里中，路不拾遗。苏峻之役，庾亮轻进失利。亮司马殷融诣侃谢曰：「将军为此，非融等所裁。」将军王章至，曰：「章自为之，将军不知也。」侃曰：「昔殷融为君子，王章为小人；今王章为君子，殷融为小人。」侃性纤密好问，颇类赵广汉。尝课诸营种柳，都尉夏施盗官柳植之于己门。侃后见，驻车问曰：「此是武昌西门前柳，何因盗来此种？」施惶怖谢罪。…</blockquote>
<h2>别名</h2><p>陶侃</p>
