<h1>掷地</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>掷地篇：喻文辞优美。唐羊士谔《郡中玩月寄江南李少府尹虞部孟员外》：“兹夕披云望，还吟掷地篇。”</p>
<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>孙兴公作天台赋成，以示范荣期，云：「卿试掷地，要作金石声。」范曰：「恐子之金石，非宫商中声！」然每至佳句，辄云：「应是我辈语。」…</blockquote>
<h2>别名</h2><p>金石击撞、金石声、金声掷地、金玉铿如、掷地胜如金玉、掷地篇、掷金、孙绰</p>
<h2>用它的诗</h2>
<p>汉宫春 · 辛弃疾 <span class="verse">「金玉铿如」</span></p>
