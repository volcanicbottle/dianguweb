<h1>倒载干戈</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《礼记·乐记》</p><blockquote>「武王克殷。反商。……车甲?而藏之府库。而弗复用。倒载干戈。包之以虎皮。将帅之士。使为诸侯。名之曰建橐。然后天下知武王之不复用兵也。」东汉·郑玄注：「包干戈以虎皮，明能以武服兵也。」唐·孔颖达疏：「包之以虎皮者，虎皮，武猛之物也。用此虎皮包裹兵器，示武王威猛能包制服天下兵戈也，或以虎皮有文，欲以见文止武也。」…</blockquote>
<h2>别名</h2><p>干戈识虎皮、周武王</p>

<p>即事 · 杜牧 <span class="verse">「早晚干戈识虎皮」</span></p>
