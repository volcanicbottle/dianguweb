<h2>出处</h2><p>北魏·郦道元《水经注》卷三十七《?水》引邓德明《南康记》</p><blockquote>昔有卢耽，仕州为治中，少栖仙术，善解云飞，每夕辄凌虚归家，晓则还州，尝于元会至朝，不及朝列，化为白鹄至阙前，回翔欲下，威仪以石掷之，得一只履，耽惊还就列，内外左右，莫不骇异。…</blockquote>
