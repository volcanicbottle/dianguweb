<h1>戍瓜</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>瓜时：指七月。唐杜甫《秋日夔府咏怀奉寄郑监李宾客一百韵》：“瓜时犹旅寓，萍泛苦夤缘。”</p>
<h2>出处</h2><p>《春秋左传正义》</p><blockquote>齐侯使连称。管至父。戍葵丘。瓜时而往。曰。及瓜而代。期戍。公问不至。请代。弗许。故谋作乱。僖公之母弟曰。夷仲年。生公孙无知。有宠于僖公衣服礼秩如适。襄公绌之。二人因之以作乱。连称有从妹在公宫。无宠。使间公。曰。捷。吾以女为夫人。…</blockquote>
<h2>别名</h2><p>及瓜而代、及瓜代、及瓜、及瓜归、随瓜卸、瓜期、瓜时、连称、齐侯</p>
<h2>用它的诗</h2>
<p>送外甥郑灌从军三首 三 · 李白 <span class="verse">「及瓜归日未应迟」</span></p>
