<h1>巡檐索笑</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>〈舍弟观赴蓝田取妻子到江陵喜寄三首〉其二：「马度秦关雪正深【马度秦山雪正深】【马瘦秦关雪正深】【马瘦秦山雪正深】，北来肌骨苦寒侵。他乡就我生春色，故国移居见客心。剩欲提携如意舞【欢剧提携如意舞】，喜多行坐白头吟。巡檐索共梅花笑【巡檐索近梅花笑】，冷蕊疏枝半不禁【冷落疏枝半不禁】。」…</blockquote>
<h2>别名</h2><p>疏枝冷蕊、索笑梅花、巡檐一笑、巡索、巡檐共笑、索尽梅花笑、索笑画檐、索檐花笑、一笑端须问花借、冷蕊、梅花索巡檐笑、梅奴索笑</p>
