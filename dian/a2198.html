<h1>与蛟龙争</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>澹台璧：喻气概豪迈。南朝梁何逊《和刘咨议守风》：“本惭佽飞剑，宁慕澹台璧。”</p>
<h2>出处</h2><p>《水经注》</p><blockquote>河水又东北，通谓之延津。石勒之袭刘曜，途出于此，以河冰泮为神灵之助，号是处为灵昌津。昔澹台子羽赍千金之璧渡河，阳侯波起，两蛟挟舟。子羽曰：吾可以义求，不可以威劫。操剑斩蛟，蛟死，波休，乃投璧于河，三投而辄跃出，乃毁璧而去，示无吝意。…</blockquote>
<h2>别名</h2><p>澹台璧、与阳侯争、澹台毁璧、拔剑斩蛟、让双璧、水神夺、斩蛟破璧、澹台灭明</p>
<h2>用它的诗</h2>
<p>桃竹杖引赠章留后 · 杜甫 <span class="verse">「拔劒或与蛟龙争」</span></p>
