<h2>出处</h2><p>《史记》</p><blockquote>始皇还，过彭城，斋戒祷祠，欲出周鼎泗水。使千人没水求之，弗得。乃西南渡淮水，之衡山、南郡。浮江，至湘山祠。逢大风，几不得渡。上问博士曰：「湘君何神？」博士对曰：「闻之，尧女，舜之妻，而葬此。」于是始皇大怒，使刑徒三千人皆伐湘山树，赭其山。上自南郡由武关归。…</blockquote>
