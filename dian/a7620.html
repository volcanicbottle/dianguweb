<h1>倘来轩冕</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子集释》</p><blockquote>古之所谓得志者，非轩冕之谓也，谓其无以益其乐而已矣。今之所谓得志者，轩冕之谓也。轩冕在身，非性命也，物之傥来，寄者也。寄之，其来不可圉，其去不可止。故不为轩冕肆志，不为穷约趋俗，其乐彼与此同，故无忧而已矣。今寄去则不乐，由是观之，虽乐，未尝不荒也。故曰，丧己于物，失性于俗者，谓之倒置之民。唐·成玄英疏：「益，加也。轩，车也。冕，冠也。古人淳朴，体道无为，得志在乎恬夷，取乐非关轩冕。乐已足矣，岂待加之也！今世之人，浇浮者众，贪美荣位，待此…</blockquote>
