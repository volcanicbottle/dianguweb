<h1>养鸡</h1>
<p class="meta">典故 · 3 首诗使用</p>
<h2>释义</h2><p>祝鸡翁：称誉老人。唐刘禹锡《重寄表臣二首》之二：“早晚同归洛阳陌，卜邻须近祝鸡翁。”</p>
<h2>出处</h2><p>《列仙传》</p><blockquote>《列仙传》曰：「祝鸡翁者，洛人也。居尸乡北山下，养鸡百馀年。鸡有千馀头，皆立名字。暮栖树上，昼放散之。欲引，呼名，即依呼而至。卖鸡及子得千馀万，辄置钱去。之吴作养鱼池。后升吴山，白鹤孔雀数百，常止其傍。」…</blockquote>
<h2>别名</h2><p>祝鸡翁、尸乡翁、尸乡养鸡</p>
<h2>用它的诗</h2>
<p>重寄表臣二首 二 · 刘禹锡 <span class="verse">「卜隣须近祝鸡翁」</span></p>
