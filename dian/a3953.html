<h1>淮南药</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>淮南王安为人好书，鼓琴，不喜弋猎狗马驰骋，亦欲以行阴德拊循百姓，流名誉。招致宾客方术之士数千人，作为《内书》二十一篇，《外书》甚众，又有《中篇》八卷，言神仙黄白之术，亦二十馀万言。……上使宗正以符节治王。未至，安自刑杀。…</blockquote>
<h2>别名</h2><p>淮王丹、淮王术、淮王爱道、淮南登仙、淮王羽化、刘安</p>
<h2>用它的诗</h2>
<p>玩月呈汉中王 · 杜甫 <span class="verse">「欲得淮王术」</span></p>
