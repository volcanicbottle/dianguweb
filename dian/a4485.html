<h1>角弓诗</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《春秋左传·昭公二年》</p><blockquote>晋侯使韩宣子来聘，且告为政而来见礼也，观书于大史氏，见易象与鲁春秋曰：「周礼尽在鲁矣。吾乃今知周公之德与周之所以王也。」公享之。季武子赋《绵》之卒章。韩子赋《角弓》。季武子拜曰：「敢拜子之弥缝敝邑，寡君有望矣。武子赋《节》之卒章。既享，宴于季氏，有嘉树焉，宣子誉之。武子曰：「宿敢不封殖此树，以无忘《角弓》。」遂赋《甘棠》。…</blockquote>
<h2>别名</h2><p>韩宣子</p>
<h2>用它的诗</h2>
<p>冬日有怀李白 · 杜甫 <span class="verse">「不忘角弓诗」</span></p>
