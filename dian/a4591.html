<h1>金銮殿</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐文》</p><blockquote>公名白，字太白，其先陇西成纪人。绝嗣之家，难求谱谍。公之孙女搜于箱箧中，得公之亡子伯禽手疏十数行，纸坏字缺，不能详备。约而计之，凉武昭王九代孙也。隋末多难，一房被窜于碎叶，流离散落，隐易姓名。故自国朝已来，漏于属籍。神龙初，潜还广汉。因侨为郡人。父客，以逋其邑，遂以客为名。高卧云林，不求禄仕。公之生也，先府君指天枝以复姓，先夫人梦长庚而告祥，名之与字，咸所取象。受五行之刚气，叔夜心高；挺三蜀之雄才，相如文逸。瑰奇宏廓，拔俗无类。少以侠自…</blockquote>
