<h2>出处</h2><p>《世说新语》</p><blockquote>「王戎弱冠诣阮籍，时刘公荣在坐。阮谓王曰：『偶有二斗美酒，当与君共饮。彼公荣者，无预焉。』二人交觞酬酢，公荣遂不得一杯。而言语谈戏，三人无异。或有问之者，阮荅曰：『胜公荣者，不得不与饮酒；不如公荣者，不可不与饮酒；唯公荣，可不与饮酒。』」…</blockquote>
