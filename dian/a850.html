<h2>出处</h2><p>《后汉书》</p><blockquote>孟敏字叔达，钜鹿杨氏人也。客居太原。荷甑墯地，不顾而去。林宗见而问其意。对曰：「甑以破矣，视之何益？」林宗以此异之，因劝令游学。十年知名，三公俱辟，并不屈云。…</blockquote>
