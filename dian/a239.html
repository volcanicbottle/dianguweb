<h1>一叶知秋</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《淮南子》</p><blockquote>见一叶落，而知岁之将暮；睹瓶中之冰，而知天下之寒；以近论远。三人比肩，不能外出户；一人相随，可以通天下。足●地而为，暴行而为影，此易而难。庄王诛里史，孙叔敖制冠浣衣；文公弃荏席，后黴黑，咎犯辞归，故桑叶落而长年悲也。…</blockquote>
<h2>别名</h2><p>一叶、一叶秋风、一夜惊秋、一叶鸣秋、淮南两句、一叶秋</p>
