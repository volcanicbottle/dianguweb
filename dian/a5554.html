<h1>宰相纱笼</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《太平广记》</p><blockquote>唐王播少孤贫，尝客扬州惠照寺木兰院，随僧斋食。后厌怠，乃斋罢而后击钟。后二纪，播自重位出镇是邦，因访旧游，向之题名皆以碧纱罩其诗。播继以二绝句曰：「三十年前此院游，木兰花发院新修。如今再到经行处，树老无花僧白头。上堂未了各西东，惭愧阇黎饭后钟。三十年来尘扑面，如今始得碧纱笼。」…</blockquote>
<h2>别名</h2><p>姓名潜护有笼纱、钟闻饭后、醉墨碧纱犹锁、笼纱、王播</p>
