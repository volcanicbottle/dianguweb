<h1>才术褚先生</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《南史》</p><blockquote>褚伯玉字元璩，吴郡钱唐人也。……伯玉少有隐操，寡嗜欲。年十八，父为之婚，妇入前门，伯玉从后门出。遂往剡，居瀑布山。性耐寒暑，时人比之王仲都。在山三十馀年，隔绝人物。王僧达为吴郡，苦礼致之，伯玉不得已，停郡信宿，裁交数言而退。宁朔将军丘珍孙与僧达书曰：「闻褚先生出居贵馆，此子灭景云栖，不事王侯，抗高木食，有年载矣。自非折节好贤，何以致之。昔文举栖冶城，安道入昌门，于兹而三焉。夫粒之士，餐霞之人，乃可暂致，不宜久羁。君当思遂其高步，成其羽…</blockquote>
<h2>别名</h2><p>褚伯玉</p>
<h2>用它的诗</h2>
<p>赠别褚山人 · 高适 <span class="verse">「才术褚先生」</span></p>
