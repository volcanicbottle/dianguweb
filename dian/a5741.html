<h1>马上送明君</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《乐府诗集》</p><blockquote>明君歌舞者，晋太康中，(石)季伦所作也。王明君本名昭君，以触文帝讳，故晋人谓之明君。匈奴盛，请婚于汉，元帝以后宫良家子明君配焉。初武帝以江都王建女细君为公主，嫁乌孙王昆莫，命琵琶马上作乐，以慰其道路之思，送明君亦然也。其新造之曲，多哀怨之声。晋宋以来，明君正以弦隶，少许为上舞而已。梁天监中，斯宣达为乐府，令与诸乐工以清商两相间弦为明君上舞，传之至今。…</blockquote>
<h2>别名</h2><p>王昭君、毛延寿</p>
<h2>用它的诗</h2>
