<h1>四万八千丈</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>四万八千丈，传闻中的夸张说法，《云笈七籤》说是高一万八千丈。山洞周围相传有晋葛洪炼丹处。以上这一段，是借宾定主，即力抑五岳、赤城、天台，以托出天姥之高。</p>
<h2>出处</h2><p>《云笈七籤》</p><blockquote>四万八千丈，传闻中的夸张说法，《云笈七籤》说是高一万八千丈。山洞周围相传有晋葛洪炼丹处。以上这一段，是借宾定主，即力抑五岳、赤城、天台，以托出天姥之高。…</blockquote>

<h2>用它的诗</h2>
<p>梦游天姥吟留别 · 李白 <span class="verse">「天台四万八千丈」</span></p>
