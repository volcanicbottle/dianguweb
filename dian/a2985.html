<h1>伏波铜柱</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>援将楼船大小二千馀艘，战士二万馀人，进击九真贼徵侧馀党都羊等，自无功至居风，斩获五千馀人，峤南悉平。唐·李贤注引《广州记》曰：「援到交阯，立铜柱，为汉之极界也。」…</blockquote>
<h2>别名</h2><p>汉柱、马援铜柱、铜柱伏波、铜柱、马援柱、汉将柱、铜柱勋高、云深铜柱、马柱、铜柱楼船、马援</p>
<h2>用它的诗</h2>
<p>和南海马大夫闻杨侍郎出守郴州因有寄上之作 · 刘禹锡 <span class="verse">「铜柱勋高压海门」</span></p>
