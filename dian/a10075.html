<h1>紫囊</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>紫罗囊：喻指香囊，或喻精美之物。唐杜甫《又示宗武》：“试吟青玉案，莫羡紫罗囊。”</p>
<h2>出处</h2><p>《晋书》</p><blockquote>玄字幼度。少颖悟，与从兄朗俱为叔父安所器重。安尝戒约子侄，因曰：「子弟亦何豫人事，而正欲使其佳？」诸人莫有言者。玄答曰：「譬如芝兰玉树，欲使其生于庭阶耳。」安悦。玄少好佩紫罗香囊，安患之，而不欲伤其意，因戏赌取，即焚之，于此遂止。…</blockquote>
<h2>别名</h2><p>紫罗囊、紫香囊、谢玄</p>
<h2>用它的诗</h2>
<p>又示宗武 · 杜甫 <span class="verse">「莫羡紫罗囊」</span></p>
<p>酬郑州权舍人见寄十二韵 · 刘禹锡 <span class="verse">「彩服紫罗囊」</span></p>
