<h1>黄雀衔</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《搜神记》</p><blockquote>汉时，弘农杨宝，年九岁时。至华阴山北，见一黄雀，为鸱枭所搏，坠于树下，为蝼蚁所困。宝见，悯之，取归置巾箱中，食以黄花，百馀日，毛羽成，朝去，暮还。一夕，三更，宝读书未卧，有黄衣童子，向宝再拜曰：「我西王母使者，使蓬莱，不慎，为鸱枭所搏。君仁爱，见拯，实感盛德。」乃以白环四枚与宝曰：「令君子孙洁白，位登三事，当如此环。」…</blockquote>
<h2>别名</h2><p>衔环报、黄雀报、衔环雀、汉环、黄雀衔环、白环报、衔环、报恩环、袭汉环、饲雀传庆、杨宝、四代三公</p>
