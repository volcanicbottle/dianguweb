<h1>閒居赋</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>岳性轻躁，趋世利，与石崇等谄事贾谧，每候其出，与崇辄望尘而拜。构悯怀之文，岳之辞也。谧二十四友，岳为其首。谧晋书限断，亦岳之辞也。其母数诮之曰：「尔当知足，而乾没不已乎？」而岳终不能改。既仕宦不达，乃作闲居赋。…</blockquote>
<h2>别名</h2><p>闲居赋、潘岳闲居、潘郎作赋、潘岳</p>
<h2>用它的诗</h2>
<p>丁宇田家有赠 · 王维 <span class="verse">「或制闲居赋」</span></p>
