<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《艺文类聚》</p><blockquote>《真人周君传》：紫阳真人周义山，字委通，汝阴人也。闻有栾先生，得道在蒙山，能读龙峤经，乃追寻之。入蒙山，遇羡门子，乘白鹿，执羽盖，佩青毛之节，侍从十馀玉女。君乃再拜叩头，乞长生要诀。羡门子曰：「子名在丹台玉室之中，何忧不仙？远越江河来，登此何索？」…</blockquote>
<h2>别名</h2><p>丹台名、书仙籍、丹台名姓、丹台旧籍</p>
