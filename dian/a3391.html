<h1>杨仆移关</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>「三年冬，徙函谷关于新安。以故关为弘农县。」东汉·应劭注：「时楼船将军杨仆数有大功，耻为关外民，上书乞徙东关，以家财给其用度。武帝意亦好广阔，于是徙关于新安，去弘农三百里。」…</blockquote>
<h2>别名</h2><p>关识新安、杨仆惭为关外人、刘彻（汉武帝）、杨仆</p>
<h2>用它的诗</h2>
<p>荆山 · 李商隐 <span class="verse">「杨仆移关三百里」</span></p>
