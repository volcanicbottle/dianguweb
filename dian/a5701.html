<h1>罗池客</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐文》</p><blockquote>罗池庙者，故刺史柳侯庙也。柳侯为州，不鄙夷其民，动以礼法。三年，民各自矜奋曰：「兹土虽远京师，吾等亦天氓，今天幸惠仁侯，若不化服，我则非人。」于是老幼相教语，莫违侯令。凡有所为于其乡闾及于其家，皆曰：「吾侯闻之，得无不可于意否？」莫不忖度而后从事。凡令之期，民劝趋之，无有后先，必以其时。于是民业有经，公无负租，流逋四归，乐生兴事。宅有新屋，步有新船，池园洁修，猪牛鸭鸡，肥大蕃息。子严父诏，妇顺夫指，嫁娶葬送，各有条法，出相弟长，入相慈孝…</blockquote>
