<h1>天地清宁</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《老子·德经·三十九章》</p><blockquote>昔之得一者：天得一以清，地得一以宁，神得一以灵，谷得一以盈，万物得一以生，侯王得一以为天下正。天无以清，将恐裂；地无以宁，将恐发；神无以灵，将恐歇；谷无以盈，将恐竭；万物无以生，将恐灭；侯王无以贵高，将恐蹶。故贵以贱为本，高以下为基。是以侯王自谓孤、寡、不毂，此其以贱为本耶非？故致数车无车。不欲琭琭如玉，落落如石。…</blockquote>
