<h1>柯笛</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>柯笛：咏笛。唐李縠《浙东罢府西归酬别张广文皮先辈陆秀才》：“兰亭旧址虽曾见，柯笛遗音更不传。”</p>
<h2>出处</h2><p>《后汉书》</p><blockquote>「邕虑卒不免，乃亡命江海，远迹吴会。」唐·李贤注引晋·张骘《文士传》曰：「邕告吴人曰：『吾昔尝经会稽高迁亭，见屋椽竹东閒第十六可以为笛。』取用，果有异声。」伏滔〈长笛赋序〉云「柯亭之观，以竹为椽，邕取为笛，奇声独绝」也。…</blockquote>
<h2>别名</h2><p>柯亭笛、笛亭柯、柯亭、柯亭竹、柯亭椽、物比柯亭、中郎竹、柯亭奇竹、蔡邕</p>
<h2>用它的诗</h2>
<p>寄珉笛与宇文舍人 · 杜牧 <span class="verse">「物比柯亭韵校奇」</span></p>
