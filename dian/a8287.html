<h1>五色药</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《宋书》</p><blockquote>〈折杨柳行〉：西山一何高，高高殊无极。上有两仙僮，不饮亦不食。与我一丸药，光耀有五色。服药四五日，身体生羽翼。轻举乘浮云，倏忽行万亿。流览观四海，芒芒非所识。彭祖称七百，悠悠安可原。老聃适西戎，于今竟不还。王乔假虚词，赤松垂空言。达人识真伪，愚夫好妄传。追念往古事，愦愦千万端。百家多迂怪，圣道我所观。…</blockquote>
<h2>别名</h2><p>五色灵丹、西山灵剂、曹丕（魏文帝）</p>
<h2>用它的诗</h2>
<p>离别难 · 柳永 <span class="verse">「算神仙、五色灵丹无验」</span></p>
