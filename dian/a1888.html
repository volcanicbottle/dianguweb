<h1>传癖</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>左传癖：喻指勤奋读书，钻研学问。宋陆游《夜坐》：“辛苦空成《左传》癖，逍遥常愧大慈仙。”</p>
<h2>出处</h2><p>《裴子语林》</p><blockquote>王武子性爱马，亦甚别之，故杜预道王武子有马癖，和长舆有钱癖。武帝问杜预：『卿有何癖？』对曰：『臣有左传癖。』…</blockquote>
<h2>别名</h2><p>春秋癖、左传癖、书癖、杜预</p>
<h2>用它的诗</h2>
<p>八哀诗 赠司空王公思礼 · 杜甫 <span class="verse">「饱闻春秋癖」</span></p>
