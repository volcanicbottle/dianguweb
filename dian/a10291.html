<h1>抛家傍路</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>抛家傍路两句：韩愈《晚春》诗，“杨花榆荚无才思，惟解漫天作雪飞。”这里是说：杨花离开枝头，落在路边，看似无情，却也有它的深意。思，念去声。</p>
<h2>出处</h2><p>《晚春》</p><blockquote>抛家傍路两句：韩愈《晚春》诗，“杨花榆荚无才思，惟解漫天作雪飞。”这里是说：杨花离开枝头，落在路边，看似无情，却也有它的深意。思，念去声。…</blockquote>
<h2>别名</h2><p>抛家傍路两句</p>
<h2>用它的诗</h2>
<p>水龙吟 · 苏轼 <span class="verse">「抛家傍路思量却是无情有思」</span></p>
