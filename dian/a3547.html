<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全上古三代秦汉三国六朝文·全汉文》</p><blockquote>《方士传》言，邹衍在燕，燕有谷，地美而寒，不生五谷。邹子居之，吹律而温气至，而黍生，今名黍谷。…</blockquote>
<h2>别名</h2><p>鸣律、燕谷暖、邹衍律、律通幽谷、黍生春、邹生吹律、寒谷、暖律、黍谷可吹、邹衍</p>
