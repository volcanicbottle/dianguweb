<h1>丝篁</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>昵昵儿女语【妮妮儿女语】，恩怨相尔汝。划然变轩昂，勇士赴敌场。浮云柳絮无根蒂，天地阔远随飞扬。喧啾百鸟群，忽见孤凤皇。跻攀分寸不可上，失势一落千丈强。嗟余有两耳，未省听丝篁。自闻颖师弹，起坐在一旁【起坐在一床】。推手遽止之，湿衣泪滂滂。颖乎尔诚能，无以冰炭置我肠。…</blockquote>
<h2>别名</h2><p>昵昵儿女语、儿女恩怨、恩怨相尔汝、儿女语，变轩昂</p>
