<h1>秋菊堪餐</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>秋菊堪餐两句：《楚辞·礼魂》，“春兰兮秋菊，长无绝兮终古。”又《楚辞·离骚》：“扈江离与辟芷兮，纫秋兰以为佩。”“朝饮木兰之坠露兮，夕餐秋菊之落英。”</p>
<h2>出处</h2><p>《楚辞·礼魂》</p><blockquote>秋菊堪餐两句：《楚辞·礼魂》，“春兰兮秋菊，长无绝兮终古。”又《楚辞·离骚》：“扈江离与辟芷兮，纫秋兰以为佩。”“朝饮木兰之坠露兮，夕餐秋菊之落英。”…</blockquote>
<h2>别名</h2><p>秋菊堪餐两句</p>
<h2>用它的诗</h2>
<p>沁园春 · 辛弃疾 <span class="verse">「东冈更葺茅斋好都把轩窗临水开要小舟行钓先应种柳疏篱护竹莫碍观梅秋菊堪餐春兰可佩」</span></p>
