<h1>指飞鸿</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>郭瑀字元瑜，敦煌人也。少有超俗之操，东游张掖，师事郭荷，尽传其业。精通经义，雅辩谈论，多才艺，善属文。荷卒，瑀以为父生之，师成之，君爵之，而五服之制，师不服重，盖圣人谦也，遂服斩衰，庐墓三年。礼毕，隐于临松薤谷，凿石窟而居，服柏实以轻身，作春秋墨说、孝经错纬，弟子著录千馀人。张天锡遣使者孟公明持节，以蒲轮玄纁备礼徵之，……公明至山，瑀指翔鸿以示之曰：「此鸟也，安可笼哉！」…</blockquote>
<h2>别名</h2><p>郭瑀</p>
