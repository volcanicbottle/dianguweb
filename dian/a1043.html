<h2>出处</h2><p>《苏轼诗集》</p><blockquote>满地春风扫落花，几番曾醉长官衙。诗成锦绣开胸臆，论极冰霜绕齿牙。别后与谁同把酒，客中无日不思家。田园知有儿孙委，早晚扁舟到海涯。…</blockquote>
<h2>别名</h2><p>风霜生颊齿、论兵齿颊带霜寒、绕齿冰霜</p>
