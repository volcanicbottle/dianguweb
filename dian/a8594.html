<h1>谢郎巧思</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《嘉泰会稽志》</p><blockquote>越渔者杨父，一女，绝色，为诗不过两句。或问：「胡不终篇？」荅曰：「无奈情思缠绕，至两句即思迷不继。」有谢生求娶焉。父曰：「吾女宜配公卿。」谢曰：「谚云：少女少郎，相乐不忘；少女老翁，苦乐不同。且安有少年公卿耶？」翁曰：「吾女词多两句，子能续之，称其意，则妻矣。」示其篇曰：「珠帘半床月，青竹满林风。」谢续曰：「何事今宵景，无人解与同？」女曰：「天生吾夫！」遂偶之。后七年，春日，杨忽题曰：「春尽花随尽，其如自是花。」谢曰：「何故为不祥句？」…</blockquote>
