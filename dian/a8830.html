<h1>颜光禄</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《诗品》</p><blockquote>其源出于陆机，尚巧似，体裁绮密，情喻渊深，动无虚散，一句一字，皆致意焉。又喜用古事，弥见拘束，虽乖秀逸，是经纶文雅才，雅才减若人，则蹈于困踬矣。汤惠休曰：「谢诗如芙蓉出水，颜如错彩镂金。」颜终身病之。…</blockquote>
<h2>别名</h2><p>颜延年（延之）</p>
<h2>用它的诗</h2>
<p>韩十八侍御见示岳阳楼别窦司直诗因令属和重以自述故足成六十二韵 · 刘禹锡 <span class="verse">「何必颜光禄」</span></p>
<p>寄宣州郑谏议 · 杜牧 <span class="verse">「五言宁谢颜光禄」</span></p>
