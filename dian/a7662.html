<h1>渊明趣</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《先秦汉魏晋南北朝诗·晋诗》</p><blockquote>归去来兮田园将芜胡不归，既自以心为形役。奚惆怅而独悲，悟已往之不谏。知来者之可追，实迷途其未远，觉今是而昨非。舟遥遥以轻飏，风飘飘而吹衣。问征夫以前路，恨晨光之熹微。乃瞻衡宇，载欣载奔。僮仆欢迎，稚子候门。三径就荒，松菊犹存。携幼入室，有酒盈樽。引壶觞以自酌，眄庭柯以怡颜。倚南窗以寄傲，审容膝之易安。园日涉以成趣，门虽设而常关。…</blockquote>
<h2>别名</h2><p>陶园佳趣、陶潜</p>
