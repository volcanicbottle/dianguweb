<h1>佩韦弦</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《韩非子》</p><blockquote>古之人目短于自见，故以镜观面；智短于自知，故以道正己。故镜无见疵之罪，道无明过之怨。目失镜则无以正须眉，身失道则无以知迷惑。西门豹之性急，故佩韦以自缓；董安于之心缓，故佩弦以自急。故以有馀补不足，以长续短之谓明主。…</blockquote>
<h2>别名</h2><p>韦弦佩、佩韦、韦弦、西门豹</p>
