<h1>玉版句</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《冷斋夜话》</p><blockquote>东坡自海南至虔上，以水涸不可舟，逗留月馀，时过慈云寺浴。长老明鉴，魁梧如所画慈恩，然丛林不以道学与之。东坡作偈戏之曰：「居士无尘堪洗沐，老师有句借宣扬。窗间但见蝇钻纸，门外时闻佛放光。遍界难藏真薄相，一丝不挂且逢场。却须重说圆通偈，千眼熏笼是法王。」又尝要刘器之同参玉版和尚，器之每倦山行，闻见玉版，忻然从之。至廉泉寺，烧笋而食，器之觉笋味胜，问：「此笋何名？」东坡曰：「即玉版也。此老师善说法，要能令人得禅悦之味。」于是器之乃悟其戏，为大…</blockquote>
<h2>别名</h2><p>苏轼</p>

<p>行香子 · 辛弃疾 <span class="verse">「玉版句」</span></p>
