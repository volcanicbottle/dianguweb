<h1>七擒</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>七擒略：指运用智计使人彻底折服。唐李白《书怀赠南陵常赞府》：“将无七擒略，鲁女惜园葵。”</p>
<h2>出处</h2><p>《三国志》</p><blockquote>南朝宋·裴松之注引《汉晋春秋》：「亮至南中，所在战捷。闻孟获者，为夷、汉所服，募生致之。既得，使观于营陈之閒，问曰：『此军何如？』获对曰：『向者不知虚实，故败。今蒙赐观看营陈，若祇如此，即定易胜耳。』亮笑，纵使更战，七纵七禽，而亮犹遣获。获止不去，曰：『公，天威也，南人不复反矣。』」…</blockquote>
<h2>别名</h2><p>七擒略、七禽、七緃七擒、纵擒孟获、孔明、孟获</p>
<h2>用它的诗</h2>
<p>书怀赠南陵常赞府 · 李白 <span class="verse">「将无七擒略」</span></p>
