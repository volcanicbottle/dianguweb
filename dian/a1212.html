<h1>富贵浮云</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《论语注疏·述而》</p><blockquote>子曰：「饭疏食，饮水，曲肱而枕之，乐亦在其中矣。不义而富且贵，于我如浮云。」宋·邢炳疏：「疏食，菜食也。肱，臂也。言已饭菜食、饮水、寝则曲肱而枕之，以此为乐。不义而富且贵，于我如浮云者，富与贵虽人之所欲，若富贵而以不义者，于我如浮云，言非已之有也。」…</blockquote>
<h2>别名</h2><p>浮云富贵、等浮云、富贵如浮云、浮云轻、属浮云、不义若浮云、富贵白天、孔子</p>
