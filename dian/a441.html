<h1>泛海船</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《世说新语》</p><blockquote>谢太傅盘桓东山时，与孙兴公诸人汎海戏。中兴书曰：「安先居会稽，与支道林、王羲之、许询共游处。出则渔弋山水，入则谈说属文，未尝有处世意也。」风起浪涌，孙、王诸人色并遽，便唱使还。太傅神情方王，吟啸不言。舟人以公貌闲意说，犹去不止。既风转急，浪猛，诸人皆諠动不坐。公徐云：「如此，将无归！」众人即承响而回。于是审其量，足以镇安朝野。…</blockquote>
<h2>别名</h2><p>谢安舟楫、安石泛溟渤、笑傲中流、谢安泛海、谢安</p>
<h2>用它的诗</h2>
<p>戏作寄上汉中王二首 二 · 杜甫 <span class="verse">「谢安舟楫风还起」</span></p>
<p>与南陵常赞府游五松山 · 李白 <span class="verse">「安石泛溟渤」</span></p>
