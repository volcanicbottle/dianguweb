<h2>出处</h2><p>《史记》</p><blockquote>「七国反书闻天子，天子乃遣太尉条侯周亚夫将三十六将军，往击吴楚」「条侯将乘六乘传，会兵荥阳。至雒阳，见剧孟，喜曰：『七国反，吾乘传至此，不自意全。又以为诸侯已得剧孟，剧孟今无动。吾据荥阳，以东无足忧者。』」…</blockquote>
