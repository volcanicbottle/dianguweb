<h1>平子赋</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>平子赋：喻精美文章，或咏归隐及哀愁。唐皇甫冉《馆陶李丞旧居》：“词藻世传平子赋，园林人比郑公乡。”</p>
<h2>出处</h2><p>《昭明文选》</p><blockquote>游都邑以永久，无明略以佐时……谅天道之微昧，追渔父以同嬉。…</blockquote>
<h2>别名</h2><p>平子归田、平子赋归田、平子去、张衡作赋、平子田、平子归休、张衡</p>
<h2>用它的诗</h2>
<p>送钱少府还蓝田 · 王维 <span class="verse">「手持平子赋」</span></p>
<p>题长安主人壁 · 孟浩然 <span class="verse">「欲随平子去」</span></p>
