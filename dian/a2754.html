<h1>草庐三顾</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>三顾：咏帝王爱才求贤。唐杜甫《蜀相》：“三顾频烦天下计，两朝开济老臣心。”</p>
<h2>出处</h2><p>《三国志》</p><blockquote>诸葛亮〈出师表〉：「先帝不以臣卑鄙，猥自枉屈，三顾臣于草庐之中，咨臣以当世之事。」…</blockquote>
<h2>别名</h2><p>顾庐、三顾茅庐、三顾、三接恩、三顾隆中、答三顾、隆中顾、访葛侯、蜀主思孔明、刘备、诸葛亮（字孔明）</p>
<h2>用它的诗</h2>
