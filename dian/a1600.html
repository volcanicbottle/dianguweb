<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>今延寿、汤睹便宜，乘时利，结城郭诸国，擅兴师矫制而征之，赖天地宗庙之灵，诛讨郅支单于，斩获其首，及阏氏贵人名王以下千数。虽踰义干法，内不烦一夫之役，不开府库之臧，因敌之粮以赡军用，立功万里之外，威震百蛮，名显四海。…</blockquote>
<h2>别名</h2><p>陈汤</p>
<h2>用它的诗</h2>
<p>夏州崔常侍自少常亚列出领麾幢十韵 · 杜牧 <span class="verse">「陈汤事偶成」</span></p>
