<h1>衣冠就东市</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>「丞相青翟、中尉嘉、廷尉欧劾奏错曰：『吴王反逆亡道，欲危宗庙，天下所当共诛。』今御史大夫错议曰：『兵数百万，独属群臣，不可信，陛下不如自出临兵，使错居守。徐、僮之旁吴所未下者可以予吴。』错不称陛下德信，欲疏群臣百姓，又欲以城邑予吴，亡臣子礼，大逆无道。错当要斩，父母妻子同产无少长皆弃韨。臣请论如法。』制曰：『可。』错殊不知。乃使中尉召错，绐载行韨。错衣朝衣斩东韨。」…</blockquote>
<h2>别名</h2><p>晁错和衣东市、晁错、诛错为名</p>
<h2>用它的诗</h2>
<p>河湟 · 杜牧 <span class="verse">「旋见衣冠就东市」</span></p>
