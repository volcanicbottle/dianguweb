<h1>负局先生</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《列仙传》</p><blockquote>负局先生者，不知何许人也。语似燕代间人。常负磨镜局，徇吴市中，衒磨镜，一钱因磨之，辄问主人，得无有疾苦者，辄出紫药丸以与之，得者莫不愈，如此数十年。后大疾病，家至户到，与药活者万计，不取一钱。吴人乃知其真人也。后止吴山绝崖，悬药与人。将欲去时，语下人曰：「吾欲还蓬莱山，为汝曹下神水。崖头一旦有水，白色，从石间流下，服之，多愈疾。立祠十馀处。…</blockquote>
<h2>别名</h2><p>磨镜客、负局仙</p>
<h2>用它的诗</h2>
<p>郑果州相过 · 王维 <span class="verse">「床前磨镜客」</span></p>
