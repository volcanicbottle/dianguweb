<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《能改斋漫录》</p><blockquote>王荆公诗：「卧占宽间五百弓。」又诗：「白下亭东鸣一牛。」又诗：「潮沟直下两牛鸣。」案：唐《西域记》云：「夫数量之称，谓踰缮那，旧曰由旬。踰缮那者，曰古圣王一日军行。旧传一踰缮那，四十里矣。印度国俗乃三十里。教所载惟十六里。穷微之数，分一踰缮那四十里为八拘卢舍。八拘卢舍者，谓大牛鸣声所极闻，为拘卢舍。分一拘卢舍为五百弓。」…</blockquote>

<h2>用它的诗</h2>
<p>与苏卢二员外期游方丈寺而苏不至因有是作 · 王维 <span class="verse">「相去一牛鸣」</span></p>
