<h2>出处</h2><p>《史记》</p><blockquote>魏齐大怒，使舍人笞击睢，折胁摺齿。睢详死，即卷以箦，置厕中。宾客饮者醉，更溺睢，故僇辱以惩后，令无妄言者。睢从箦中谓守者曰：「公能出我，我必厚谢公。」守者乃请出弃箦中死人。魏齐醉，曰：「可矣。」范雎得出。…</blockquote>
