<h1>一粟太仓中</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子集释》</p><blockquote>北海若曰：「井蛙不可以语于海者，拘于虚也；夏虫不可以语于冰者，笃于时也；曲士不可以语于道者，束于教也。今尔出于崖涘，观于大海，乃知尔丑，尔将可与语大理矣。天下之水，莫大于海，万川归之，不知何时止而不盈；尾闾泄之，不知何时已而不虚；春秋不变，水旱不知。此其过江河之流，不可为量数。而吾未尝以此自多者，自以比形于天地而受气于阴阳，吾在于天地之间，犹小石小木之在大山也，方存乎见少，又奚以自多！计四海之在天地之间也，不似礨空之在大泽乎？计中国之在…</blockquote>

<h2>用它的诗</h2>
<p>水调歌头 · 辛弃疾 <span class="verse">「人是一粟太仓中」</span></p>
