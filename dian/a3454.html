<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>以讨华轶功，封馀不亭侯。愉尝行经馀不亭，见笼龟于路者，愉买而放之溪中，龟中流左顾者数四。及是，铸侯印，而印龟左顾，三铸如初。印工以告，愉乃悟，遂佩焉。…</blockquote>
