<h1>张丽华</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《陈书》</p><blockquote>后主张贵妃名丽华，兵家女也。家贫，父兄以织席为事。后主为太子，以选入宫。是时龚贵嫔为良娣，贵妃年十岁，为之给使，后主见而说焉，因得幸，遂有娠，生太子深。后主即位，拜为贵妃。性聪惠，甚被宠遇。后主每引贵妃与宾客游宴，贵妃荐诸宫女预焉，后宫等咸德之，竞言贵妃之善，由是爱倾后宫。又好厌魅之术，假鬼道以惑后主，置淫祀于宫中，聚诸妖巫使之鼓舞，因参访外事，人閒有一言一事，妃必先知之，以白后主，由是益重妃，内外宗族，多被引用。及隋军陷台城，妃与后主…</blockquote>
