<h1>吸海垂虹</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>吸海垂虹：像长鲸那么大喝，像垂虹那么深饮（写酒徒狂饮、豪饮的形态）。杜甫《饮中八仙歌》：“饮如长鲸吸百川。”吸海，疑即化用此典。俗称大碗为海，这里也可能是说用大碗饮酒。垂虹，用虹饮的典故。刘敬叔《异苑》（卷一）：“晋义熙初，晋陵薛愿，有虹饮其釜澳，须臾□响便竭。愿辇酒灌之，随投随涸。”</p>
<h2>出处</h2><p>《饮中八仙歌》</p><blockquote>饮如长鲸吸百川…</blockquote>
