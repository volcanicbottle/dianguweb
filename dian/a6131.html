<h1>欧冶子</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>欧冶剑：指宝剑，或喻良才、美器。唐章孝标《思越州山水寄朱庆除》：“还将欧冶剑，更淬若耶泉。”</p>
<h2>出处</h2><p>东汉·赵晔《吴越春秋》卷四《阖闾内传》</p><blockquote>干将者，吴人也，与欧冶子同师，俱能为剑。……风湖子曰：「臣闻越王元常使欧冶子造剑五枚以示薛烛，烛对曰：『鱼肠剑逆理不顺，不可服也，臣以杀君，子以杀父。』故阖闾以杀王僚。」…</blockquote>
<h2>别名</h2><p>欧冶剑、越欧百鍊</p>
<h2>用它的诗</h2>
<p>同豆卢峰知字韵 · 杜甫 <span class="verse">「炼金欧冶子」</span></p>
