<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>「主父偃，齐国临菑人也。学长短从横术，晚乃学易、春秋、百家之言。游齐诸子间，诸儒生相与排傧，不容于齐。家贫，假贷无所得，北游燕、赵、中山，皆莫能厚，客甚困。以诸侯莫足游者，元光元年，乃西入关见卫将军。将军数言上，上不省。资用乏，留久，诸侯宾客多厌之，乃上书阙下。朝奏，暮召入见。」「乃拜偃、乐、安皆为郎中。偃数上疏言事，迁谒者，中郎，中大夫。岁中四迁。」…</blockquote>
<h2>别名</h2><p>主父、主父偃</p>
<h2>用它的诗</h2>
<p>致酒行 · 李贺 <span class="verse">「主父西游困不归」</span></p>
