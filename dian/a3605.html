<h1>汉南春</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>北周·庾信《庾子山集》卷一《枯树赋》</p><blockquote>桓大司马闻而叹曰：「昔年种柳，依依汉南；今看摇落，凄怆江潭。树犹如此，人何以堪！」…</blockquote>
<h2>别名</h2><p>汉南应老、树异桓宣武、汉南树、老却江潭汉柳、一别汉南、依依种柳、桓温</p>
<h2>用它的诗</h2>
<p>柳边 · 杜甫 <span class="verse">「汉南应老尽」</span></p>
<p>永遇乐 · 姜夔 <span class="verse">「问当时、依依种柳」</span></p>
