<h1>鲁禽</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>鲁禽：喻任性旷达之人。唐骆宾王《远使海曲春夜多怀》：“未安胡蝶梦，遽切鲁禽情。”</p>
<h2>出处</h2><p>《庄子》</p><blockquote>昔者海鸟止于鲁郊，鲁侯御而觞之于庙，奏《九韶》以为乐，具太牢以为膳。鸟乃眩视忧悲，不敢食一脔，不敢饮一杯，三日而死。此以己养养鸟也，非以鸟养养鸟也。…</blockquote>
<h2>别名</h2><p>鲁门海鸟、鲁人疑海鸟、海鸟悲钟鼓</p>
<h2>用它的诗</h2>
<p>赠送前刘五经映三十四韵 · 李商隐 <span class="verse">「海鸟悲钟鼓」</span></p>
