<h2>出处</h2><p>《昭明文选》</p><blockquote>〈古诗十九首〉其十：「迢迢牵牛星，皎皎河汉女。纤纤擢素手，札札弄机杼。终日不成章，泣涕零如雨。河汉清且浅，相去复几许。盈盈一水间，脉脉不得语。」…</blockquote>
<h2>别名</h2><p>一水盈盈、隔银河、银河清浅、隔星河、二星无语、河汉、脉脉情难语、牵牛河汉女、牵牛、织女</p>
