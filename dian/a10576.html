<h1>龙蛇影</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>吾庐小三句：是说屋子就在松林旁边，常常听得到风雨吹打着松林的美妙声音。龙蛇，这里形容松树屈曲的枝干。苏轼《游灵隐高峰塔》诗：“古松攀龙蛇，怪石坐牛羊。”</p>
<h2>出处</h2><p>《游灵隐高峰塔》</p><blockquote>吾庐小三句：是说屋子就在松林旁边，常常听得到风雨吹打着松林的美妙声音。龙蛇，这里形容松树屈曲的枝干。苏轼《游灵隐高峰塔》诗：“古松攀龙蛇，怪石坐牛羊。”…</blockquote>
<h2>别名</h2><p>吾庐小三句</p>
<h2>用它的诗</h2>
<p>沁园春 · 辛弃疾 <span class="verse">「吾庐小在龙蛇影外风雨声中」</span></p>
