<h1>缚楚王</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>人有上书告楚王信反。高帝以陈平计，天子巡狩会诸侯，南方有云梦，发使告诸侯会陈：「吾将游云梦。」实欲袭信，信弗知。高祖且至楚，信欲发兵反，自度无罪，欲谒上，恐见禽。人或说信曰：「斩眛谒上，上必喜，无患。」信见眛计事。眛曰：「汉所以不击取楚，以眛在公所。若欲捕我以自媚于汉，吾今日死，公亦随手亡矣。」乃骂信曰：「公非长者！」卒自刭。信持其首，谒高祖于陈。上令武士缚信，载后车。…</blockquote>
<h2>别名</h2><p>刘邦（汉高祖）、韩信</p>
<h2>用它的诗</h2>
<p>云梦泽 · 杜牧 <span class="verse">「一索功高缚楚王」</span></p>
