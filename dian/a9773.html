<h1>止乎礼义，不淫其色</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《毛诗正义》</p><blockquote>〈关雎〉，后妃之德也，风之始也，所以风天下而正夫妇也，故用之乡人焉，用之邦国焉，风，风也，教也，风以动之，教以化之。诗者，志之所之也，在心为志，发言为诗，情动于中，而形于言，言之不足，故嗟叹之，嗟叹之不足，故永歌之，永歌之不足，不知手之、舞之、足之、蹈之也。情发于声，声成文，谓之音。治世之音，安以乐，其政和。乱世之音，怨以怒，其政乖。亡国之音，哀以思，其民困。故正得失，动天地，感鬼神，莫近于诗。先王以是经夫妇，成孝敬，厚人伦，美教化，移…</blockquote>
