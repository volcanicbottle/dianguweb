<h1>悬河口</h1>
<p class="meta">典故 · 3 首诗使用</p>
<h2>释义</h2><p>悬河：指说话滔滔不绝。宋陆游《闻王嘉叟讣报有作》：“‘笼灯踏雪夜相过，剧论悬河骇邻里。”</p>
<h2>出处</h2><p>《晋书》</p><blockquote>郭象字子玄，少有才理，好老庄，能清言。太尉王衍每云：「听象语，如悬河泻水，注而不竭。」…</blockquote>
<h2>别名</h2><p>口如悬河、口似悬河、诗似悬河、悬河、王衍、郭象</p>
<h2>用它的诗</h2>
<p>石鼓歌 · 韩愈 <span class="verse">「口如悬河」</span></p>
<p>一枝花・促拍满路花 · 辛弃疾 <span class="verse">「万卷悬河口」</span></p>
