<h1>梦鸟</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>吞鸟梦：喻文才出众。唐崔日知《冬日述怀奉呈兰台名贤》：“终期吞鸟梦，振翼上云烟。”</p>
<h2>出处</h2><p>《艺文类聚》</p><blockquote>《罗含传》曰：含少时昼卧，忽梦一鸟，文色异常，飞来入口，含因惊起。心胸间如吞物，意甚怪之。叔母谓曰：「鸟有文章，汝后必有文章此吉祥也。」含于是才藻日新。…</blockquote>
<h2>别名</h2><p>凤早吞、君章才、梦中吞鸟、吞彩凤、吞鸟梦、梦吞鸟、鸟有文章、罗含</p>
<h2>用它的诗</h2>
<p>川守大夫刘公早岁寓居敦行里肆有题壁十韵今之置第乃获旧居洛下大僚因有唱和叹咏不足輙献此诗 · 杜牧 <span class="verse">「微词凤早吞」</span></p>
<p>偶成转韵七十二句赠四同舍 · 李商隐 <span class="verse">「书记眠时吞彩凤」</span></p>
