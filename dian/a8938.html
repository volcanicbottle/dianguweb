<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《新唐书》</p><blockquote>高宗给五品以上随身鱼银袋，以防召命之诈，出内必合之。三品以上金饰袋。垂拱中，都督、刺史始赐鱼。天授二年，改佩鱼皆为龟。其后三品以上龟袋饰以金，四品以银，五品以铜。中宗初，罢龟袋，复给以鱼。郡王、嗣王亦佩金鱼袋。景龙中，令特进佩鱼，散官佩鱼自此始也。然员外、试、检校官，犹不佩鱼。景云中，诏衣紫者鱼袋以金饰之，衣绯者以银饰之。开元初，驸马都尉从五品者假紫、金鱼袋，都督、刺史品卑者假绯、鱼袋，五品以上检校、试、判官皆佩鱼。中书令张嘉贞奏，致仕…</blockquote>
