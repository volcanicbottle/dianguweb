<h2>出处</h2><p>《春秋左传正义》</p><blockquote>郑武公。庄公。为平王卿士。王贰于虢。郑伯怨王。王曰。无之。故周郑交质。王子狐为质于郑。郑公子忽为质于周。王崩。周人将畀虢公政。四月。郑祭足帅师取温之麦。秋。又取成周之禾。周郑交恶。君子曰。信不由中。质无益也。明恕而行。要之以礼。虽无有质。谁能间之。苟有明信。涧。溪。沼。沚。之毛。蘋。蘩。蕴。藻。之菜。筐。筥。锜。釜。之。器。潢污。行潦。之水。可荐于鬼神。可羞于王公。而况君子结二国之信。行之以礼。又焉用质。风有采繁。采蘋。雅有行苇。泂酌。…</blockquote>
