<h1>吐凤才</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>吐凤才：指写文章的好手。唐钱起《过张成侍御宅》：“丞相幕中吐凤人，文章心事每相亲。”</p>
<h2>出处</h2><p>《西京杂记》</p><blockquote>扬雄读书，有人语之曰：「无为自苦，元故难传。」忽然不见。雄著《太元经》。梦吐凤凰，集元之上，顷而灭。…</blockquote>
<h2>别名</h2><p>飞白凤、白凤、梦吐白凤、吐凤、白凤飞来玄草、毫惊彩凤、扬雄</p>
<h2>用它的诗</h2>
<p>喜舍弟羲叟及第上礼部魏公 · 李商隐 <span class="verse">「门多吐凤才」</span></p>
