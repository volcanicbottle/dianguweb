<h1>回首望云中</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>回首望云中：王维《观猎》诗，“回看射雕处，千里暮云平。”这里“云中”也可以释为地名。汉时云中（今内蒙古自治区托克托县）是在军事上占重要地位的边郡，魏尚、李广都曾经在此击溃匈奴的军队。</p>
