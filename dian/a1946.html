<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《韦庄集·菩萨蛮五首》</p><blockquote>〈菩萨蛮五首〉其二：「人人尽说江南好，游人只合江南老。春水碧于天，画船听雨眠。垆边人似月，皓腕凝双雪。未老莫还乡，还乡须断肠。」…</blockquote>
<h2>别名</h2><p>春水如天、美人如月、画船听雨眠</p>
