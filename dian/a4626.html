<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>孔子闻之曰：「神龟知吉凶，而骨直空枯。日为德而君于天下，辱于三足之乌。月为刑而相佐，见食于虾蟆。」…</blockquote>
<h2>别名</h2><p>金乌玉兔、金乌玉蟾、乌飞兔走、兔走乌飞、飞金走玉、玉走金飞、玉兔金乌走、飞鸟奔兔、三足乌</p>
<h2>用它的诗</h2>
<p>看花回 · 柳永 <span class="verse">「奈两轮、玉走金飞」</span></p>
<p>清平乐 · 晏殊 <span class="verse">「兔走乌飞不住」</span></p>
<p>秋蕊香 · 晏殊 <span class="verse">「金乌玉兔长飞走」</span></p>
