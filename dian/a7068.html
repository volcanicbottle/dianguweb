<h1>少君</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>李少君亦以祠灶、谷道、却老方见上，上尊之。少君者，故深泽侯人，主方。匿其年及所生长。常自谓七十，能使物，却老。其游以方遍诸侯。无妻子。人闻其能使物及不死，更馈遗之，常馀金钱衣食。人皆以为不治产业而饶给，又不知其何所人，愈信，争事之。少君资好方，善为巧发奇中。常从武安侯宴，坐中有年九十馀老人，少君乃言与其大父游射处，老人为儿从其大父，识其处，一坐尽惊。少君见上，上有故铜器，问少君。少君曰：「此器齐桓公十年陈于柏寝。」已而按其刻，果齐桓公器…</blockquote>
<h2>别名</h2><p>李少君</p>
