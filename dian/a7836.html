<h2>出处</h2><p>《苏轼诗集》</p><blockquote>炯炯明珠照双璧，当年三老苏、程、石。里人下道避鸠杖，刺史迎门倒凫舄。我时与子皆儿童，狂走从人觅梨栗。健如黄犊不可恃，隙过白驹那暇惜。醴泉寺古垂橘柚，石头山高暗松栎。诸孙相逢万里外，一笑未解千忧集。子方得郡古山阳，老手生风谢刀笔。我正含毫紫微阁，病眼昏花困书檄。莫教印绶系馀年，去扫坟墓当有日。功成头白早归来，共藉梨花作寒食。…</blockquote>
