<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《苏轼诗集》</p><blockquote>君不见阮嗣宗臧否不挂口，莫誇舌在齿牙牢，是中惟可饮醇酒。读书不用多，作诗不须工，海边无事日日醉，梦魂不到蓬莱宫。秋风昨夜入庭树，莼丝未老君先去。君先去，几时回？刘郎应白发，桃花开不开。…</blockquote>
