<h1>题凡鸟</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>凡鸟：喻庸才。唐张九龄《杂诗》之二：“凡鸟已相噪，凤凰安得知。”</p>
<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>嵇康与吕安善，每一相思，千里命驾。安后来，值康不在，喜出户延之，不入。题门上作「凤」字而去。喜不觉，犹以为欣，故作。「凤」字，凡鸟也。…</blockquote>
<h2>别名</h2><p>题凤、凡鸟、吕安题凤、凡客题凤、题凤在门、题门、题字、吕安、嵇喜、嵇康</p>
<h2>用它的诗</h2>
<p>春日与裴迪过新昌里访吕逸人不遇 · 王维 <span class="verse">「到门不敢题凡鸟」</span></p>
