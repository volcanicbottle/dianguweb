<h1>硬语盘空</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>周诗三百篇，雅丽理训诰【雅丽埋训诰】。曾经圣人手，议论安敢到。五言出汉时，苏李首更号。东都渐弥漫，派别百川导。建安能者七，卓荦变风操。逶迤抵晋宋，气象日凋耗。中间数鲍谢，比近最清奥。齐梁及陈隋，众作等蝉噪。搜春摘花卉，沿袭伤剽盗。国朝盛文章，子昂始高蹈。勃兴得李杜，万类困陵暴。后来相继生，亦各臻阃奥。有穷者孟郊，受材实雄骜。冥观洞古今，象外逐幽好。横空盘硬语，妥贴力排奡。敷柔肆纡馀，奋猛卷海潦。荣华肖天秀，捷疾逾响报。行身践规矩，甘辱耻…</blockquote>
