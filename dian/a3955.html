<h1>大小山</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《楚辞》</p><blockquote>东汉·王逸《序》：《招隐士》者，淮南小山之所作也。昔淮南王安，博雅好古，招怀天下俊伟之士。自八公之徒，咸慕其德，而归其仁，各竭才智，著作篇章，分造辞赋，以类相从，故或称小山，或称大山。其义犹《诗》有《小雅》、《大雅》也。小山之徒，闵伤屈原，又怪其文升天乘云，使百神，似若仙者，虽身沈没，名德显闻，与隐处山泽无异，故作《招隐士》之赋，以章其志也。…</blockquote>
<h2>别名</h2><p>淮王大小山、刘安（淮南王）</p>
<h2>用它的诗</h2>
