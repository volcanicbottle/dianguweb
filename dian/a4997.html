<h1>木兰舟</h1>
<p class="meta">典故 · 6 首诗使用</p>

<h2>出处</h2><p>《太平广记》</p><blockquote>七里洲中，有鲁斑刻木兰为舟，舟至今在洲中，诗家所云木兰舟，出于此也。木兰洲在浔阳江中，多木兰树，吴王阖闾，植木兰于此，用构宫殿也。…</blockquote>
<h2>别名</h2><p>木兰船、木兰桡、兰楫、兰枻、木兰楫、兰艇、木兰双桨、木兰之枻、刳兰、兰桡、兰棹、鲁班</p>

<p>送綦毋潜落第还乡 · 王维 <span class="verse">「行当浮桂棹，未几拂荆扉」</span></p>
<p>江上吟 · 李白 <span class="verse">「木兰之枻沙棠舟」</span></p>
<p>鬲溪梅令 · 姜夔 <span class="verse">「木兰双桨梦中云」</span></p>
