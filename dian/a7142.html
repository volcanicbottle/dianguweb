<h1>沈尚书</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《梁书》</p><blockquote>明帝即位，进号辅国将军，徵为五兵尚书，迁国子祭酒。……梁台建，为散骑常侍、吏部尚书，兼右仆射。高祖受禅，为尚书仆射，封建昌县侯，邑千户，常侍如故。又拜约母谢为建昌国太夫人。奉策之日，右仆射范云等二十馀人咸来致拜，朝野以为荣。俄迁尚书左仆射，常侍如故。寻兼领军，加侍中。天监二年，遭母忧，舆驾亲出临吊，以约年衰，不宜致毁，遣中书舍人断客节哭。起为镇军将军、丹阳尹，置佐史。服阕，迁侍中、右光禄大夫，领太子詹事，扬州大中正，关尚书八条事，迁尚书…</blockquote>
<h2>别名</h2><p>沈约</p>
<h2>用它的诗</h2>
<p>有怀在蒙飞卿 · 李商隐 <span class="verse">「瘦极沈尚书」</span></p>
