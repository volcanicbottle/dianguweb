<h1>煮豆</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>七步咏：指人才思敏捷，才气过人。唐于志宁《冬日宴群公于宅各赋一字得杯》：“俱裁七步咏，同倾三雅杯。”</p>
<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>文帝（曹丕）尝令东阿王（曹植）七步中作诗，不成者行大法。应声便为诗曰：「煮豆持作羹，漉菽以为汁。萁在釜下然，豆在釜中泣。本自同根生，相煎何太急？」帝深有惭色。…</blockquote>
<h2>别名</h2><p>七步才、七步诗、煮豆燃萁、七步成诗、七步咏、相煎何急、豆萁才敏、豆萁煎正泣、豆萁篇、七步赋、七步诗成、萁燃、豆萁才、七步、七步子建诗、子建诗成几步、曹丕（魏文帝）、曹植</p>
<h2>用它的诗</h2>
<p>最高楼 · 辛弃疾 <span class="verse">「重叹息、豆萁煎正泣」</span></p>
