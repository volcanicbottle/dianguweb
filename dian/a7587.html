<h1>泰山小</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子集释》</p><blockquote>今且有言于此，不知其与是类乎？其与是不类乎？类与不类，相与为类，则与彼无以异矣。虽然，请尝言之。有始也者，有未始有始也者，有未始有夫未始有始也者。有有也者，有无也者，有未始有无也者，有未始有夫未始有无也者。俄而有无矣，而未知有无之果孰有孰无也。今我则已有谓矣，而未知吾所谓之其果有谓乎，其果无谓乎？天下莫大于秋豪之末，而大山为小；莫寿于殇子，而彭祖为夭。天地与我并生，而万物与我为一。既已为一矣，且得有言乎？既已谓之一矣，且得无言乎？一与言…</blockquote>

<h2>用它的诗</h2>
<p>独酌 · 杜牧 <span class="verse">「秋毫泰山小」</span></p>
