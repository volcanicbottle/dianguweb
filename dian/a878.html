<h1>北门留住</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《旧唐书》</p><blockquote>以其足疾，不便朝谒，而年未甚衰，开成二年五月，复以本官兼太原尹、北都留守、河东节度使。诏出，度累表固辞老疾，不愿更典兵权，优诏不允。文宗遣吏部郎中卢弘往东都宣旨曰：「卿虽多病，年未甚老，为朕卧镇北门可也。」促令上路，度不获已之任。三年冬，病甚，乞还东都养病。四年正月，诏许还京，拜中书令。以疾未任朝谢，诏曰：「司徒、中书令度，绰有大勋，累居台鼎。今以疾恙，未任谢上，其本官俸料，宜自计日支给。」又遣国医就第诊视。属上巳曲江赐宴，群臣赋诗，度…</blockquote>
