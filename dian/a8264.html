<h1>五花结队</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《旧唐书》</p><blockquote>玄宗每年十月幸华清宫，国忠姊妹五家扈从，每家为一队，著一色衣，五家合队，照映如百花之焕发，而遗钿坠，瑟瑟珠翠，璨芳馥于路。…</blockquote>
<h2>别名</h2><p>五家车马如水、李隆基（唐玄宗）、杨国忠、杨玉环（杨贵妃）</p>
<h2>用它的诗</h2>
<p>华清引 · 苏轼 <span class="verse">「五家车马如水」</span></p>
<p>鹧鸪天 · 辛弃疾 <span class="verse">「五花结队香如雾」</span></p>
