<h1>方朔诙谐</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>武帝既招英俊，程其器能，用之如不及。时方外事胡越，内兴制度，国家多事，自公孙弘以下至司马迁皆奉使方外，或为郡国守相至公卿，而朔尝至太中大夫，后常为郎，与枚皋、郭舍人俱在左右，诙啁而已。久之，朔上书陈农战彊国之计，因自讼独不得大官，欲求试用。其言专商鞅、韩非之语也，指意放荡，颇复诙谐，辞数万言，终不见用。朔因著论，设客难己，用位卑以自慰谕。…</blockquote>
<h2>别名</h2><p>方朔谐、东方朔</p>
<h2>用它的诗</h2>
<p>八哀诗 故著作郎贬台州司户荥阳郑公虔 · 杜甫 <span class="verse">「方朔谐太枉」</span></p>
<p>社日两篇 一 · 杜甫 <span class="verse">「尚想东方朔」</span></p>
