<h1>士稚</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>祖逖字士稚，范阳遒人也。世吏二千石，为北州旧姓。父武，晋王掾、上谷太守。逖少孤，兄弟六人。兄该、纳等并开爽有才干。逖性豁荡，不修仪检，年十四五犹未知书，诸兄每忧之。然轻财好侠，慷慨有节尚，每至田舍，辄称兄意，散谷帛以赒贫乏，乡党宗族以是重之。后乃博览书记，该涉古今，往来京师，见者谓逖有赞世才具。侨居阳平。年二十四，阳平辟察孝廉，司隶再辟举秀才，皆不行。与司空刘琨俱为司州主簿，情好绸缪，共被同寝。中夜闻荒鸡鸣，蹴琨觉曰：「此非恶声也。」因…</blockquote>
