<h1>苍水使</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《吴越春秋》</p><blockquote>禹乃东巡，登衡岳，血白马以祭，不幸所求。禹乃登山仰天而啸，因梦见赤绣衣男子，自称玄夷苍水使者，闻帝使文命于斯，故来候之。「非厥岁月，将告以期，无为戏吟。」故倚歌覆釜之山，东顾谓禹曰：「欲得我山神书者，斋于黄帝岩岳之下三月，庚子登山发石，金简之书存矣。」禹退又斋三月，庚子登宛委山，发金简之书。案金简玉字，得通水之理。…</blockquote>
<h2>别名</h2><p>苍水使者、苍水、大禹</p>
<h2>用它的诗</h2>
<p>荆南兵马使太常卿赵公大食刀歌 · 杜甫 <span class="verse">「苍水使者扪赤条」</span></p>
<p>季夏送乡弟韶陪黄门从叔朝谒 · 杜甫 <span class="verse">「令弟尚为苍水使」</span></p>
