<h1>约法三章</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>魏长齐雅有体量，而才学非所经。初宦当出，虞存嘲之曰：「与卿约法三章：谈者死，文笔者刑，商略抵罪。」魏怡然而笑，无忤于色。…</blockquote>
<h2>别名</h2><p>三章约、崔顗</p>
<h2>用它的诗</h2>
<p>今月二日不自量度辄以诗一首四十韵干凟尊严伏蒙仁恩俯赐披览奖逾其实情溢于辞顾惟疎芜曷用酬戴辄复五言四十韵诗献上亦诗人咏叹不足之义也 · 李商隐 <span class="verse">「愿守三章约」</span></p>
<p>贺新郎 · 辛弃疾 <span class="verse">「听我三章约」</span></p>
