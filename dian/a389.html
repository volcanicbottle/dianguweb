<h1>白玉楼</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐文》</p><blockquote>长吉将死时，忽昼见一绯衣人，驾赤蚪，持一版，书若太古篆，或霹雳石文者，云当召长吉。长吉了不能读，欻下榻叩头，言阿揔老且病，贺不愿去。绯衣人笑曰：「帝成白玉楼，立召君为记。天上差乐，不苦也。」长吉独泣，边人尽见之，少之长吉气绝。尝所居窗中勃勃有烟气，闻行车嘒管之声，太夫人急止人哭待之。如炊五斗黍许时，长吉竟死。…</blockquote>
<h2>别名</h2><p>玉楼成、白玉楼成、记玉楼、赴玉楼、玉楼召、长吉赋、卧才鬼、诏入玉楼、阿揔、李贺赴玉楼、李贺</p>
