<h1>老鱼跳波</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《淮南子》</p><blockquote>瓠巴鼓瑟，而淫鱼出听；伯牙鼓琴，驷马仰秣；介子歌龙蛇，而文君垂泣。故玉在山而草木润，渊生珠而岸不枯。螾无筋骨之强，爪牙之利，上食晞堁，下饮黄泉，用心一也。清之为明，杯水见眸子；浊之为闇，河水不见太山。视日者眩，听雷者聋，人无为则治，有为则伤。东汉·高诱注：「瓠巴，楚人也，善鼓瑟，淫鱼喜音，出头于水而听之。」…</blockquote>
<h2>别名</h2><p>弦奏跃鱼、鱼出听曲、鱼吹燕蹴、鱼跃闻曲</p>
<h2>用它的诗</h2>
<p>李凭箜篌引 · 李贺 <span class="verse">「老鱼跳波瘦蛟舞」</span></p>
