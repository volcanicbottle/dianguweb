<h2>出处</h2><p>《后汉书》</p><blockquote>其后有诏会议灵台所处，帝谓谭曰：「吾欲谶决之，何如？」谭默然良久，曰：「臣不读谶。」帝问其故，谭复极言谶之非经。帝大怒曰：「桓谭非圣无法，将下斩之。」谭叩头流血，良久乃得解。出为六安郡丞；意忽忽不乐，道病卒，时年七十馀。…</blockquote>
