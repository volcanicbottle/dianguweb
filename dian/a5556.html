<h2>出处</h2><p>《太平御览》</p><blockquote>《三秦记》曰：陇西开，其阪九回，不知高几里，欲上者七日乃越。高处可容百馀家，下处数十万户。上有清水四注。俗歌曰：「陇头流水，鸣声幽咽。遥望秦川，心肝断绝。」去长安千里，望秦川如带。又关中人上陇者，还望故乡，悲思而歌，则有绝死者。…</blockquote>
