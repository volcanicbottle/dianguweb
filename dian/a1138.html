<h1>吐哺握发</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>周公吐哺：喻殷勤礼待贤士，或喻为政事而操心忙碌。三国魏曹操《短取行卜”周公吐哺，天下归心。”</p>
<h2>出处</h2><p>《史记》</p><blockquote>于是卒相成王，而使其子伯禽代就封于鲁。周公戒伯禽曰：「我文王之子，武王之弟，成王之叔父，我于天下亦不贱矣。然我一沐三捉发，一饭三吐哺，起以待士，犹恐失天下之贤人。子之鲁，慎无以国骄人。」…</blockquote>
<h2>别名</h2><p>三握发、握发、周公吐哺、三哺、吐哺周公、一饭三吐、握周公发、哺应为吐、发握三、发一握、吐捉、周公发、周公下士、吐握、周公</p>
<h2>用它的诗</h2>
<p>念奴娇 · 辛弃疾 <span class="verse">「谁握周公发」</span></p>
