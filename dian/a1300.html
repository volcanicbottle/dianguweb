<h1>残杯冷炙</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>残杯冷炙谩消魂：生活贫困，独自愁苦也是枉然。残杯冷炙，指剩余的食物。杜甫《奉赠韦左丞丈二十二韵》：“残杯与冷炙，到处潜酸辛。”谩消魂，徒然伤心。</p>
<h2>出处</h2><p>《颜氏家训》</p><blockquote>礼曰：「君子无故不彻琴瑟。」古来名士，多所爱好。洎于梁初，衣冠子孙，不知琴者，号有所阙；大同以末，斯风顿尽。然而此乐愔愔雅致，有深味哉！今世曲解，虽变于古，犹足以畅神情也。唯不可令有称誉，见役勋贵，处之下坐，以取残杯冷炙之辱。戴安道犹遭之，况尔曹乎！…</blockquote>
<h2>别名</h2><p>残杯冷炙谩消魂</p>
<h2>用它的诗</h2>
<p>山亭柳 · 晏殊 <span class="verse">「残杯冷炙谩消魂」</span></p>
