<h1>西北浮云</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>曹丕《杂诗》「西北有浮云，亭亭如车盖。惜哉时不遇，适与飘风会」，以浮云飘零喻身世；辛弃疾化用并以浮云蔽天暗指西北中原被金人占据。</p>
<h2>出处</h2><p>曹丕《杂诗二首》其二</p><blockquote>举头西北浮云：这是以浮云遮蔽西北的天空表示中原沦陷。和作者《菩萨蛮》词里“西北望长安，可怜无数山”的意思正同。…</blockquote>
<h2>别名</h2><p>举头西北浮云</p>
<h2>用它的诗</h2>
<p>水龙吟 · 辛弃疾 <span class="verse">「举头西北浮云」</span></p>
