<h1>吐长虹</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>燕丹客：喻勇士。唐骆宾王《送郑少府人辽共赋快客运从戎》：“不学燕丹客，空歌易水寒。”</p>
<h2>出处</h2><p>《汉书》</p><blockquote>「邹阳于狱中上书曰：『昔者荆轲慕燕丹之义，白虹贯日，太子畏之。』」东汉·应劭注：「燕太子丹质于秦，始皇遇之无礼，丹亡去，故厚养荆轲，令西刺秦王。精诚感天，白虹为之贯日也。」…</blockquote>
<h2>别名</h2><p>白虹贯日、白虹贯、长虹贯日、日贯虹、贯日长虹、精贯白虹、燕丹客、长剑彩、无气成长虹、荆轲、燕丹</p>
<h2>用它的诗</h2>
<p>杂曲歌辞 结客少年场行 · 李白 <span class="verse">「从令日贯虹」</span></p>
