<h1>欲断无肠</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《太平广记》</p><blockquote>进士祖价，咏之孙也。落第后，尝游商山中，行李危困。夕至一孤驿，去驿半里已来，有一空佛寺，无僧居，价与仆夫投之而宿。秋月甚明，价独玩月，来去而行。忽有一人，自寺殿后出，揖价共坐，语笑说经史，时时自吟。价烹茶待之，此人独吟不已。又云：「夫人为诗，述怀讽物。若不精不切，即不能动人。今夕偶相遇，后会难期，辄赋三两篇，以述怀也。」遂朗吟云：「家住驿北路，百里无四邻。往来不相问，寂寂山家春。」又吟：「南冈夜萧萧，青松与白杨。家人应有梦，远客已无肠。…</blockquote>
