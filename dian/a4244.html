<h1>季布折公卿</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>当是时，诸公皆多季布能摧刚为柔，朱家亦以此名闻当世。季布召见，谢，上拜为郎中。孝惠时，为中郎将。单于尝为书嫚吕后，不逊，吕后大怒，召诸将议之。上将军樊哙曰：「臣愿得十万众，横行匈奴中。」诸将皆阿吕后意，曰「然」。季布曰：「樊哙可斩也！夫高帝将兵四十馀万众，困于平城今哙奈何以十万众横行匈奴中，面欺！且秦以事于胡，陈胜等起。于今创痍未瘳，哙又面谀，欲摇动天下。」是时殿上皆恐，太后罢朝，遂不复议击匈奴事。…</blockquote>
<h2>别名</h2><p>季布</p>
<h2>用它的诗</h2>
<p>献从叔当涂宰阳冰 · 李白 <span class="verse">「季布折公卿」</span></p>
