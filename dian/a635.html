<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《隋书》</p><blockquote>初武帝之在雍镇，有童谣云：「襄阳白铜蹄，反缚扬州儿。」识者言，白铜蹄谓马也。白，金色也。及义师之兴，实以铁骑，扬州之士，皆面缚，果如谣言。故即位之后，更造新声，帝自为之词三曲。…</blockquote>
