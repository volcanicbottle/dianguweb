<h1>御史骢</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>辟司徒袁隗府，举高第，拜侍御史。是时宦官秉权，典执政无所回避。常乘骢马，京师畏惮，为之语曰：「行行且止，避骢马御史。」及黄巾贼起荥阳，典奉使督军。贼破，还，以啎宦官赏不行。在御史七年不调，后出为郎。…</blockquote>
<h2>别名</h2><p>避骢、避马、骢马、铁骢、桓典马、乘骢、花骢、桓典</p>
<h2>用它的诗</h2>
<p>陪章留后侍御宴南楼 · 杜甫 <span class="verse">「仍骑御史骢」</span></p>
