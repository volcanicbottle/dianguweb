<h1>乐不思蜀</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>凄凉两句，蜀汉降魏后，刘禅迁至洛阳，被封为安乐县公。魏太尉司马昭与之宴，并使蜀国女乐歌舞于刘禅前，旁人皆为他感伤，他却喜笑自若。见《三国志·蜀志·后主传》注引《汉晋春秋》。伎，同“妓”，女乐。实际也是俘虏。</p>
<h2>出处</h2><p>《三国志·蜀志·后主传》</p><blockquote>凄凉两句，蜀汉降魏后，刘禅迁至洛阳，被封为安乐县公。魏太尉司马昭与之宴，并使蜀国女乐歌舞于刘禅前，旁人皆为他感伤，他却喜笑自若。见《三国志·蜀志·后主传》注引《汉晋春秋》。伎，同“妓”，女乐。实际也是俘虏。…</blockquote>
