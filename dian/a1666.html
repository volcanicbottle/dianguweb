<h1>登车揽辔</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>范滂字孟博，汝南征羌人也。少厉清节，为州里所服，举孝廉、光禄四行。时冀州饥荒，盗贼群起，乃以滂为清诏使，案察之。滂登车揽辔，慨然有澄清天下之志。及至州境，守令自知臧污，望风解印绶去。其所举奏，莫不厌塞众议。迁光禄勋主事。时陈蕃为光禄勋，滂执公仪诣蕃，蕃不止之，滂怀恨，投版弃官而去。郭林宗闻而让蕃曰：「若范孟博者，岂宜以公礼格之？今成其去就之名，得无自取不优之议也？」蕃乃谢焉。…</blockquote>
<h2>别名</h2><p>揽辔澄清、登车孟博、范滂澄清、澄清、范滂</p>
<h2>用它的诗</h2>
<p>一寸金 · 柳永 <span class="verse">「仗汉节、揽辔澄清」</span></p>
