<h1>铜驼</h1>
<p class="meta">典故 · 4 首诗使用</p>

<h2>出处</h2><p>《水经注疏》</p><blockquote>渠水夹路南出，径太尉、司徒两坊间，谓之铜驼街。旧魏明帝置铜驼诸兽于阊阖南街。陆机云：「驼高九尺，脊出太尉坊者也。」杨守敬按《寰宇记》铜驼街引陆机《洛阳记》：「汉铸铜驼二枚，在宫南四会道头，夹路相对。」俗语云「金马门外聚群贤，铜驼陌上集年少」，言人物之盛也。…</blockquote>
<h2>别名</h2><p>铜驼陌、铜驼巷、铜驼巷陌、驼陌、泣铜驼</p>
