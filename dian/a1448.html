<h2>出处</h2><p>《乐府诗集》</p><blockquote>《梅花落》，本笛中曲也。按：唐大角曲亦有《大单于》、《小单于》、《大梅花》、《小梅花》等曲，今其声犹有存者。…</blockquote>
<h2>别名</h2><p>惊落小梅、小弄梅花笛、长笛吹花落、角声吹落小梅花</p>
