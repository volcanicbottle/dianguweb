<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《苏轼诗集》</p><blockquote>吴侬生长湖山曲，呼吸湖光饮山绿。不论世外隐君子，佣儿贩妇皆冰玉。先生可是绝俗人，神清骨冷无由俗。我不识君曾梦见，瞳子瞭然光可烛。遗篇妙字处处有，步绕西湖看不足。诗如东野不言寒，书似留台差少肉。平生高节已难继，将死微言犹可录。自言不作封禅书，更肯悲吟白头曲。我笑吴人不好事，好作祠堂傍修竹。不然配食水仙王，一盏寒泉荐秋菊。…</blockquote>
