<h1>豳（bīn）诗漫与</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>豳（bīn）诗漫与：写成诗篇。《诗经·豳风·七月》：“七月在野，八月在宇，九月在户，十月蟋蟀入我床下。”与，一作“谱”。漫与，即景抒情，率意而作。</p>
<h2>出处</h2><p>《诗经·豳风·七月》</p><blockquote>豳（bīn）诗漫与：写成诗篇。《诗经·豳风·七月》：“七月在野，八月在宇，九月在户，十月蟋蟀入我床下。”与，一作“谱”。漫与，即景抒情，率意而作。…</blockquote>

<h2>用它的诗</h2>
<p>齐天乐 · 姜夔 <span class="verse">「别有伤心无数豳诗漫与」</span></p>
