<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《范石湖集》</p><blockquote>〈丙午新正书怀十首〉其四：「不用桃符巾画鸡，身心安处是天倪。行年六十旧历日，汗脚尺三新杖藜。祝我胜周花甲子，谢人深劝玉东西。春风若借筋骸便，先渡南村学灌畦。瘦骨难胜遇节衣，日高催起趁晨炊。病怜楖栗随身惯，老觉屠苏到手迟。一饱但蕲庚癸诺，百年甘守甲辰雌。莫言此外都无事，柳眼梅梢正索诗。煮茗烧香了岁时，静中光景笑中嬉。身闲一日似两日，春浅南枝如北枝。朝镜略无功业到，午窗惟有睡魔知。年来并束床头易，一任平章济叔痴。穷巷闲门本然，强将爆竹聒阶前…</blockquote>
