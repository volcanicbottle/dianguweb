<h1>独唱何须和</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>楚襄王问于宋玉曰：「先生其有遗行与？何士民众庶不誉之甚也？」宋玉对曰：「唯，然，有之。愿大王宽其罪，使得毕其辞。客有歌于郢中者，其始曰下里巴人，国中属而和者数千人；其为阳阿薤露，国中属而和者数百人；其为阳春白雪，国中属而和者不过数十人；引商刻羽，杂以流徵，国中属而和者不过数人而已。是其曲弥高其和弥寡。故鸟有凤而鱼有鲲。凤皇上击九千里，绝云霓，负苍天，翱翔乎杳冥之上。夫蕃篱之鴳，岂能与之料天地之高哉？鲲鱼朝发昆崙之墟，暴鬐于碣石，暮宿于孟…</blockquote>
<h2>别名</h2><p>宋玉</p>
<h2>用它的诗</h2>
<p>桃源忆故人 · 陆游 <span class="verse">「独唱何须和」</span></p>
