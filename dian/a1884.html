<h1>传都赋</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《世说新语》</p><blockquote>「庾仲初作《扬都赋》成，以呈庾亮。亮以亲族之怀，大为其名价云：『可三二京，四三都。』于此人人竞写，都下纸为之贵。」「庾阐始作《扬都赋》。」南朝梁·刘孝标注引《中兴书》：「庾阐字仲初，颍川人。太尉亮之族也。少孤，九岁便能属文，阐有文章才义，识者以为宜综国史，于是召为散骑侍郎，领大著作。为《扬都赋》，邈绝当时，五十四卒。」…</blockquote>
<h2>别名</h2><p>左思、庾阐、左思十稔</p>
<h2>用它的诗</h2>
<p>哭祖六自虚 · 王维 <span class="verse">「满地传都赋」</span></p>
