<meta name="description" content="典故「西湖处士」：处士林逋居于杭州西湖之孤山。逋工笔画，善为诗，如「草泥行郭索，云木叫钩辀」，颇为士大夫所称。又梅花诗云：「疏影横斜水清浅，暗香浮动月黄昏。」评诗者谓：「前世咏梅者多矣，未有此句也。」又其临终为句云：「茂陵他日求遗，犹喜曾无封禅书。」尤为人称诵。自逋之卒，湖山寂寥，未有继者。">

<h1>西湖处士</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《归田录》</p><blockquote>处士林逋居于杭州西湖之孤山。逋工笔画，善为诗，如「草泥行郭索，云木叫钩辀」，颇为士大夫所称。又梅花诗云：「疏影横斜水清浅，暗香浮动月黄昏。」评诗者谓：「前世咏梅者多矣，未有此句也。」又其临终为句云：「茂陵他日求遗，犹喜曾无封禅书。」尤为人称诵。自逋之卒，湖山寂寥，未有继者。…</blockquote>
<h2>别名</h2><p>强如长卿封禅书、林逋、司马相如</p>
<h2>用它的诗</h2>
<p>鹧鸪天 · 辛弃疾 <span class="verse">「剩有西湖处士风」</span></p>
