<h1>金掌露成霜</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>天边金掌露成霜：《三辅故事》，“建章宫承露盘高二十丈，大七围，以铜为之。上有仙人掌，承露和玉屑饮之。”后世称仙人为铜仙。金掌，指仙人掌露盘。露成霜，语出《诗经·蒹葭》：“白露为霜。”</p>
<h2>出处</h2><p>《三辅故事》</p><blockquote>天边金掌露成霜：《三辅故事》，“建章宫承露盘高二十丈，大七围，以铜为之。上有仙人掌，承露和玉屑饮之。”后世称仙人为铜仙。金掌，指仙人掌露盘。露成霜，语出《诗经·蒹葭》：“白露为霜。”…</blockquote>
