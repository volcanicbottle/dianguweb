<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《乐府诗集》</p><blockquote>君子防未然，不处嫌疑间。瓜田不纳履，李下不正冠。嫂叔不亲授，长幼不比肩。劳谦得其柄，和光甚独难。周公下白屋，吐哺不及餐。一沐三握发，后世称圣贤。…</blockquote>
<h2>别名</h2><p>倩旁人为正冠、堤防瓜李、李下整冠、李园冠、纳履生疑、远瓜李、瓜李嫌疑、正冠、政冠避李</p>
