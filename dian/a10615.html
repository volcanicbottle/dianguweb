<h1>洋洋河水</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>自笑堂堂汉使三句：这里是以黄河之水不变东流的方向比喻章德茂的忠节自守。自笑，自喜。洋洋，水盛大貌。《诗经·硕人》：“河水洋洋。”</p>
<h2>出处</h2><p>《诗经·硕人》</p><blockquote>自笑堂堂汉使三句：这里是以黄河之水不变东流的方向比喻章德茂的忠节自守。自笑，自喜。洋洋，水盛大貌。《诗经·硕人》：“河水洋洋。”…</blockquote>
<h2>别名</h2><p>自笑堂堂汉使三句</p>
<h2>用它的诗</h2>
<p>水调歌头 · 陆游 <span class="verse">「自笑堂堂汉使得似洋洋河水依旧只流东」</span></p>
