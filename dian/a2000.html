<h1>贺家湖</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《新唐书》</p><blockquote>贺知章字季真，越州永兴人。……肃宗为太子，知章迁宾客，授秘书监。……天宝初，病，梦游帝居，数日寤，乃请为道士，还乡里，诏许之，以宅为千秋观而居。又求周宫湖数顷为放生池，有诏赐镜湖剡川一曲。既行，帝赐诗，皇太子百官饯送。…</blockquote>
<h2>别名</h2><p>乞鉴湖、贺监湖、知章请赐、知章引去、赐湖唐敕、湖边贺监、镜上贺老、一曲蒙君赐、贺知章</p>
<h2>用它的诗</h2>
<p>水调歌头 · 辛弃疾 <span class="verse">「更乞鉴湖东」</span></p>
<p>谢池春 · 陆游 <span class="verse">「贺监湖边」</span></p>
