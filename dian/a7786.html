<h1>铁瓮城</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《樊川诗集注》</p><blockquote>唐·杜牧〈润州二首〉其二：「谢朓诗中佳廲，夫差传里水犀军。城高铁瓮横?弩，柳暗朱楼多梦云。」作者自注：「润州城，孙权筑，号为铁瓮。」清。冯集注引宋。程大昌《演繁露》：润州城古号铁瓮，人但知其取喻以坚而已，然瓮形深狭，取以类城，似为非类。乾道辛卯，予过润，蔡子平置燕于江亭，亭据郡治前山绝顶，而顾子城雉堞缘冈，弯环四合，其中州治诸廨在焉，圆深之形正如卓瓮，予始知喻以为瓮者，指子城也。…</blockquote>
