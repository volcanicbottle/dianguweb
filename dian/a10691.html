<h1>长波妒盼遥山羞黛</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>长波妒盼两句：古代文人常用山、水比喻美人的眉、眼。这里进一步夸张地说：长波和远山也妒忌她的美貌，自以为羞。盼，形容眼睛的美丽。《诗经·硕人》：“美目盼兮。”黛，黛眉。</p>
<h2>出处</h2><p>《诗经·硕人》</p><blockquote>长波妒盼两句：古代文人常用山、水比喻美人的眉、眼。这里进一步夸张地说：长波和远山也妒忌她的美貌，自以为羞。盼，形容眼睛的美丽。《诗经·硕人》：“美目盼兮。”黛，黛眉。…</blockquote>
<h2>别名</h2><p>长波妒盼两句</p>
<h2>用它的诗</h2>
<p>莺啼序 · 吴文英 <span class="verse">「几番风雨长波妒盼遥山羞黛」</span></p>
