<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>丞相祠堂何处寻，锦官城外柏森森。映阶碧草自春色，隔叶黄鹂空好音【隔叶黄鹂多好音】。三顾频烦天下计【三顾频繁天下计】，两朝开济老臣心。出师未捷身先死【出师未用身先死】，长使英雄泪满襟。…</blockquote>
<h2>别名</h2><p>丞相祠堂何处、武侯柏、武侯祠柏、鹂音古柏、诸葛亮</p>
