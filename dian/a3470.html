<h1>休牛</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>归马华山阳：指罢战休兵。唐杜甫《有感五首》之二：“大君先息战，归马华山阳。”</p>
<h2>出处</h2><p>《尚书·周书·武成》</p><blockquote>「王朝步自周，于征伐商，厥四月哉生明，王来自商，至于丰，乃偃武修文，归马于华山之阳，放牛于桃林之野，示天下弗服。」旧题汉·孔安国传：「山南曰阳，桃林在华山东，皆非长养牛马之地，欲使自生自死，示天下不复乘用。」…</blockquote>
<h2>别名</h2><p>归马华山阳、散马、桃林、华山归、散马牛、归马华山、华山归马、休牛归马、马向华山、桃林卧草，华岳嘶风、散马日、桃塞马、周武王</p>
<h2>用它的诗</h2>
<p>有感五首 二 · 杜甫 <span class="verse">「归马华山阳」</span></p>
