<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《毛诗正义·小雅·鹿鸣之什· 伐木》</p><blockquote>伐木丁丁，鸟鸣嘤嘤。出自幽谷，迁于乔木。嘤其鸣矣，求其友声。相彼鸟矣，犹求友声。矧伊人矣，不求友生。神之听之，终和且平。《伐木序》：「《伐木》，燕朋友故旧也。」…</blockquote>
<h2>别名</h2><p>伐木嘤嘤、求莺、闻莺、莺鸣</p>
