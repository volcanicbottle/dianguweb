<h1>乘风去</h1>
<p class="meta">典故 · 3 首诗使用</p>
<h2>释义</h2><p>乘风去：《南史·宗悫传》载宗悫少年时对叔父表示自己的志愿说“愿乘长风破万里浪”。</p>
<h2>出处</h2><p>《南史·宗悫传》</p><blockquote>乘风去：《南史·宗悫传》载宗悫少年时对叔父表示自己的志愿说“愿乘长风破万里浪”。…</blockquote>
<h2>别名</h2><p>风高浪快两句、风高浪快</p>
<h2>用它的诗</h2>
<p>水调歌头 · 张孝祥 <span class="verse">「渺渺唤人愁我欲乘风去」</span></p>
<p>清平乐 · 刘克庄 <span class="verse">「风高浪快万里骑蟾背」</span></p>
<p>好事近 · 陆游 <span class="verse">「明日又乘风去」</span></p>
