<h1>生空桑</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>北魏·郦道元《水经注》卷十五《伊水》</p><blockquote>昔有莘氏女，采桑于伊川，得婴儿于空桑中，言其母孕于伊水之滨，梦神告之曰，臼水出而东走。母明视而见臼水出焉，告其邻居而走，顾望其邑，咸为水矣。其母化为空桑，子在其中矣。莘女取而献之，命养于庖，长而有贤德，殷以为尹，曰伊尹也。…</blockquote>
<h2>别名</h2><p>伊尹（名挚，又名阿衡）</p>
<h2>用它的诗</h2>
<p>纪南陵题五松山 · 李白 <span class="verse">「伊尹生空桑」</span></p>
