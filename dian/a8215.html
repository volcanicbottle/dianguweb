<h1>无鲑菜</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《南齐书》</p><blockquote>杲之少而贞立，学涉文义。起家奉朝请，巴陵王征西参军。郢州举秀才，除晋熙王镇西外兵参军，世祖征虏府功曹，尚书驾部郎。清贫自业，食唯有韭薤、{糹匕}韭、生韭杂菜，或戏之曰：「谁谓庾郎贫，食鲑常有二十七种。」言三九也。仍为世祖抚军中军记室，迁员外散骑常侍，正员郎，迁中书郎，领荆、湘二州中正。转尚书左丞，常侍、领中正如故。…</blockquote>
<h2>别名</h2><p>庾杲之</p>
<h2>用它的诗</h2>
<p>王竟携酒高亦同过共用寒字 · 杜甫 <span class="verse">「自媿无鲑菜」</span></p>
