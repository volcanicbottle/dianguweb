<h1>墟里</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>墟里，村落。孤烟，炊烟。陶渊明《归园田居》：“依依墟里烟。”写景须曲肖其景，如这两句确是晚村光景，就像常建的“山光悦鸟性，潭影空人心”，确是古寺光景。</p>
<h2>出处</h2><p>《归园田居》</p><blockquote>墟里，村落。孤烟，炊烟。陶渊明《归园田居》：“依依墟里烟。”写景须曲肖其景，如这两句确是晚村光景，就像常建的“山光悦鸟性，潭影空人心”，确是古寺光景。…</blockquote>

<h2>用它的诗</h2>
