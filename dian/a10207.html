<h1>黄粱梦</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>似黄粱梦两句：是说离开京师以后，回忆过去的游乐生活真像黄粱一梦。沈既济《枕中记》载卢生困居邯郸旅舍，遇道士吕翁授以枕，梦中历尽富贵荣华以至老死，醒来时吕翁还在身边，旅舍主人蒸黄粱还没有熟。这故事后人称为黄粱梦。辞丹凤，离开京师。丹凤，唐时长安有丹凤门，一般都用指京城。沈□期《独不见》诗：“丹凤城南秋夜长。”</p>
