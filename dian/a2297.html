<h1>风雨对床</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>对床夜雨：喻好友、兄弟的欢聚。宋苏轼《送刘寺丞赴余姚》：“中和堂后石捕树，与君对床听夜雨。”</p>
<h2>出处</h2><p>《全唐诗》</p><blockquote>余辞郡符去，尔为外事牵。宁知风雪夜，复此对床眠。始话南池饮，更咏西楼篇。无将一会易，岁月坐推迁。…</blockquote>
<h2>别名</h2><p>对床夜雨、弟兄对榻、共话连床雨、连床谈至晓、韦应物</p>
<h2>用它的诗</h2>
<p>满江红 · 苏轼 <span class="verse">「对床夜雨听萧瑟」</span></p>
