<h1>四知金</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>大将军邓骘闻其贤而辟之，举茂才，四迁荆州刺史、东莱太守。当之郡，道经昌邑，故所举荆州茂才王密为昌邑令，谒见，至夜怀金十斤以遗震。震曰：「故人知君，君不知故人，何也？」密曰：「暮夜无知者。」震曰：「天知，神知，我知，子知。何谓无知！」密愧而出。后转涿郡太守。性公廉，不受私谒。子孙常蔬食步行，故旧长者或欲令为开产业，震不肯，曰：「使后世称为清白吏子孙，以此遗之，不亦厚乎！」…</blockquote>
<h2>别名</h2><p>四知、杨震、杨震（字伯起）、王密、鸟哭杨震</p>
<h2>用它的诗</h2>
<p>风疾舟中伏枕书怀三十六韵奉呈湖南亲友 · 杜甫 <span class="verse">「得近四知金」</span></p>
