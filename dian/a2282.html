<h2>出处</h2><p>《全唐诗》</p><blockquote>微月透帘栊，萤光度碧空。遥天初缥缈，低树渐葱茏。龙吹过庭竹，鸾歌拂井桐。罗绡垂薄雾，环佩响轻风。绛节随金母，云心捧玉童。更深人悄悄，晨会雨濛濛。珠莹光文履，花明隐绣栊。宝钗行彩凤，罗帔掩丹虹。言自瑶华浦，将朝碧帝宫。因游李城北【因游洛城北】，偶向宋家东。戏调初微拒，柔情已暗通。低鬟蝉影动，回步玉尘蒙。转面流花雪，登床抱绮丛。鸳鸯交颈舞，翡翠合欢笼。眉黛羞频聚，朱唇暖更融。气清兰蕊馥，肤润玉肌丰。无力慵移腕，多娇爱敛躬。汗光珠点点，发乱绿…</blockquote>
