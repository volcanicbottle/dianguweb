<h1>贾生年</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>居顷之，拜贾生为梁怀王太傅。梁怀王，文帝之少子，爱，而好书，故令贾生傅之。文帝复封淮南厉王子四人皆为列侯。贾生谏，以为患之兴自此起矣。贾生数上疏，言诸侯或连数郡，非古之制，可稍削之。文帝不听。居数年，怀王骑，堕马而死，无后。贾生自伤为傅无状，哭泣岁馀，亦死。贾生之死时年三十三矣。…</blockquote>
<h2>别名</h2><p>贾生脆促、贾谊</p>

<p>[安定]城楼 · 李商隐 <span class="verse">「贾生年少虚垂泪」</span></p>
