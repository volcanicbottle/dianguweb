<h2>出处</h2><p>《毛诗正义·国风·邶风 ·柏舟》</p><blockquote>泛彼柏舟，亦泛其流。耿耿不寐，如有隐忧。微我无酒，以敖以游。……我心匪石，不可转也。我心匪席，不可卷也。威仪棣棣，不可选也。…</blockquote>
