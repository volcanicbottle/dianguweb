<h1>黄祖不怜</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>祢衡字正平，平原般人也。……后复侮慢于表，表耻不能容，以江夏太守黄祖性急，故送衡与之，祖亦善待焉。衡为作书记，轻重密，各得体宜。祖持其手曰：「处士，此正得祖意，如祖腹中之所欲言也。」 ……后黄祖在蒙冲船上，大会宾客，而衡言不逊顺，祖惭，乃诃之，衡更熟视曰：「死公！云等道？」祖大怒，令五百将出，欲加箠，衡方大骂，祖恚，遂令杀之。…</blockquote>
<h2>别名</h2><p>遭江夏、怨黄祖、黄祖不容、祢衡、黄祖</p>
<h2>用它的诗</h2>
<p>题郑十八著作虔 · 杜甫 <span class="verse">「祢衡实恐遭江夏」</span></p>
