<p class="meta">典故 · 5 首诗使用</p>

<h2>出处</h2><p>《陶渊明集》</p><blockquote>孟夏草木长，绕屋树扶疏。众鸟欣有托，吾亦爱吾庐。既耕亦已种，时还读我书。穷巷隔深辙，颇回故人车。欢然酌春酒，摘我园中蔬。微雨从东来，好风与之俱。泛览周王传，流观山海图。俯仰终宇宙，不乐复何如。…</blockquote>
<h2>别名</h2><p>吾亦爱吾庐、陶庐、吾爱吾庐、绕屋树扶疏、结庐慕陶、陶潜</p>
