<h1>书报天涯</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>自从初降，以至今日，身之穷困，独坐愁苦，终日无，但见异类。韦鞲毳幕，以御风雨。膻肉酪浆，以充饥渴。举目言笑，谁与为欢？胡地玄冰，边土惨裂，但闻悲风萧条之声。凉秋九月，塞外草衰。夜不能寐，侧耳远听，胡笳互动，牧马悲鸣，吟啸成群，边声四起。晨坐听之，不觉泪下。嗟乎子卿！陵独何心，能不悲哉！与子别后，益复无聊。上念老母，临年被戮；妻子无辜，并为鲸鲵。身负国恩，为世所悲。子归受荣，我留受辱，命也如何！…</blockquote>
<h2>别名</h2><p>陵独何心、李陵</p>
<h2>用它的诗</h2>
<p>杂曲歌辞 千里思 · 李白 <span class="verse">「飞书报天涯」</span></p>
