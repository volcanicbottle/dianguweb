<h2>出处</h2><p>《昭明文选》</p><blockquote>其形也，翩若惊鸿，婉若游龙。荣曜秋菊，华茂春松。髣髴兮若轻云之蔽月，飘飖兮若流风之回雪。远而望之，皎若太阳升朝霞；迫而察之，灼若芙蕖出渌波。襛纤得衷，脩短合度。…</blockquote>
<h2>别名</h2><p>一朵芙蓉泛清镜、一朵红莲初出水</p>
