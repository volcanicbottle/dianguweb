<h1>反离骚</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>先是时，蜀有司马相如，作赋甚弘丽温雅，雄心壮之，每作赋，常拟之以为式。又怪屈原文过相如，至不容，作离骚，自投江而死，悲其文，读之未尝不流涕也。以为君子得时则大行，不得时则龙蛇，遇不遇命也，何必湛身哉！乃作书，往往摭离骚文而反之，自岷山投诸江流以吊屈原，名曰〈反离骚〉。…</blockquote>
<h2>别名</h2><p>扬雄</p>
