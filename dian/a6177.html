<h1>纫兰佩</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《楚辞》</p><blockquote>「扈江离与辟芷兮，纫秋兰以为佩。」东汉·王逸注：「纫，索也。兰，香草也，秋而芳。佩，饰也，所以象德。故行清洁者佩芳，德仁明者佩玉，能解结者佩觿，能决疑者佩玦，故孔子无所不佩也。言己脩身清洁，乃取江离、辟芷，以为衣被；纫索秋兰，以为佩饰。」…</blockquote>
<h2>别名</h2><p>纫秋兰、纫兰为佩、佩兰、屈原</p>
