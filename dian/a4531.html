<h1>玉连环</h1>
<p class="meta">典故 · 4 首诗使用</p>

<h2>出处</h2><p>《战国策》</p><blockquote>秦始皇尝使使者遗君王后玉连环，曰：「齐多知，而解此环不？」君王后以示群臣，解臣不知解。君王后引椎椎破之，谢秦使曰：「谨以解矣。」…</blockquote>
<h2>别名</h2><p>解连环、连环结、连环解、连环玉、连环难解、连环情未已、齐后解环、君王后、秦始皇</p>
<h2>用它的诗</h2>
<p>汉宫春 · 辛弃疾 <span class="verse">「问何人、会解连环」</span></p>
<p>西江月 · 辛弃疾 <span class="verse">「清愁难解连环」</span></p>
<p>解连环 · 周邦彦 <span class="verse">「信妙手、能解连环」</span></p>
<p>浪涛沙・浪淘沙 · 周邦彦 <span class="verse">「连环解、旧香顿歇」</span></p>
