<h1>黄鹤呼子安</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>旧题汉·刘向《列仙传》卷下《陵阳子明》</p><blockquote>陵阳子明者，铚乡人也。好钓鱼。于旋溪钓得白龙，子明惧，解钩拜而放之。后得白鱼，腹中有书，教子明服食之法，子明遂上黄山，采五石脂，沸水而服之三年龙来迎去，止陵阳山上百馀年。山去地千馀丈。大呼山下人令上山半，告言溪中子安当来，问子明钓车在否。后二十馀年，子安死，人取葬石山下，有黄鹤来栖其冢边树上，呜呼子安云。…</blockquote>
<h2>别名</h2><p>陵阳子明</p>
<h2>用它的诗</h2>
<p>登敬亭山南望怀古赠窦主簿 · 李白 <span class="verse">「黄鹤呼子安」</span></p>
