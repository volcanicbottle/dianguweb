<p class="meta">典故 · 4 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>息徒兰圃，秣马华山。流磻平皋，垂纶长川。目送归鸿，手挥五弦。俯仰自得，游心泰玄。嘉彼钓叟，得鱼忘筌。郢人逝矣，谁与尽言？…</blockquote>
<h2>别名</h2><p>目送归鸿、目送孤鸿、目送征鸿、挥五弦、送飞鸟、手挥五弦、失飞鸿、中散送飞鸿、挥弦送鸿、举双白眼送飞鸿、送目鸣琴、断鸿远目、手挥七弦亦、手寄七弦桐，目送飞鸿、嵇康</p>
