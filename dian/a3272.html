<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《荆楚岁时记》</p><blockquote>按共工氏有不才之子、以冬至死、为疫鬼、畏赤豆、故冬至日作赤豆粥以禳之、又晋魏间、宫中以红线量日影、冬至后、日影添长一线…</blockquote>
<h2>别名</h2><p>添宫线、添绣线、宫线添、日添宫线、一线添长、线日增红、绣日添长、绣工减一线</p>
