<h1>适荆蛮</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《三国志》</p><blockquote>献帝西迁，粲徙长安，左中郎将蔡邕见而奇之。时邕才学显著，贵重朝廷，常车骑填巷，宾客盈坐。闻粲在门，倒屣迎之。粲至，年既幼弱，容状短小，一坐尽惊。邕曰：「此王公孙也，有异才，吾不如也。吾家书籍文章，尽当与之。」年十七，司徒辟，诏除黄门侍郎，以西京扰乱，皆不就。乃之荆州依刘表。…</blockquote>
<h2>别名</h2><p>飘零王粲、王粲不归秦、王粲滞荆州、王粲别荆蛮、去国王粲、王粲去国、王粲（字仲宣）</p>
<h2>用它的诗</h2>
<p>赠王二十四侍御契四十韵 · 杜甫 <span class="verse">「王粲不归秦」</span></p>
<p>将适吴楚留别章使君留后兼幕府诸公得柳字 · 杜甫 <span class="verse">「终作适荆蛮」</span></p>
