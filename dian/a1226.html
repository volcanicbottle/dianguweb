<h1>天柱折</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《淮南子》</p><blockquote>昔者共工与颛顼争为帝，怒而触不周之山，天柱折，地维绝。天倾西北，故日月星辰移焉；地不满东南，故水潦尘埃归焉。…</blockquote>
<h2>别名</h2><p>天柱倾、折柱、折天柱、共工触不周、共工折、不周崩摧、触天柱、共工、昆仓倾砥柱、头触不周折、懮天缺</p>
<h2>用它的诗</h2>
<p>自京赴奉先县咏怀五百字 · 杜甫 <span class="verse">「恐触天柱折」</span></p>
