<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《杨太真外传》</p><blockquote>至乾元元年，贺怀智又上言，曰：「昔上夏日与亲王棋，令臣独弹琵琶，贵妃立于局前观之。上数枰子将输，贵妃放康国猧子上局乱之，上大悦。时风吹贵妃领巾于臣巾上，良久，回身方落。及归，觉满身香气。乃卸头帻。贮于锦囊中。今辄进所贮?头。」上皇发囊，且曰：「此瑞龙脑香也。吾曾施于暖池玉莲朵，再幸尚有香气宛然。况乎丝缕润腻之物哉。」遂凄怆不已。…</blockquote>
