<h1>五马渡江</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>太安中，童谣曰：「五马游渡江，一马化为龙。」后中原大乱，宗藩多绝，唯琅邪、汝南、西阳、南顿、彭城同至江东，而元帝嗣统矣。…</blockquote>
<h2>别名</h2><p>五马南来、一马化为龙、南渡马、渡江天马、浮五马、群马南渡、五马南游、渡江天马南来</p>
