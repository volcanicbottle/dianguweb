<h1>余发种种如是</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《春秋左传正义》</p><blockquote>齐侯田于莒。卢蒲嫳见。泣且请曰。余发如此种种。余奚能为。公曰。诺。吾告二子。归而告之。子尾欲复之。子雅不可。曰。彼其发短而心甚长。其或寝处我矣。九月。子雅放卢蒲嫳于北燕。燕简公多嬖宠。欲去诸大夫。而立其宠人。冬。燕大夫比以杀公之外嬖。公惧奔齐。书曰。北燕伯款出奔齐。罪之也。晋·杜预注：「种种，短也。自言衰老，不能复为害。」…</blockquote>
<h2>别名</h2><p>种种看余发</p>
