<h1>陆浚仪</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>俄以公府掾为太子舍人，出补浚仪令。县居都会之要，名为难理。云到官肃然，下不能欺，市无二价。人有见杀者，主名不立，云录其妻，而无所问。十许日遣出，密令人随后，谓曰：「其去不出十里，当有男子候之与语，便缚来。」既而果然。问之具服，云：「与此妻通，共杀其夫，闻妻得出，欲与语，惮近县，故远相要候。」于是一县称其神明。郡守害其能，屡谴责之，云乃去官。百姓追思之，图画形象，配食县社。…</blockquote>
<h2>别名</h2><p>陆云、士龙</p>
<h2>用它的诗</h2>
<p>九日杨奉化会白水崔明府 · 杜甫 <span class="verse">「同时陆浚仪」</span></p>
