<h1>无国要孟子</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>孟轲，驺人也。受业子思之门人。道既通，游事齐宣王，宣王不能用。适梁，梁惠王不果所言，则见以为迂远而阔于事情。当是之时，秦用商君，富国彊兵；楚、魏用吴起，战胜弱敌；齐威王、宣王用孙子、田忌之徒，而诸侯东面朝齐。天下方务于合从连衡，以攻伐为贤，而孟轲乃述唐、虞、三代之德，是以所如者不合。退而与万章之徒序诗书，述仲尼之意，作孟子七篇。其后有驺子之属。…</blockquote>
<h2>别名</h2><p>孟子</p>
<h2>用它的诗</h2>
<p>杜秋娘诗 · 杜牧 <span class="verse">「无国要孟子」</span></p>
