<h1>十日饮</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>十日欢：指朋友相见而饮酒尽欢。唐李白《寻鲁城北范居士失道落苍耳中见范置酒摘苍耳作》：“近作十曰欢，远为千载期。”</p>
<h2>出处</h2><p>《史记》</p><blockquote>秦昭王闻魏齐在平原君所，欲为范雎必报其仇，乃详为好书遗平原君曰；「寡人闻君之高义，愿与君为布衣之友，君幸过寡人，寡人愿与君为十日之饮。」…</blockquote>
<h2>别名</h2><p>平原酒、十日欢、平原饮、平原十日饮、宾客平原、极欢留十日、平原燕浃旬、平原期、平原张宴、秦昭王、赵胜（平原君）</p>
<h2>用它的诗</h2>
<p>寻鲁城北范居士失道落苍耳中见范置酒摘苍耳作 · 李白 <span class="verse">「近作十日欢」</span></p>
