<h1>识吕蒙</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《三国志》</p><blockquote>遣都尉赵咨使魏。魏帝问曰：「吴王何等主也？」咨对曰：「聪明仁智，雄略之主也。」帝问其状，咨曰：「纳鲁肃于凡品，是其聪也；拔吕蒙于行陈，是其明也；获于禁而不害，是其仁也；取荆州而兵不血刃，是其智也；据三州虎视于天下，是其雄也；屈身于陛下，是其略也。」…</blockquote>
<h2>别名</h2><p>孙权、吕蒙</p>
<h2>用它的诗</h2>
<p>投赠哥舒开府二十韵 · 杜甫 <span class="verse">「行间识吕蒙」</span></p>
