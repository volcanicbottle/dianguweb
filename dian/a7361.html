<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>南朝宋·刘敬叔《异苑》卷六</p><blockquote>句章人吴平州门前，忽生一株青桐。树上有谣歌之声。平恶而斫杀。平随军北征，首尾三载，死桐歘自还，立于故根之上。又闻树巅空中歌曰：「死桐今更青，吴平寻当归，适闻杀此树，以复有光辉。」……如谣。…</blockquote>
<h2>别名</h2><p>甘棠</p>
<h2>用它的诗</h2>
<p>君不见简苏徯 · 杜甫 <span class="verse">「百年死树中琴瑟」</span></p>
