<h1>满地梨花雪</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《玉台新咏》</p><blockquote>风光迟舞出青蘋，兰条翠鸟鸣发春。洛阳梨花落如雪，河边细草细如茵。桐生井底叶交枝，今看无端双燕离。五重飞楼入河汉，九华阁道暗清池。遥看白马津上吏，传道黄龙征戍儿。明月金光徒照妾，浮云玉叶君不知。思君昔去柳依依，至今八月避暑归。明珠蚕茧勉登机，郁金香为特香衣。洛阳城头鸡欲曙，丞相府中乌未飞，夜梦征人缝狐貉，私怜织妇裁锦绯。吴刀郑绵络，寒闺夜被薄。芳年海上水中凫，日暮寒夜空城雀。…</blockquote>
