<h2>出处</h2><p>《太平广记》</p><blockquote>唐玄宗尝梦仙子十余辈，御卿云而下列于庭，各执乐曲而奏之，其度曲清哉，真仙府之音也。及乐阕，有一仙人前而言曰：「陛下知此乐乎？此神仙《紫云曲》也。今愿传授陛下，为圣唐正始音。与夫咸池大夏，固不同矣。」玄宗喜甚，即传受焉。俄而寤，其馀响犹若在听。玄宗遽命玉笛吹而习之，尽得其节奏；然嘿不泄。及晓，听政于紫宸殿，宰臣姚崇、宋璟入，奏事于御前，玄宗俯若不闻。二相惧，又奏之。玄宗即起，卒不顾二相。二相益恐，趋出。时高力士侍于玄宗，即奏曰：「宰相请事…</blockquote>
