<h1>挥金陌上郎</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《西京杂记》</p><blockquote>杜陵秋胡者，能通尚书，善为古隶字，为翟公所礼，欲以兄女妻之，或曰：「秋胡巳经娶而失礼。」妻遂溺死不可妻也。驰象曰：「昔鲁人秋胡，娶妻三月而游宦，三年休还家。其妇采桑于郊，胡至郊而不识其妻也。见而悦之，乃遗黄金一镒。妻曰：『妾有夫游宦不返，幽闺独处，三年于兹，未有被辱如今日也。』采不顾，胡惭而退。至家，问家人妻何在，曰行采桑于郊未返。既还，乃向所挑之妇也，夫妻并惭，妻赴沂水而死。今之秋胡，非昔之秋胡也。昔鲁有两曾参，赵有两毛遂，南曾参杀人…</blockquote>
