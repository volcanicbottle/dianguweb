<h2>出处</h2><p>《楚辞补注》</p><blockquote>悲时俗之迫阨兮，愿轻举而远游。质菲薄而无因兮，焉托乘而上浮。遭沈浊而污秽兮，独郁结其谁语！夜耿耿而不寐兮，魂茕茕而至曙。……重曰：春秋忽其不淹兮，奚久留此故居？轩辕不可攀援兮，吾将从王乔而娱戏！餐六气而饮沆瀣兮，漱正阳而含朝霞。保神明之清澄兮，精气入而粗秽除。顺凯风以从游兮，至南巢而壹息。见王子而宿之兮，审壹气之和德。……风伯为余先驱兮，氛埃辟而清凉。凤皇翼其承旂兮，遇蓐收乎西皇。……视倏忽而无见兮，听惝恍而无闻。超无为以至清兮，与泰初…</blockquote>
