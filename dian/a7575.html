<h1>太玄经</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>赞曰：雄之自序云尔。初，雄年四十馀，自蜀来至游京师，大司马车骑将军王音奇其文雅，召以为门下史，荐雄待诏，岁馀，奏羽猎赋，除为郎，给事黄门，与王莽、刘歆并。哀帝之初，又与董贤同官。当成、哀、平间，莽、贤皆为三公，权倾人主，所荐莫不拔擢，而雄三世不徙官。及莽篡位，谈说之士用符命称功德获封爵者甚众，雄复不侯，以耆老久次转为大夫，恬于势利乃如是。实好古而乐道，其意欲求文章成名于后世，以为经莫大于易，故作太玄；传莫大于论语，作法言；史篇莫善于仓颉…</blockquote>
