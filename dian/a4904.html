<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《先秦汉魏晋南北朝诗·晋诗》</p><blockquote>〈饮酒诗二十首〉其二十：「羲农去我久，举世少复真。汲汲鲁中叟，弥缝使其淳。凤鸟虽不至，礼乐暂得新。洙泗辍微响，漂流逮狂秦。诗书复何罪，一朝成灰尘。区区诸老翁，为事诚殷勤。如何绝世下，六籍无一亲。终日驰车走，不见所问津。若复不快饮，空负头上巾。但恨多谬误，君当恕醉人。」…</blockquote>
<h2>别名</h2><p>我去羲农久</p>
<h2>用它的诗</h2>
