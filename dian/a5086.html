<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《三国志》</p><blockquote>评曰：许靖夙有名誉，既以笃厚为称，又以人物为意，虽行事举动，未悉允当，蒋济以为「大较廊庙器」也。…</blockquote>
<h2>别名</h2><p>廊庙之具、廊庙才、许靖（字文休）、许靖</p>
