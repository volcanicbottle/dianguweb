<h1>闭玉门</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>贰师将军（李广利）军既西过盐水，当道小国恐，各坚城守，不肯给食。攻之不能下。下者得食，不下者数日则去。比至郁成，士至者不过数千，皆饥罢。攻郁成，郁成大破之，所杀伤甚众。贰师将军与哆、始成等计：「至郁成尚不能举，况至其王都乎？」引兵而还。往来二岁。还至敦煌，士不过什一二。使使上书言：「道远多乏食；且士卒不患战，患饥。人少，不足以拔宛。愿且罢兵，益发而复往。」天子闻之，大怒，而使使遮玉门，曰军有敢入者辄斩之！贰师恐，因留敦煌。…</blockquote>
<h2>别名</h2><p>遮塞、遮玉门、李广利</p>
