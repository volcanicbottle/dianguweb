<h1>浩浩洪流</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>桓公伏甲设馔，广延朝士，因此欲诛谢安、王坦之。王甚遽，问谢曰：「当作何计？」谢神意不变，谓文度曰：「晋阼存亡，在此一行。」相与俱前。王之恐状，转见于色。谢之宽容，愈表于貌。望阶趋席，方作洛生咏，讽「浩浩洪流」。桓惮其旷远，乃趣解兵。…</blockquote>
<h2>别名</h2><p>桓温、谢安</p>
<h2>用它的诗</h2>
<p>东山吟 · 李白 <span class="verse">「浩浩洪流之咏何必奇」</span></p>
