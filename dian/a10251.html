<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>六朝旧事随流水两句：窦巩《南游感兴》诗，“伤心欲问前朝事，惟见江流去不回。日暮东风春草绿，鹧鸪飞上越王台。”此用其意。六朝，见前16页张□《离亭燕》注。</p>
