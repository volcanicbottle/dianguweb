<h2>出处</h2><p>《全唐诗》</p><blockquote>我浮黄云去京阙【我浮黄河去京阙】，挂席欲进波连山。天长水阔厌远涉，访古始及平台间。平台为客忧思多，对酒遂作梁园歌。却忆蓬池阮公咏，因吟渌水扬洪波。洪波浩荡迷旧国，路远西归安可得。人生达命岂暇愁，且饮美酒登高楼。平头奴子摇大扇，五月不热疑清秋。玉盘杨梅为君设，吴盐如花皎白雪。持盐把酒但饮之，莫学夷齐事高洁【何用孤高比云月】。昔人豪贵信陵君，今人耕种信陵坟。荒城虚照碧山月，古木尽入苍梧云。粱王宫阙今安在，枚马先归不相待。舞影歌声散绿池，空馀…</blockquote>
