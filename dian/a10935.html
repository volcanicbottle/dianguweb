<h1>朝槿</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>山中句，意谓深居山中，望着槿花的开落以修养宁静之性。槿（紧jǐn），也叫蕣，落叶灌木，其花早开晚谢。郭璞《游仙诗》也说“蕣荣不终朝”，故以此悟人生荣枯无常之理。</p>
<h2>出处</h2><p>《游仙诗》</p><blockquote>山中句，意谓深居山中，望着槿花的开落以修养宁静之性。槿（紧jǐn），也叫蕣，落叶灌木，其花早开晚谢。郭璞《游仙诗》也说“蕣荣不终朝”，故以此悟人生荣枯无常之理。…</blockquote>
<h2>别名</h2><p>山中句</p>
<h2>用它的诗</h2>
<p>积雨辋川庄作 · 王维 <span class="verse">「山中习静观朝槿」</span></p>
