<h1>河上公</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>晋·葛洪《神仙传》卷三《河上公》</p><blockquote>汉文帝往见河上公，「公既抚掌坐跃，冉冉在虚空中，去地数丈，俯仰而答曰：『予上不至天，中不累人，下不居地。何民臣之有？』帝乃下车稽首。……公乃授素书二卷与帝，曰：『……勿以示非其人。』言毕失其所在。须臾云雾晦冥，天地泯合。帝甚贵之。论者以为文帝好《老子》之言，世不能尽通，故神人特下教之。」…</blockquote>
<h2>别名</h2><p>河上仙翁、刘恒（汉文帝）、经传拱汉皇</p>
<h2>用它的诗</h2>
<p>九日登望仙台呈刘明府 · 崔曙 <span class="verse">「河上仙翁去不回」</span></p>
<p>冬日洛城北谒玄元皇帝庙 · 杜甫 <span class="verse">「经传拱汉皇」</span></p>
