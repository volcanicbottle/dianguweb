<h1>蓬莱旧事</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>蓬莱旧事：胡仔《苕溪渔隐丛话》引《艺苑雌黄》，“程公辟守会稽，少游客焉，馆之蓬莱阁。一日，席上有所悦，自尔眷眷不能忘情，因赋长短句。所谓‘多少蓬莱旧事，空回首、烟霭纷纷’也。”蓬莱阁，旧址在今浙江绍兴市龙山下。</p>
