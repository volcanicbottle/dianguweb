<h1>夔龙</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《尚书·虞书·舜典》</p><blockquote>「伯拜稽首，让于夔龙，……帝曰：『俞往钦哉！』帝曰：『夔，命汝典乐，教冑子。直而温，宽而栗。刚而无虐，而无傲。……神人以和。』夔曰：『于予击石，拊石，百兽率舞。』帝曰：『龙，朕堲谗说殄行，震惊朕师，命汝作纳言，夙夜出纳朕命，惟允。』」旧题汉·孔安国传：「夔、龙，二臣名。」…</blockquote>
<h2>别名</h2><p>龙夔、夔乐、伊夔、夔、夔听、夔相、伊尹（名挚，又名阿衡）、龙、伊尹</p>
<h2>用它的诗</h2>
<p>同卢拾遗过韦给事东山别业二十韵给事首春休沐维已陪游及乎是行亦预闻命会无车马不果斯诺 · 王维 <span class="verse">「高阳多夔龙」</span></p>
