<h1>蓟训历家</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《神仙传》</p><blockquote>蓟子训者，齐人也。少尝仕州郡，举孝廉，除郎中。又从军，除驸马都尉，人莫知其有道。在乡里时，唯行信让，与人从事，如此三百馀年，颜色不老。……生曰：「欲见先生者甚多，不敢枉屈。但知先生所至，当自来也。」子训曰：「吾千里不倦，岂惜寸步乎？欲见者，语之令各绝宾客，吾明日当各诣宅。」生如言告诸贵人，各自绝客洒扫。至时子训果来，凡二十三家，各有一子训。诸朝士各谓子训先到其家。明日至朝，各问子训何时到宅，二十三人所见皆同时，所服饰颜貌无异，唯所言话，…</blockquote>
<h2>别名</h2><p>蓟子训</p>
<h2>用它的诗</h2>
<p>赠别褚山人 · 高适 <span class="verse">「光阴蓟子训」</span></p>
