<h1>侍甘泉</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>孝成帝时，客有荐雄文似相如者，上方郊祠甘泉泰畤、汾阴后土，以求继嗣，召雄待诏承明之庭。正月，从上甘泉，还奏甘泉赋以风。……甘泉本因秦离宫，既奢泰，而武帝复增通天、高光、迎风。宫外近则洪厓、旁皇、储胥、弩阹，远则石关、封峦、枝鹊、露寒、棠、师得，游观屈奇瑰玮，非木摩而不彫，墙涂而不画，周宣所考，般庚所迁，夏卑宫室，唐虞棌椽三等之制也。…</blockquote>
<h2>别名</h2><p>上甘泉、甘泉近侍、扬雄</p>
<h2>用它的诗</h2>
<p>长相思 · 陆游 <span class="verse">「上甘泉」</span></p>
