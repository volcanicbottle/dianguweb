<h1>笑绝缨</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>威王八年，楚大发兵加齐。齐王使淳于髡之赵请救兵，赍金百斤，车马十驷。淳于髡仰天大笑，冠缨索绝。王曰：「先生少之乎？」髡曰：「何敢！」王曰：「笑岂有说乎？」髡曰：「今者臣从东方来，见道傍有禳田者，操一豚蹄，酒一盂，祝曰：『瓯窭满篝，污邪满车，五谷蕃熟，穰穰满家。』臣见其所持者狭而所欲者奢，故笑之。」于是齐威王乃益赍黄金千溢，白璧十双，车马百驷。髡辞而行，至赵。赵王与之精兵十万，革车千乘。楚闻之，夜引兵而去。…</blockquote>
<h2>别名</h2><p>冠缨绝、仰天大笑冠簪落、缨索绝、大笑绝缨</p>
<h2>用它的诗</h2>
<p>兰陵王 · 辛弃疾 <span class="verse">「仰天大笑冠簪落」</span></p>
