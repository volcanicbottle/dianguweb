<h2>出处</h2><p>《新唐书》</p><blockquote>俗喜酒，嗜乾饼。多幻人，能发火于颜，手为江湖，口幡眊举，足堕珠玉。有善医能开脑出虫以愈目眚。土多金、银、夜光璧、明月珠、大贝、车渠、码、木难、孔翠、虎魄。织水羊毛为布，曰海西布。海中有珊瑚洲，海人乘大舶，堕铁网水底。珊瑚初生磐石上，白如菌，一岁而黄，三岁赤，枝格交错，高三四尺。铁发其根，系网舶上，绞而出之，失时不取即腐。西海有市，贸易不相见，置直物旁，名鬼市。有兽名腐，大如狗，犷恶而力。北邑有羊，生土中，脐属地，割必死，俗介马而走，击…</blockquote>
