<h1>寄当归</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《三国志》</p><blockquote>姜维字伯约，天水冀人也。少孤，与母居。好郑氏学。仕郡上计掾，州辟为从事。以父囧昔为郡功曹，值羌、戎叛乱，身卫郡将，没于战场，赐维官中郎，参本郡军事。建兴六年，丞相诸葛亮军向祁山，时天水太守适出案行，维及功曹梁绪、主簿尹赏、主记梁虔等从行。太守闻蜀军垂至，而诸县响应，疑维等皆有异心，于是夜亡保上邽。维等觉太守去，追迟，至城门，城门已闭，不纳。维等相率还冀，冀亦不入维。维等乃俱诣诸葛亮。会马谡败于街亭，亮拔将西县千馀家及维等还，故维遂与母相…</blockquote>

<h2>用它的诗</h2>
<p>瑞鹧鸪 · 辛弃疾 <span class="verse">「故人今又寄当归」</span></p>
