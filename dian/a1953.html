<h2>出处</h2><p>《全唐文》</p><blockquote>作〈迎享送神诗〉遗柳民，伸歌以祀焉，而并刻之。柳侯，河东人，讳宗元，字子厚。贤而有文章。尝位于朝，光显矣，已而摈不用。其辞曰：荔子丹兮蕉黄。杂肴蔬兮进侯堂。侯之船兮两旗。度中流兮风泊之。待侯不来兮不知我悲。侯乘驹兮入庙。慰我民兮不以笑。鹅之山兮柳之水。桂树团团兮白石齿齿。侯朝出游兮暮来归。春与猿吟兮秋鹤与飞。北方之人兮为侯是非。千秋万岁兮侯无我违。福我兮寿我。驱厉鬼兮山之左。下无苦湿兮高无干。粳稌充羡兮蛇蛟结蟠。我民报事兮无怠。其始自…</blockquote>
