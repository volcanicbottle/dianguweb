<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>孙登长啸：咏啸傲。唐王维《偶然作六首》之三：“孙登长啸台，松竹有遗处。”</p>
<h2>出处</h2><p>《三国志》</p><blockquote>南朝宋·裴松之注引晋·孙盛《晋阳秋》：「康见孙登，登对之长啸，逾时不言。康辞还，曰：『先生竟无言乎？』登曰：『惜哉！』」…</blockquote>
<h2>别名</h2><p>孙登</p>
<h2>用它的诗</h2>
<p>偶然作六首 三 · 王维 <span class="verse">「孙登长啸台」</span></p>
