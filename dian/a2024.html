<h1>俎豆庚桑</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子集释》</p><blockquote>老聃之役有康桑楚者，偏得老聃之道，以北居畏垒之山，其臣之画然知者去之，其妾之挈然仁者远之；拥肿之与居，鞅掌之为使。居三年，畏垒大壤。畏垒之民相与言曰：「庚桑子之始来，吾洒然异之。今吾日计之而不足，岁计之而有馀，庶几其圣人乎！子胡不相与尸而祝之，社而稷之乎？」庚桑子闻之，南面而不释然。弟子异之。庚桑子曰：「弟子何异于予？夫春气发而百草生，正得秋而万宝成。夫春与秋，岂无得而然哉？天道已行矣。吾闻至人，尸居环堵之室，而百姓猖狂不知所如往。今以…</blockquote>
