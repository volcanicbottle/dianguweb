<h1>渡辽水</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>崔骃字亭伯，涿郡安平人也。……及宪为车骑将军，辟骃为掾。宪府贵重，掾属三十人，皆故刺史、二千石，唯骃以处士年少，擢在其閒。宪擅权骄恣，骃数谏之。及出击匈奴，道路愈多不法，骃为主簿，前后奏记数十，指切长短。宪不能容，稍之，因察骃高第，出为长岑长。骃自以远去，不得意，遂不之官而归。永元四年，卒于家。…</blockquote>
<h2>别名</h2><p>亭伯流离、亭伯去、亭伯之辽东、往长岑、亭伯投荒、崔骃、窦宪</p>
<h2>用它的诗</h2>
<p>单父东楼秋夜送族弟沈之秦 · 李白 <span class="verse">「亭伯流离放辽海」</span></p>
<p>奔亡道中五首 二 · 李白 <span class="verse">「亭伯去安在」</span></p>
