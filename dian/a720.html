<h1>拜井</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《艺文类聚》</p><blockquote>《东观汉记》曰：耿恭为校尉，居疏勒。匈奴来攻，城中穿井十五丈无水。恭曰：「闻二师将军，拔佩刀刺山，而飞泉出。今汉德神灵，岂有穷乎？」乃正衣服，向井拜，为吏请祷。有顷，井泉濆出。…</blockquote>
<h2>别名</h2><p>甘泉涌、耿恭拜井、刺山、泄井、疏勒出飞泉、耿恭祷泉、广利开泉、佩刀刺山、疏勒乏水源、耿恭（字伯忠）</p>
<h2>用它的诗</h2>
<p>老将行 · 王维 <span class="verse">「疏勒出飞泉」</span></p>
