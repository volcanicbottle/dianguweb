<h1>空腹有诗衣有结</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>白社：指隐士居所。唐孟浩然《宴包二融宅》：“烟瞑栖鸟还，余亦归白社。‘’</p>
<h2>出处</h2><p>《王隐晋书》</p><blockquote>董京字威辇，不知何许人。太始初，值魏禅晋，遂被发徉狂。忽至洛阳，帝止宿白社中，时乞于市，得残碎缯絮，辄结为衣以自覆，号曰百结衣，全帛佳绵则不肯受。著作郎孙楚就社中与语，遂载于归，终不肯坐。后数年去，莫知其所，其寝处得一石竹子，其诗曰：「末世流奔，以文代质。逝将抱此元虚，归我寂寞之室。」…</blockquote>
<h2>别名</h2><p>白社</p>
<h2>用它的诗</h2>
<p>浣溪沙 · 苏轼 <span class="verse">「空腹有诗衣有结」</span></p>
