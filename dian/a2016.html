<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《新唐书》</p><blockquote>赞曰：唐名儒多言琯德器，有王佐材，而史载行事，亦少贬矣。一举丧师，讫不复振。原琯以忠谊自奋，片言悟主而取宰相，必有以过人者，用违所长，遂无成功。然盛名之下，为难居矣。夫名盛则责望备，实不副则訾咎深。使琯遭时承平，从容帷幄，不失为名宰。而仓卒济难，事败隙生，陷于浮虚比周之罪，名之为累也，戒哉！…</blockquote>
<h2>别名</h2><p>房琯</p>
<h2>用它的诗</h2>
<p>千秋岁 · 辛弃疾 <span class="verse">「从容帷幄去」</span></p>
