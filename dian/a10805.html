<h1>霓裳</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>便当日亲见霓裳两句：即使当日亲自看见故国的歌舞承平景象，现在也成为梦境了。霓裳，即《霓裳羽衣曲》，是唐时流行的歌舞曲。天上人间，用李煜《浪淘沙》词“流水落花春去也，天上人间”语。</p>
<h2>出处</h2><p>《霓裳羽衣曲》</p><blockquote>便当日亲见霓裳两句：即使当日亲自看见故国的歌舞承平景象，现在也成为梦境了。霓裳，即《霓裳羽衣曲》，是唐时流行的歌舞曲。天上人间，用李煜《浪淘沙》词“流水落花春去也，天上人间”语。…</blockquote>
<h2>别名</h2><p>便当日亲见霓裳两句</p>
<h2>用它的诗</h2>
<p>宝鼎现 · 刘辰翁 <span class="verse">「便当日亲见霓裳天上人间梦里」</span></p>
<p>西江月 · 张孝祥 <span class="verse">「水晶宫里奏霓裳」</span></p>
