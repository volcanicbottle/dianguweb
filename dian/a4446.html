<h1>渴望梅</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>渴望梅：喻指以空想安慰自己。唐罗隐《丁亥岁作》：“病想医门渴望梅，十年心地反成灰。”</p>
<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>魏武行役，失汲道，军皆渴，乃令曰：「前有大梅林，饶子，甘酸，可以解渴。」士卒闻之，口皆出水，乘此得及前源。…</blockquote>
<h2>别名</h2><p>望梅止渴、将军止渴、望林止渴、魏林、救渴将军、望梅、说梅止渴、遥止渴、庾岭止渴、征徒异渴、岭梅止渴、梅林止渴、止渴、曹操（魏武帝）</p>
<h2>用它的诗</h2>
<p>最高楼 · 辛弃疾 <span class="verse">「将军止渴山南畔」</span></p>
<p>沁园春 · 辛弃疾 <span class="verse">「要得诗来渴望梅」</span></p>
