<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>羲之书初不胜庾翼、郗愔，及其暮年方妙，尝以章草答庾亮，而翼深叹伏，因与羲之书云：「吾昔有伯英章草十纸，过江颠狈，遂乃亡失，常叹妙迹永绝。忽见足下答家兄书，焕若神明，顿还旧观。」…</blockquote>
<h2>别名</h2><p>庾翼服右军、庾翼、王羲之</p>
<h2>用它的诗</h2>
<p>自桂林奉使江陵途中感怀寄献尚书 · 李商隐 <span class="verse">「数须传庾翼」</span></p>
