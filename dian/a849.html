<h1>悲莫悲生离别</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《楚辞补注》</p><blockquote>秋兰兮麋芜，罗生兮堂下。绿叶兮素枝，芳菲菲兮袭予。夫人自有兮美子，荪何以兮愁苦！秋兰兮青青，绿叶兮紫茎。满堂兮美人，忽独与余兮目成。入不言兮出不辞，乘回风兮载云旗。悲莫悲兮生别离，乐莫乐兮新相知。荷衣兮蕙带，倏而来兮忽而逝。夕宿兮帝郊，君谁须兮云之际？与女游兮九河，冲风至兮水扬波。与女沐兮咸池，晞女发兮阳之阿。望美人兮未来，临风恍兮浩歌。孔盖兮翠旌，登九天兮抚彗星。竦长剑兮拥幼艾，荪独宜兮为民正。…</blockquote>
<h2>别名</h2><p>兰衣蕙带</p>
