<h2>出处</h2><p>《春秋左传·成公二年》</p><blockquote>齐侯见保者，曰：「勉之，齐师败矣！」辟女子。女子曰：「君免乎？」曰：「免矣！」曰：「锐司徒免乎！」曰：「免矣！」曰：「苟君与吾父免矣，可若何？」乃奔。齐侯以为有礼。既而问之，辟司徒之妻也。予之石窌。…</blockquote>
