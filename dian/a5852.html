<h1>门阑苏生</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>十六年，秦欲伐齐，而楚与齐从亲，秦惠王患之，乃宣言张仪免相，使张仪南见楚王，谓楚王曰：「敝邑之王所甚说者无先大王，虽仪之所甚愿为门阑之厮者亦无先大王。敝邑之王所甚憎者无先齐王，虽仪之所甚憎者亦无先齐王。而大王和之，是以敝邑之王不得事王，而令仪亦不得为门阑之厮也。」…</blockquote>
<h2>别名</h2><p>张仪、楚怀王</p>
<h2>用它的诗</h2>
<p>入衡州 · 杜甫 <span class="verse">「门阑苏生在」</span></p>
