<h2>出处</h2><p>《楚辞补注》</p><blockquote>惟昊天兮昭灵。阳气发兮清明。风习习兮和煖。百草萌兮华荣。堇荼茂兮扶疏。蘅芷彫兮莹嫇。悯贞良兮遇害。将夭折兮碎糜。时混混兮浇饡。哀当世兮莫知。览往昔兮俊彦。亦诎辱兮系累。管束缚兮桎梏。百货易兮傅卖。遭桓缪兮识举。才德用兮列施。且从容兮自慰。玩琴书兮游戏。迫中国兮迮。吾欲之兮九夷。超五岭兮嵯峨。观浮石兮崔嵬。陟丹山兮炎野。屯余车兮黄支。就祝融兮稽疑。嘉已行兮无为。乃回朅兮北逝。遇神孈兮宴娭。欲静居兮自娱。心愁戚兮不能。放余辔兮策驷。忽飙腾…</blockquote>
