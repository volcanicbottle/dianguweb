<h2>出处</h2><p>《庄子集释》</p><blockquote>市南子曰：「君之除患之术浅矣！夫丰狐文豹，栖于山林，伏于岩穴，静也；夜行昼居，戒也；虽饥渴隐约，犹旦胥疏于江湖之上而求食焉，定也；然且不免于罔罗机辟之患。是何罪之有哉？其皮为之灾也。今鲁国独非君之皮邪？吾愿君刳形去皮，洒心去欲，而游于无人之野。南越有邑焉，名为建德之国。其民愚而朴，少私而寡欲；知作而不知藏，与而不求其报；不知义之所适，不知礼之所将；猖狂妄行，乃蹈乎大方；其生可乐，其死可葬。吾愿君去国捐俗，与道相辅而行。」唐·成玄英疏：「…</blockquote>
