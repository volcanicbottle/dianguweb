<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《唐摭言》</p><blockquote>薛监晚年厄于宦途，尝策羸赴朝，值新进士榜下，缀行而出。时进士团所由辈数十人，见逢行李萧条，前导曰：「回避新郎君！」逢冁然，因遣一介语之曰：「报道莫贫相，阿婆三五少年时，也曾东涂西抹来。」…</blockquote>
