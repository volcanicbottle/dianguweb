<h1>清溪姓彭</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子集释》</p><blockquote>小知不及大知，小年不及大年。奚以知其然也？朝菌不知晦朔，蟪蛄不知春秋，此小年也。楚之南有冥灵者，以五百岁为春，五百岁为秋；上古有大椿者，以八千岁为春，八千岁为秋。而彭祖乃今以久特闻，众人匹之，不亦悲乎！唐·成玄英疏：「尧封于彭城，其道可祖，故谓之彭祖。」唐·陆德明《经典释文》引《世本》云：「姓篯，名铿，在商为守藏史，在周为柱下史，年八百岁。」…</blockquote>
