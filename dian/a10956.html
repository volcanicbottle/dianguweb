<h1>紫泉</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>紫泉，即紫渊。唐人避唐高祖李渊讳改紫泉。司马相如《上林赋》写长安上林苑的形胜，有“丹水更其南，紫渊径其北”语。这里以紫泉宫殿指长安隋宫。锁烟霞，喻冷落。</p>
<h2>出处</h2><p>《上林赋》</p><blockquote>紫泉，即紫渊。唐人避唐高祖李渊讳改紫泉。司马相如《上林赋》写长安上林苑的形胜，有“丹水更其南，紫渊径其北”语。这里以紫泉宫殿指长安隋宫。锁烟霞，喻冷落。…</blockquote>
