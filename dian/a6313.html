<h1>岐王宅里</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《明皇杂录》</p><blockquote>唐开元中，乐工李龟年、彭年、鹤年兄弟三人，皆有才学盛名。彭年善舞，鹤年、龟年能歌，尤妙制渭川，特承顾遇。于东都大起第宅，僭侈之制，踰于公侯。宅在东都通远里，中堂制度甲于都下。其后龟年流落江南，每遇良辰胜赏，为人歌数阕，座中闻之，莫不掩泣罢酒。则杜甫尝赠诗所谓：「岐王宅里寻常见，崔九堂前几度闻。正值江南好风景，落花时节又逢君。」崔九堂，殿中监涤，中书令湜之第也。…</blockquote>
<h2>别名</h2><p>杜甫、李范</p>
<h2>用它的诗</h2>
<p>江南逢李龟年 · 杜甫 <span class="verse">「岐王宅里」</span></p>
