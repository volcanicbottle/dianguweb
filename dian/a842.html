<h2>出处</h2><p>《全唐诗》</p><blockquote>尊酒相逢十载前，君为壮夫我少年。尊酒相逢十载后，我为壮夫君白首。我材与世不相当，戢鳞委翅无复望。当今贤俊皆周行，君何为乎亦遑遑【君何为乎独遑遑】。杯行到君莫停手，破除万事无过酒。…</blockquote>
