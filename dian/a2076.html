<h1>秦封</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>大夫松：咏松树，或喻受恩遇。唐鲍溶《闻国家将行封禅聊抒臣情》：“清跸间过素王庙，翠华高映大夫松。”</p>
<h2>出处</h2><p>《史记》</p><blockquote>二十八年，始皇东行郡县，上邹峄山。立石，与鲁诸儒生议，刻石颂秦德，议封禅望祭山川之事。乃遂上泰山，立石，封，祠祀。下，风雨暴至，休于树下，因封其树为五大夫。…</blockquote>
<h2>别名</h2><p>五大夫、大夫松、大夫封、封松、松作大夫、五株树、大夫材、秦封大夫、五株封、大夫树、秦封树、秦王封、五树松、秦帝封、始皇封松、秦官、秦始皇</p>
<h2>用它的诗</h2>
<p>李肱所遗画松诗书两纸得四十韵 · 李商隐 <span class="verse">「或以大夫封」</span></p>
