<h1>登泰山而小天下</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>用《孟子·尽心》「登泰山而小天下」意，喻立足高处则眼界开阔、万物皆小。杜甫《望岳》「会当凌绝顶，一览众山小」即化用此语。</p>
<h2>出处</h2><p>《孟子·尽心》</p><blockquote>孔子登东山而小鲁，登泰山而小天下。…</blockquote>

<h2>用它的诗</h2>
<p>望岳 · 杜甫 <span class="verse">「一览众山小」</span></p>
