<h1>吹裂冻云幕</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《岁时广记》</p><blockquote>《石林诗话》：晏元献公守南都，王君玉时在馆阁较勘，公特请于朝，以为府签判，宾主相得，日以赋诗饮酒为乐，佳时胜日，未尝辄废。尝遇中秋阴晦，公厨夙为备，公适无命，既至夜，君玉密使人伺公，曰：「已寝矣」。君玉亟为诗以入，曰：「只在浮云最深处，试凭弦管一吹开」。公枕上得诗，大喜，即索衣起，径召客治具，大合乐。至夜分，果月出，遂饮乐达旦。…</blockquote>
<h2>别名</h2><p>吹裂晚天云、铁笛云裂</p>
<h2>用它的诗</h2>
<p>满江红 · 吴文英 <span class="verse">「倩卧箫、吹裂晚天云」</span></p>
