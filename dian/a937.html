<h1>辟寒金</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《拾遗记》</p><blockquote>昆明国贡嗽金鸟。国人云：「其地去燃洲九千里，出此鸟，形如雀而色黄，羽毛柔密，常翱翔海上，罗者得之，以为至祥。闻大魏之德……来献大国。」帝得此鸟，畜于灵禽之圃，始以真珠，饮以龟脑。鸟常吐金屑如粟，铸之可以为器……此鸟畏霜雪，乃起小屋处之，名曰「辟寒台」……宫人争以鸟吐之金用饰钗佩，谓之「辟寒金」。故宫人相嘲曰：「不服辟寒金，那得帝王心。」…</blockquote>
<h2>别名</h2><p>避寒钿</p>
