<h1>连昌宫</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>连昌约略无多柳：连昌，唐别宫名，在河南宜阳县。宫中多植柳树。元稹的名作《连昌宫词》是写连昌宫战乱后的荒废景象。这里借指南宋故宫。约略，大概。</p>
<h2>出处</h2><p>《连昌宫词》</p><blockquote>连昌约略无多柳：连昌，唐别宫名，在河南宜阳县。宫中多植柳树。元稹的名作《连昌宫词》是写连昌宫战乱后的荒废景象。这里借指南宋故宫。约略，大概。…</blockquote>
<h2>别名</h2><p>连昌约略无多柳</p>
<h2>用它的诗</h2>
<p>月下笛 · 张炎 <span class="verse">「万里孤云清游渐远故人何处寒窗梦里犹记经行旧时路连昌约略无多柳」</span></p>
