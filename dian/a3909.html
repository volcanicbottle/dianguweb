<h1>天女散花</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>散花天女：指佛家仙女。唐顾云《华清词》：“太上符箓龙蛇踪，散花天女侍香童。”</p>
<h2>出处</h2><p>《法华经》</p><blockquote>「佛说是诸菩萨摩诃萨得大法利时，于虚空中，雨曼陀罗华，摩诃曼陀罗华。以散无量百十万亿众宝树下师子座上诸佛。」《佛说阿弥陀经》：「昼夜六时，天雨曼陀罗华。」…</blockquote>
<h2>别名</h2><p>散花天女、散花天、雨天花、天女花、曼陀雨、天雨曼陀、散六花、诸天散花、天花拂袂、花雨、雨花、散花维磨室、天花、天女相试</p>
<h2>用它的诗</h2>
<p>蝶恋花 · 苏轼 <span class="verse">「天公为下曼陀雨」</span></p>
