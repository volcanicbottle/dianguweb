<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>「张丞相苍者，阳武人也。好书律历。秦时为御史，主柱下方书。」唐·司马贞《史记索隐》：「周秦皆有柱下史，谓御史也。所掌及侍立恒在殿柱之下，故老子为周柱下史。」…</blockquote>
<h2>别名</h2><p>周柱史、柱下史、张苍</p>
