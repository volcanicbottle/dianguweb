<h1>刘聪劫天子</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>「六月癸未，刘曜、王弥、石勒同寇洛川，王师频为贼所败，死者甚众。庚寅，司空荀藩、光禄大夫荀组奔轘辕，太子左率温畿夜开广莫门奔小平津。丁酉，刘曜、王弥入京师。帝开华林园门，出河阴藕池，欲幸长安，为曜等所追及。曜等遂焚烧宫庙，逼辱妃后，吴王晏、竟陵王楙、尚书左仆射和郁、右仆射曹馥、尚书闾丘冲、袁粲、王绲、河南尹刘默等皆遇害，百官士庶死者三万馀人。帝蒙尘于平阳，刘聪以帝为会稽公。」…</blockquote>
<h2>别名</h2><p>刘聪</p>
<h2>用它的诗</h2>
<p>赠张相镐二首 二 · 李白 <span class="verse">「刘聪劫天子」</span></p>
