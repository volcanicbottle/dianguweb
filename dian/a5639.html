<h1>路傍人怪问</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全宋诗》</p><blockquote>南阳老幼如云屯，连日城东候使君。后者排前旁捷出，争先见面作慇勤。六年重来已白发，一日再见回青春。道傍过者怪相问，共言杜母真吾亲。使君虽老心尚壮，文采风流诸谢上。名家从昔杜陵人，盛德于今丈人行。我昔卧病老彭城，画船鸣鼓千里行。致书馈奠初未识，丁宁劳苦如平生。人言此事今未有，古人中求还得否。忘年屈势不虚辱，公自为德吾何取。菊潭之水甘且洁，潭上秋花照山白。请公酌此寿百年，奕奕长为此邦伯。孰先一州后四方，重金叠盖登庙堂。请从今日至云来，月三十斛…</blockquote>
