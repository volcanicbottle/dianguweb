<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>羲之既拜护军，又苦求宣城郡，不许，乃以为右军将军、会稽内史。……孙绰、李充、许询、支遁等皆以文义冠世，并筑室东土，与羲之同好。尝与同志宴集于会稽山阴之兰亭，羲之自为之序以申其志。…</blockquote>
<h2>别名</h2><p>王内史、右军、羲之、王羲之</p>
