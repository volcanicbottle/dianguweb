<h2>出处</h2><p>《全唐诗》</p><blockquote>南行逾六旬，始下昌乐泷【案：韶州乐昌有昌山。有乐石泷。在县上十里。】。险恶不可状，船石相舂撞。往问泷头吏，潮州尚几里。行当何时到，土风复何似。泷吏垂手笑，官何问之愚。譬官居京邑【譬如官居北】，何由知东吴。东吴游宦乡，官知自有由。潮州底处所，有罪乃窜流。侬幸无负犯，何由到而知。官今行自到，那遽妄问为。不虞卒见困，汗出愧且骇。吏曰聊戏官，侬尝使往罢。岭南大抵同，官去道苦辽。下此三千里，有州始名潮。恶溪瘴毒聚，雷电常汹汹。鳄鱼大于船，牙眼怖杀…</blockquote>
