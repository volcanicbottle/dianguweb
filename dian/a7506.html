<h2>出处</h2><p>《全唐诗》</p><blockquote>隋堤柳，岁久年深尽衰朽。风飘飘兮雨萧萧，三株两株汴河口。老枝病叶愁杀人，曾经大业年中春。大业年中炀天子，种柳成行夹流水。西自黄河东至淮【西自黄河东接淮】，绿阴一千三百里。大业末年春暮月，柳色如烟絮如雪。南幸江都恣佚游，应将此柳系龙舟。紫髯郎将护锦缆，青娥御史直迷楼。海内财力此时竭，舟中歌笑何日休。上荒下困势不久，宗社之危如缀旒【宗社之危如缀旒。炀天子。自言欢乐殊未极。岂知明年正朔归武德】。炀天子，自言福祚长无穷。岂知皇子封酅公，龙舟未过…</blockquote>
