<h1>安用毛锥</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《旧五代史》</p><blockquote>周太祖有镇邺之命，弘肇欲其兼领机枢之任，苏逢吉异其议，弘肇忿之。翌日，因窦贞固饮会，贵臣悉集，弘肇厉色举爵属周太祖曰：「昨晨廷论，一何同异！今日与弟饮此。」杨邠、苏逢吉亦举大爵曰：「此国家之事也，何足介意！」俱饮釂。弘肇又厉声言曰：「安朝廷，定祸乱，直须长枪大剑，至如毛锥子，焉足用哉！」三司使王章曰：「虽有长枪大剑，若无毛锥子，赡军财赋，自何而集？」弘肇默然，少顷而罢。…</blockquote>
