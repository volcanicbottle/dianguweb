<h1>风流云散</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>王粲《赠蔡子笃诗》「风流云散，一别如雨」，喻亲友离散难再聚；词中以之写聚散无常、分赠罗带香囊作别。</p>
<h2>出处</h2><p>王粲《赠蔡子笃诗》</p><blockquote>罗绶分香：这句写离别，是说把香罗带送给爱人，作为纪念。和秦观《满庭芳》词“罗带轻分”的意思差不多。罗绶，罗带。…</blockquote>
<h2>别名</h2><p>罗绶分香</p>
<h2>用它的诗</h2>
<p>水龙吟 · 辛弃疾 <span class="verse">「风流云散罗绶分香」</span></p>
