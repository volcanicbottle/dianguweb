<h1>梗犹泛</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>薄宦，官卑职微。梗犹泛，用《战国策·齐策三》，土偶对桃梗语：“今子东国之桃梗也，刻削子以为人，降雨下，淄水至，流子而去，则子漂漂者将何如耳。”又隋卢思道《听鸣蝉篇》有“讵念嫖姚（漂摇）嗟木梗”句。这里是自伤沦落意。</p>
<h2>出处</h2><p>《战国策·齐策三》</p><blockquote>薄宦，官卑职微。梗犹泛，用《战国策·齐策三》，土偶对桃梗语：“今子东国之桃梗也，刻削子以为人，降雨下，淄水至，流子而去，则子漂漂者将何如耳。”又隋卢思道《听鸣蝉篇》有“讵念嫖姚（漂摇）嗟木梗”句。这里是自伤沦落意。…</blockquote>
<h2>别名</h2><p>薄宦</p>
