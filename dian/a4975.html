<h1>孔明有知音</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《三国志》</p><blockquote>亮躬耕陇亩，好为〈梁父吟〉。身长八尺，每自比于管仲、乐毅，时人莫之许也。惟博陵崔州平、颍川徐庶元直与亮友善，谓为信然。时先主屯新野。徐庶见先主，先主器之，谓先主曰：「诸葛孔明者，卧龙也，将军岂愿见之乎？」先主曰：「君与俱来。」庶曰：「此人可就见，不可屈致也。将军宜枉驾顾之。」由是先主遂诣亮，凡三往，乃见。因屏人曰：「汉室倾颓，奸臣窃命，主上蒙尘。孤不度德量力，欲信大义于天下，而智术浅短，遂用猖蹶，至于今日。然志犹未已，君谓计将安出？」亮…</blockquote>
<h2>别名</h2><p>孔明</p>
