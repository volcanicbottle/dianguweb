<h1>浮云</h1>
<p class="meta">典故 · 3 首诗使用</p>
<h2>释义</h2><p>浮云两句，用《古诗》“浮云蔽白日，游子不顾返”诗意。意谓只见云浮天空，却不见游子到来。游子，指李白。久不至，李杜于天宝四载（七四五）在兗州城东分手后，从此即未曾聚首。</p>
<h2>出处</h2><p>《古诗》</p><blockquote>浮云蔽白日，游子不顾返…</blockquote>

<h2>用它的诗</h2>
<p>梦李白二首（其2） · 杜甫 <span class="verse">「游子久不至」</span></p>
<p>淮上喜会梁州故人 · 韦应物 <span class="verse">「浮云一别后」</span></p>
<p>丹青引赠曹将军霸 · 杜甫 <span class="verse">「富贵于我如浮云」</span></p>
