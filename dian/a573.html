<h1>埋玉树</h1>
<p class="meta">典故 · 3 首诗使用</p>
<h2>释义</h2><p>埋玉：用以悼亡。宋陆游《与高安刘丞游大愚观壁间两苏先生诗》：“泉扃一埋玉，世事几炊黍。”</p>
<h2>出处</h2><p>《世说新语》</p><blockquote>庾文康亡，何扬州临葬云：「埋玉树箸土中，使人情何能已已！」…</blockquote>
<h2>别名</h2><p>玉树埋、玉树凋、随玉树、玉树埋尘、埋玉、土花封玉树、白璧埋黄土、泉下琪树、玉人埋处、玉有谁埋、庾亮</p>
<h2>用它的诗</h2>
<p>兰陵王 · 刘辰翁 <span class="verse">「玉树凋」</span></p>
<p>西州李尚书知愚与元武昌有旧远示二篇吟之泫然因以继和二首 二 · 刘禹锡 <span class="verse">「祗应随玉树」</span></p>
<p>宣城哭蒋征君华 · 李白 <span class="verse">「敬亭埋玉树」</span></p>
