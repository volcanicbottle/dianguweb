<h1>赵飞燕</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>飞燕：喻指宫妇或歌女。唐李白《宫中行乐词八首》之二：“宫中谁第一，飞燕在昭阳。”</p>
<h2>出处</h2><p>《汉书》</p><blockquote>孝成赵皇后，本长安宫人。初生时，父母不举，三日不死，乃收养之。及壮，属阳阿主家，学歌舞，号曰飞燕。成帝尝微行出，过阳阿主，作乐。上见飞燕而说之，召入宫，大幸。有女弟复召入，俱为倢?，贵倾后宫。…</blockquote>
<h2>别名</h2><p>飞燕</p>
<h2>用它的诗</h2>
<p>相和歌辞 怨歌行 · 李白 <span class="verse">「宁知赵飞燕」</span></p>
