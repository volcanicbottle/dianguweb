<h1>被花恼</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>〈江畔独步寻花七绝句七首〉其一：「江上被花恼不彻，无处告诉只颠狂。走觅南邻爱酒伴，经旬出饮独空床【案：原注。斛斯融。吾酒徒。】。」…</blockquote>
<h2>别名</h2><p>花相恼、花恼欲颠狂、恼损杜陵翁、花恼只顾狂、杜甫</p>
<h2>用它的诗</h2>
<p>鹧鸪天 · 辛弃疾 <span class="verse">「也宜恼损杜陵翁」</span></p>
<p>念奴娇 · 辛弃疾 <span class="verse">「料君长被花恼」</span></p>
<p>婆罗门引 · 辛弃疾 <span class="verse">「被花恼、只莺知」</span></p>
