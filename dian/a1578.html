<h1>陈后主</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《南史》</p><blockquote>后主讳叔宝，字元秀，小字黄奴，宣帝嫡长子也。……后主愈骄，不虞外难，荒于酒色，不恤政事，左右嬖佞珥貂者五十人，妇人美貌丽服巧态以从者千馀人。常使张贵妃、孔贵人等八人夹坐，江总、孔范等十人预宴，号曰「狎客」。先令八妇人襞采笺，制五言诗，十客一时继和，迟则罚酒。君臣酣饮，从夕达旦，以此为常。而盛修宫室，无时休止。税江税市，徵取百端。刑罚酷滥，牢狱常满。……隋文帝谓仆射高颎曰：「我为百姓父母，岂可限一衣带水不拯之乎？」命大作战船。……诸军既下…</blockquote>
<h2>别名</h2><p>陈叔宝（陈后主）</p>
<h2>用它的诗</h2>
<p>隋宫 · 李商隐 <span class="verse">「陈后主」</span></p>
