<h1>田横客</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>「（横）遂自刭，令客奉其头，从使者驰奏之高帝。高帝曰：『嗟乎，有以也夫！起自布衣，兄弟三人更王，岂不贤乎哉！』为之流涕，而拜其二客为都尉，发卒二千人，以王者礼葬田横。」唐·张守节《史记正义》引晋·崔豹《古今注》：「薤露、蒿里，送哀歌也，出田横门人。横自杀，门人伤之而作悲歌，言人命如薤上露，易晞灭。至李延年乃分为二曲，薤露送王公贵人，蒿里送士大夫庶人，使挽逝者歌之，俗呼为挽歌。」…</blockquote>
<h2>别名</h2><p>哭田横、田横歌、田横感歌、田横客悲、刘邦（汉高祖）、田横</p>
