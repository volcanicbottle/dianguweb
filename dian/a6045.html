<h1>南山豆苗</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>恽既失爵位，家居治产业，起室宅，以财自娱。岁馀，其友人安定太守西河孙会宗，知略士也，与恽书谏戒之，为言大臣废退，当阖门惶惧，为可怜之意，不当治产业，通宾客，有称誉。恽宰相子，少显朝廷，一朝以晻昧语言见废，内怀不服，报会宗书曰：「夫人情所不能止者，圣人弗禁，故君父至尊亲，送其终也，有时而既。臣之得罪，已三年矣。田家作苦，岁时伏腊，亨羊炰羔，斗酒自劳。家本秦也，能为秦声。妇，赵女也，雅善鼓瑟。奴婢歌者数人，酒后耳热，仰天拊缶而呼乌乌。其诗曰…</blockquote>
