<h1>赵壹赋命薄</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>赵壹字元叔，汉阳西县人也。体貌魁梧，身长九尺，美须豪眉，望之甚伟。而恃才倨傲，为乡党所摈，乃作解摈。后屡抵罪，几至死，友人救得免。……又作刺世疾邪赋，以舒其怨愤。曰：「……埶家多所宜，欬唾自成珠。被褐怀金玉，兰蕙化为刍。贤者虽独悟，所困在群愚。且各守尔分，勿复空驰驱。哀哉复哀哉，此是命矣夫！」……初袁逢使善相者相壹，云「仕不过郡吏」，竟如其言。…</blockquote>
<h2>别名</h2><p>赵壹能赋、赵壹</p>
