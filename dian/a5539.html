<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《楚辞补注》</p><blockquote>日安不到，烛龙何照？羲和之未扬，若华何光？何所冬暖？何所夏寒？焉有石林？何兽能言？焉有虬龙，负熊以游？雄虺九首，倏忽焉在？何所不死？长人何守？靡蓱九衢，枲华安居？一蛇吞象，厥大何如？黑水玄趾，三危安在？延年不死，寿何所止？鲮鱼何所？鬿堆焉处？汉·王逸注：「言天之西北，有幽冥无日之国，有龙衔烛而照之也。」…</blockquote>
