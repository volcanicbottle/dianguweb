<h1>自是君家门户事</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>盛笃学不倦，自少至老，手不释卷。著魏氏春秋、晋阳秋，并造诗赋论难复数十篇。晋阳秋词直而理正，咸称良史焉。既而桓温见之，怒谓盛子曰：「枋头诚为失利，何至乃如尊君所说！若此史遂行，自是关君门户事。」其子遽拜谢，谓请删改之。时盛年老还家，性方严有轨宪，虽子孙班白，而庭训愈峻。至此，诸子乃共号泣稽颡，请为百口切计。盛大怒。诸子遂尔改之。盛写两定本，寄于慕容俊。太元中，孝武帝博求异闻，始于辽东得之，以相考校，多有不同，书遂两存。子潜、放。…</blockquote>
<h2>别名</h2><p>孙盛</p>
<h2>用它的诗</h2>
<p>渔家傲 · 辛弃疾 <span class="verse">「自是君家门户事」</span></p>
