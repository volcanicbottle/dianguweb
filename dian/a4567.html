<h2>出处</h2><p>《新五代史》</p><blockquote>袭吉博学，多知唐故事。迁节度副使，官至谏议大夫。晋王与梁有隙，交兵累年，后晋王数困，欲与梁通和，使袭吉为书谕梁，辞甚辨丽。梁太祖使人读之，至于「毒手尊拳，交相于暮夜，金戈铁马，蹂践于明时」，叹曰：「李公僻处一隅，有士如此，使吾得之，傅虎以翼也！」顾其从事敬翔曰：「善为我答之。」及翔所答，书辞不工，而袭吉之书，多传于世。…</blockquote>
