<h1>京兆画</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>又为妇画眉，长安中传张京兆眉怃。有司以奏敞。上问之，对曰：「臣闻闺房之内，夫妇之私，有过于画眉者。」上爱其能，弗备责也。然终不得大位。…</blockquote>
<h2>别名</h2><p>画眉、京兆双眉、张敞梳洗、张尹眉、张敞</p>
<h2>用它的诗</h2>
