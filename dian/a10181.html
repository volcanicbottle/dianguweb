<h1>博塞</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>博塞：喻指不务本业。唐温庭筠《开成五年秋书怀一百韵》：“亡羊犹博簺，牧马倦呼卢。”</p>
<h2>出处</h2><p>《庄子·骄拇》</p><blockquote>臧与毂二人相与牧羊，而俱亡其羊。问臧奚事，则挟箧读书；问毂奚事，则博塞（一种赌博方法）以游。二人者事业不同，其于亡羊均也。注：塞，也作簺。…</blockquote>
<h2>别名</h2><p>博簺、臧谷亡羊、谷亦亡羊</p>
<h2>用它的诗</h2>
<p>哨遍 · 辛弃疾 <span class="verse">「谷亦亡羊」</span></p>
