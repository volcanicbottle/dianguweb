<h1>澧阳兰芷</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《楚辞补注》</p><blockquote>兰芷变而不芳兮，荃蕙化而为茅。何昔日之芳草兮，今直为此萧艾也。岂其有他故兮，莫好脩之害也。余以兰为可恃兮，羌无实而容长。委厥美以从俗兮，苟得列乎众芳。椒专佞以慢慆兮，榝又欲充夫佩帏。既干进而务入兮，又何芳之能祗。固时俗之流从兮，又孰能无变化。览椒兰其若玆兮，又况揭车与江离。惟玆佩之可贵兮，委厥美而历玆。芳菲菲而难亏兮，芬至今犹未沬。和调度以自娱兮，聊浮游而求女。及余饰之方壮兮，周流观乎上下。…</blockquote>
