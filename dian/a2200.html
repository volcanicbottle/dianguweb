<h1>当垆秦女</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《先秦汉魏晋南北朝诗·汉诗》</p><blockquote>昔有霍家姝，姓冯名子都。依倚将军势，调笑酒家胡。胡姬年十五，春日独当垆。长裾连理带，广袖合欢襦。头上蓝田玉，耳后大秦珠。两鬟何窈窕，一世良所无。一鬟五百万，两鬟千万馀。不意金吾子，娉婷过我庐。银鞍何煜爚，翠盖空踟。就我求清酒，丝绳提玉壶。就我求珍肴，金盘鲙鲤鱼。贻我青铜镜，结我红罗裾。不惜红罗裂，何论轻贱躯。男儿爱后妇，女子重前夫。人生有新故，贵贱不相踰。多谢金吾子，私爱徒区区。…</blockquote>
