<h1>木叶(九歌/九辩)</h1>
<p class="meta">典故 · 4 首诗使用</p>
<h2>释义</h2><p>化用屈原《九歌·湘夫人》&#x27;袅袅兮秋风，洞庭波兮木叶下&#x27;及宋玉《九辩》悲秋意象</p>
<h2>出处</h2><p>《楚辞·湘夫人》</p><blockquote>洞庭波起：《楚辞·湘夫人》，“袅袅兮秋风，洞庭波兮木叶下。”洞庭，指洞庭湖。…</blockquote>
<h2>别名</h2><p>洞庭波起、化用屈原《九歌》</p>
