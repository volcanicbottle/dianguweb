<h1>环佩归</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>〈咏怀古迹五首〉其三：「群山万壑赴荆门，生长明妃尚有村。一去紫台连朔漠，独留青冢向黄昏。画图省识春风面，环佩空归月夜魂。千载琵琶作胡语，分明怨恨曲中论【分明愁恨曲中论】。」…</blockquote>
<h2>别名</h2><p>画图还识春娇、披图一见春风面、月夜香魂、分明幽恨曲中传、画图春风面、青冢</p>
<h2>用它的诗</h2>
