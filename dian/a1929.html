<h2>出处</h2><p>《宋人轶事汇编》</p><blockquote>至和嘉祐间，场屋举子为文奇涩，读或不能成句。欧公力欲革其弊，既知贡举，凡文涉雕刻者，皆黜之。时范景仁、王禹玉、梅公仪等同事，而梅圣俞为参详官。未引试前，唱酬诗极多，文忠诗：「无哗战士衔枚勇，下笔春蚕食叶声。」最为警策。圣俞有「万蚁战时春日煖，五星明处夜堂深」，亦为诸公所称。及放榜，平日有声如刘煇辈皆不与选，士论颇汹汹，以为主司耽酬唱，不暇详考校，且以五星自比，而以我曹为蚕蚁，因造为丑语。自是礼闱不复敢作诗，终元丰末几三十年。元祐初，虽稍…</blockquote>
