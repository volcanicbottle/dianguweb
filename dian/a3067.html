<h1>五月披裘</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>负薪裘：咏隐士。唐王昌龄《放歌行》：“幸蒙国士识，因脱负薪裘。”</p>
<h2>出处</h2><p>晋·皇甫谧《高士传》上卷</p><blockquote>披裘公者，吴人也。延陵季子出游，见道中遗金，顾而睹之，与公曰：「取彼金。」公投鏕瞋目拂手而言曰：「何子居之高而视之卑？吾披裘而负薪，岂取遗金者哉？」季子大惊，既谢而问其姓名，曰：「何足语姓名？」…</blockquote>
<h2>别名</h2><p>负薪、负薪裘、披裘、负裘、披裘公</p>
<h2>用它的诗</h2>
<p>杭州送裴大泽赴庐州长史 · 李白 <span class="verse">「五月披裘者」</span></p>
<p>相和歌辞 放歌行 · 王昌龄 <span class="verse">「因脱负薪裘」</span></p>
