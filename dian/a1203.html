<h1>匈奴未灭</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>去病无家：指公而忘私。明陈子龙《奉酬越大夫卓凡见赠之作》：“去病无家原为国，信陵有客尽知兵。”</p>
<h2>出处</h2><p>《史记》</p><blockquote>骠骑将军为人少言不泄，有气敢任。天子尝欲教之孙吴兵法，对曰：「顾方略何如耳，不至学古兵法。」天子为治第，令骠骑视之，对曰：「匈奴未灭，无以家为也。」由此上益重爱之。…</blockquote>
<h2>别名</h2><p>不为家、辞第、莫言家、不言家、霍勋、家何为、不言加、辞甲第、去病无家、恩未极，家何恤、去病忘家、霍去病</p>
<h2>用它的诗</h2>
<p>燕支行 · 王维 <span class="verse">「誓辞甲第金门里」</span></p>
