<h2>出处</h2><p>《楚辞补注》</p><blockquote>昔余梦登天兮，魂中道而无杭。吾使厉神占之兮，曰有志极而无旁。终危独以离异兮，曰君可思而不可恃。故众口其铄金兮，初若是而逢殆。惩于羹者而吹●兮，何不变此志也？欲释阶而登天兮，犹有曩之态也。众骇遽以离心兮，又何以为此伴也？同极而异路兮，又何以为此援也？晋申生之孝子兮，父信谗而不好。行婞直而不豫兮，功用而不就。…</blockquote>
