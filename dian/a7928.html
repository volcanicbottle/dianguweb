<h2>出处</h2><p>《苏轼诗集》</p><blockquote>诗横槎晚渡碧涧口，骑马夜入南山谷。谷中暗水响泷泷，岭上疏星明煜煜。寺藏岩底千万仞，路转山腰三百曲。风生饥虎啸空林，月黑惊麇窜修竹。入门突兀见深殿，照佛青荧有残烛。愧无酒食待游人，旋斫杉松煮溪蔌。板阁独眠惊旅枕，木鱼晓动随僧粥。起观万瓦郁参差，目乱千岩散红绿。门前商贾负椒荈，山后咫只连巴蜀。何时归耕江上田，一夜心逐南飞鹄？…</blockquote>
