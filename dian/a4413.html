<h2>出处</h2><p>《全唐诗》</p><blockquote>〈戏为六绝句六首〉其二：「杨王卢骆当时体【王杨卢骆当时体】，轻薄为文哂未休。尔曹身与名俱灭，不废江河万古流。【案：钱谦益曰。当甫之世。群儿之谤伤者或不少矣。故借庾信、四子以发其意。嗤点流传。轻薄为文。皆指并时之人也。卢、王之文。劣于汉、魏。而能江河万古者。以其近于风骚也。况其上薄风骚。而又不劣于汉、魏者乎。凡今谁是出群雄。甫所以自命也。兰苕翡翠。指当时研揣声病。寻摘章句之徒。鲸鱼碧海。则元稹所谓浑涵汪洋。千汇万状。兼古人而有之者。非甫谁…</blockquote>
