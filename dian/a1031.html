<h1>鬓成潘</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>晋十有四年，余春秋三十有二，始见二毛。以太尉掾兼虎贲中郎将，寓直于散骑之省。高阁连云，阳景罕曜，珥蝉冕而袭纨绮之士，此焉游处。仆野人也，偃息不过茅屋茂林之下，谈话不过农夫田父之客，摄官承乏，猥厕朝列，夙兴晏寝，匪遑底宁。譬犹池鱼笼鸟，有江湖山薮之思，于是染翰操纸，慨然而赋。于时秋也，故以秋兴命篇。……斑鬓髟以承弁兮，素发飒以垂领。………</blockquote>
