<h1>历阳湖波</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《淮南子》</p><blockquote>「夫历阳之都，一夕反而为湖，勇力圣知与罢怯不肖者同命。」东汉·高诱注：「历阳，淮南国之县名，今属九江郡。历阳中有老妪，常行仁义，有两诸生告过之，谓曰：『此国当没为湖，妪视东城门阃有血，便走上山，勿顾也。』自此，妪数往视门，门吏问之，妪对如其言。东门吏杀鸡，以血涂门。明日，妪早往，视门有血，便走上山，国没为湖。与门吏言其事，适一宿耳。」…</blockquote>
<h2>别名</h2><p>历阳前事</p>
<h2>用它的诗</h2>
<p>公无出门 · 李贺 <span class="verse">「历阳湖波大如山」</span></p>
