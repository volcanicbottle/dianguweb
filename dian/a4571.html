<h1>金闺籍</h1>
<p class="meta">典故 · 5 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>「惟昔逢休明，十载朝云陛。既通金闺籍，复酌琼筵醴。」唐·李善注：「金闺，即金门也。《解嘲》曰：『历金门，上玉堂。』应劭《汉书注》曰：『籍者，为二尺竹牒，记其年纪、名字、物色，悬之宫门，案省相应，乃得入也。』」…</blockquote>
<h2>别名</h2><p>金马门</p>
<h2>用它的诗</h2>
<p>送李校书二十六韵 · 杜甫 <span class="verse">「谬通金闺籍」</span></p>
<p>两当县吴十侍御江上宅 · 杜甫 <span class="verse">「共通金闺籍」</span></p>
<p>为郎分司寄上都同舍 · 刘禹锡 <span class="verse">「籍通金马门」</span></p>
<p>朗州窦员外见示与澧州元郎中郡斋赠答长句二篇因以继和 · 刘禹锡 <span class="verse">「应怜一罢金闺籍」</span></p>
<p>效古二首 一 · 李白 <span class="verse">「谬题金闺籍」</span></p>
