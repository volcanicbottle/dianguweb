<h1>系名王</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>是时，匈奴彊，侵边。天下初定，制度疏阔。诸侯王僭儗，地过古制，淮南、济北王皆为逆诛。谊数上疏陈政事，多所欲匡建，其大略曰：「……今匈奴嫚姆侵掠，至不敬也，为天下患，至亡已也，而汉岁致金絮采缯以奉之。……陛下何不试以臣为属国之官以主匈奴？行臣之计，请必系单于之颈而制其命，伏中行说而笞其背。」…</blockquote>
<h2>别名</h2><p>系虏、系颈、贾谊</p>
<h2>用它的诗</h2>
<p>相和歌辞 从军行 · 王维 <span class="verse">「尽系名王颈」</span></p>
