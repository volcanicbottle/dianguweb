<h1>臣之壮也不如人</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>叹臣之壮也不如人：《左传》（僖公三十年）载烛之武对郑文公说，“臣之壮也，犹不如人；今老矣，无能为也已。”这里所谓“不如人”是故作谦辞，烛之武真正的意思是怪郑文公没有及时用自己来担当国政。</p>
<h2>出处</h2><p>《左传》</p><blockquote>叹臣之壮也不如人：《左传》（僖公三十年）载烛之武对郑文公说，“臣之壮也，犹不如人；今老矣，无能为也已。”这里所谓“不如人”是故作谦辞，烛之武真正的意思是怪郑文公没有及时用自己来担当国政。…</blockquote>
<h2>别名</h2><p>叹臣之壮也不如人</p>
<h2>用它的诗</h2>
<p>满江红 · 刘克庄 <span class="verse">「叹臣之壮也不如人」</span></p>
