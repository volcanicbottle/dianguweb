<h1>济巨川</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>济巨川：喻指宰相。唐沈＃期《哭苏眉州崔司业二公》：“崔昔挥宸翰，苏尝济巨川。”</p>
<h2>出处</h2><p>《尚书·商书·说命上》</p><blockquote>高宗梦得说，使百工营求诸野，得诸傅岩，作说命三篇。……命之曰：「朝夕纳诲，以辅台德。若金，用汝作砺。若济巨川，用汝作舟楫。若岁大旱，用汝作霖雨。」…</blockquote>
<h2>别名</h2><p>巨川舟、傅舟、傅说舟、川上楫、舟楫、济川、巨川才、傅说、殷高宗</p>
<h2>用它的诗</h2>
<p>哭祖六自虚 · 王维 <span class="verse">「终期济巨川」</span></p>
<p>洞庭湖寄阎九 · 孟浩然 <span class="verse">「相将济巨川」</span></p>
