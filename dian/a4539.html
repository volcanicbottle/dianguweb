<h1>芍药相</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>似共东风别有因【似共东君别有因】，绛罗高卷不胜春。若教解语应倾国，任是无情亦动人【任是无情也动人】。芍药与君为近侍，芙蓉何处避芳尘。可怜韩令功成后，辜负秾华过此身。…</blockquote>
<h2>别名</h2><p>任是无情也动人、芍药须为近侍、与花为近侍</p>
<h2>用它的诗</h2>
<p>南乡子 · 秦观 <span class="verse">「任是无情也动人」</span></p>
