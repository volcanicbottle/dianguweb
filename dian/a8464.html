<h1>相如云梦</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>仆对曰：「唯唯。臣闻楚有七泽，尝见其一，未睹其馀也。臣之所见，盖特其小小者耳，名曰云梦。云梦者，方九百里，其中有山焉。其山则盘纡岪郁，隆崇嵂崒；岑岩参差，日月蔽亏；交错纠纷，上干青云；罢池陂?，下属江河。其土则丹青赭垩，雌黄白附，锡碧金银，?色炫耀，照烂龙鳞。其石则赤玉玫瑰，琳珉琨珸，瑊玏玄厉，碝石武夫。其东则有蕙圃衡兰，芷若射干，穹穷昌蒲，江离麋芜，诸蔗猼且。其南则有平原广泽，登降?靡，案衍坛曼，缘以大江，限以巫山。其高燥则䔮苞荔，薛…</blockquote>
