<h1>曳长裾</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>曳裾：指阿附权贵。唐李白《行路难》：“弹剑作歌奏苦声，曳裾王门不称情。”</p>
<h2>出处</h2><p>《汉书》</p><blockquote>臣闻交龙襄首奋翼，则浮云出流，雾雨咸集。圣王底节修德，则游谈之士归义思名。今臣尽智毕议，易精极虑，则无国不可奸；饰固陋之心，则何王之门不可曳长裾乎？然臣所以历数王之朝，背淮千里而自致者，非恶臣国而乐吴民也，窃高下风之行，尤说大王之义。故愿大王之无忽，察听其志。…</blockquote>
<h2>别名</h2><p>长裾曳、曳裾王门、曳裾、王门曳裾、邹阳</p>
<h2>用它的诗</h2>
<p>杂曲歌辞 行路难三首 二 · 李白 <span class="verse">「曳裾王门不称情」</span></p>
