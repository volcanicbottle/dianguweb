<h1>手画三军势</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>初，安世长子千秋与霍光子禹俱为中郎将，将兵随度辽将军范明友击乌桓。还，谒大将军光，问千秋战斗方略，山川形势，千秋口对兵事，画地成图，无所忘失。光复问禹，禹不能记，曰：「皆有文书。」光由是贤千秋，以禹为不材，叹曰：「霍氏世衰，张氏兴矣！」及禹诛灭，而安世子孙相继，自宣、元以来为侍中、中常侍、诸曹散骑、列校尉者凡十馀人。功臣之世，唯有金氏、张氏，亲近宠贵，比于外戚。…</blockquote>
<h2>别名</h2><p>张千秋、霍光</p>
<h2>用它的诗</h2>
<p>送樊二十三侍御赴汉中判官 · 杜甫 <span class="verse">「手画三军势」</span></p>
