<h2>出处</h2><p>《全唐诗》</p><blockquote>独卧蒿阳客【独卧蒿云客】，三违颍水春。艰难随老母，惨澹向时人。谢氏寻山屐，陶公漉酒巾。群凶弥宇宙，此物在风尘。历下辞姜被，关西得孟邻。早通交契密，晚接道流新。静者心多妙【静者心多好】，先生艺绝伦。草书何太苦【草书应甚苦】，诗兴不无神。曹植休前辈，张芝更后身。数篇吟可老，一字买堪贫。将恐曾防寇，深潜托所亲【深情托所亲】。宁闻倚门夕，尽力洁飧晨。疏懒为名误，驱驰丧我真。索居犹寂寞【索居尤寂寞】，相遇益悲辛【相遇益酸辛】【相遇益愁辛】。流转依…</blockquote>
