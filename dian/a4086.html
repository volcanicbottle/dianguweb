<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《穆天子传》</p><blockquote>日中大寒，北风雨雪，有冻人，天子作诗三章以哀民曰：「我徂黄竹，●员閟寒，帝收九行。嗟我公侯，百辟冢卿，皇我万民，旦夕勿忘。我徂黄竹，●员閟寒，帝收九行。嗟我公侯，百辟冢卿，皇我万民，旦夕勿穷。有皎者●，翩翩其飞，嗟我公侯，●勿则●。居乐甚寡，不如●土，礼乐其民。」…</blockquote>
<h2>别名</h2><p>黄竹篇、黄竹、周穆念物、周穆王</p>
<h2>用它的诗</h2>
<p>金门荅苏秀才 · 李白 <span class="verse">「恭闻黄竹篇」</span></p>
