<h1>罢亥市</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>帝将有灭吴之志，以祜为都督荆州诸军事、假节，散骑常侍、卫将军如故。祜率营兵出镇南夏，开设庠序，绥怀远近，甚得江汉之心。……疾渐笃，乃举杜预自代。寻卒，时年五十八。帝素服哭之，甚哀。是日大寒，帝涕泪沾须鬓，皆为冰焉。南州人征市日闻祜丧，莫不号恸，罢市，巷哭者声相接。吴守边将士亦为之泣。其仁德所感如此。…</blockquote>
<h2>别名</h2><p>罢市、羊祜（字叔子）</p>
<h2>用它的诗</h2>
<p>河南观察使故相国袁公挽歌三首 二 · 刘禹锡 <span class="verse">「湘南罢亥市」</span></p>
