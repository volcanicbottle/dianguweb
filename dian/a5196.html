<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>「李延年，中山人，身及父母兄弟皆故倡也。延年坐法腐刑，给事狗监中。女弟得幸于上，号李夫人，列外戚传。延年善歌，为新变声。是时上方兴天地诸祠，欲造乐，令司马相如等作诗颂。延年辄承意弦歌所造诗，为之新声曲。而李夫人产昌邑王，延年繇是贵为协律都尉，佩二千石印绶，而与上卧起。」…</blockquote>
<h2>别名</h2><p>延年、刘彻（汉武帝）、李夫人</p>
