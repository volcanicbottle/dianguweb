<h1>平阳骑</h1>
<p class="meta">典故 · 4 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>「青壮，为侯家骑，从平阳主。」「青既尊贵，而平阳侯曹寿有恶疾就国，长公主问：『列侯谁贤者？』左右皆言大将军。主笑曰：『此出吾家，常骑从我，柰何？』左右曰：『于今尊贵无比。』于是长公主风白皇后，皇后言之，上乃诏青尚平阳主。」三国魏·如淳注：「本阳信长公主也，为平阳侯所尚，故称平阳主。」…</blockquote>
<h2>别名</h2><p>平阳公主、卫青</p>
