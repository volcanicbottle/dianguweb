<h1>受降城</h1>
<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>是岁，汉使贰师将军广利西伐大宛，而令因杅将军敖筑受降城。其冬，匈奴大雨雪，畜多饥寒死。儿单于年少，好杀伐，国人多不安。左大都尉欲杀单于，使人閒告汉曰：「我欲杀单于降汉，汉远，即兵来迎我，我即发。」初，汉闻此言，故筑受降城，犹以为远。…</blockquote>
<h2>别名</h2><p>绥降筑城、刘彻（汉武帝）</p>
<h2>用它的诗</h2>
<p>夜上受降城闻笛 · 李益 <span class="verse">「受降城」</span></p>
