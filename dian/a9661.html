<h1>昭陵</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《旧唐书》</p><blockquote>五月戊午，太子詹事、英国公李绩为叠州都督。辛酉，开府仪同三司、卫国公李靖薨。己巳，上崩于含风殿，年五十二。遗诏皇太子即位于柩前，丧纪宜用汉制。秘不发丧。庚午，遣旧将统飞骑劲兵从皇太子先还京，发六府甲士四千人，分列于道及安化门，翼从乃入；大行御马舆，从官侍御如常。壬申，发丧。六月甲戌朔，殡于太极殿。八月丙子，百僚上谥曰文皇帝，庙号太宗。庚寅，葬昭陵。…</blockquote>
