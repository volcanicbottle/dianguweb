<h1>疾雷破柱</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>夏侯太初尝倚柱作书。时大雨，霹雳破所倚柱，衣服焦然，神色无变，书亦如故。宾客左右，皆跌荡不得住。南朝梁·刘孝标注引《语林》曰：「太初从魏帝拜陵，陪列于松柏下。时暴雨霹雳，正中所立之树。冠冕焦坏，左右睹之皆伏，太初颜色不改。」…</blockquote>
<h2>别名</h2><p>雷破柱、惊雷破柱、庭柱裂、震楹书、破柱、夏玄、诸葛诞</p>
