<h1>黄公垆</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>黄公肆：指酒店，或用于悼亡。唐白居易《晚春沽酒》：“醉卧黄公肆，人知我是谁。”</p>
<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>王浚冲为尚书令，著公服，乘轺车，经黄公酒垆下过，顾谓后车客：「吾昔与嵇叔夜、阮嗣宗共酣饮于此垆，竹林之游，亦预其末。自嵇生夭、阮公亡以来，便为时所羁绁。今日视此虽近，邈若山河。」…</blockquote>
<h2>别名</h2><p>卖酒垆、黄公酒垆、黄翁、黄公、黄公肆、黄垆、酒垆陈迹问、酒垆论交、酒垆文友、酒垆姓黄、王戎</p>
<h2>用它的诗</h2>
<p>赠高式颜 · 杜甫 <span class="verse">「空知卖酒垆」</span></p>
