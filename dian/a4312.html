<h2>出处</h2><p>《南史》</p><blockquote>景宗振旅凯入，帝于华光殿宴饮连句，令左仆射沈约赋韵。景宗不得韵，意色不平，启求赋诗。帝曰：「卿伎能甚多，人才英拔，何必止在一诗。」景宗已醉，求作不已，诏令约赋韵。时韵已尽，唯馀竞病二字。景宗便操笔，斯须而成，其辞曰：「去时儿女悲，归来笳鼓竞。借问行路人，何如霍去病。」帝叹不已。约及朝贤惊嗟竟日，诏令上左史。于是进爵为公，拜侍中、领军将军。…</blockquote>
