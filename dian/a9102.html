<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《拾遗记》</p><blockquote>及晋武践位，忽见（姚）馥立于阶下，帝奇其倜傥，擢为朝歌邑宰。馥辞曰：「老羌异域之人，远隔山川，得游中华，以为殊幸，请辞朝歌之县，长充养马之役，时赐美酒，以乐馀年。」帝曰：「朝歌纣之故都，地有美酒，故使老羌不复呼渴。」馥于阶下高声对曰：「马圉老羌，渐染皇化，溥天夷貊，皆为王臣，今若饮酒池之乐，更为殷纣之民乎？」帝抚玉几大悦。即迁酒泉太守。地有清泉，其味若酒。…</blockquote>
