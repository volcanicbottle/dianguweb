<p class="meta">典故 · 2 首诗使用</p>

<h2>出处</h2><p>《苏轼诗集》</p><blockquote>将军破贼自草檄，论诗说剑俱第一。彭城老守本虚名，识字劣能欺项籍。风流别驾贵公子，欲把笙歌暖锋镝。红旆朝开猛士噪，翠帷暮捲佳人出。东堂醉卧呼不起，啼鸟落花春寂寂。试教长笛傍耳根，一声吹裂阶前石。…</blockquote>
<h2>别名</h2><p>别驾风流、别乘文雅风流</p>
