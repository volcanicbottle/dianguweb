<h1>幼舆高志</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>谢鲲字幼舆，陈国阳夏人也。祖缵，典农中郎将。父衡，以儒素显，仕至国子祭酒。鲲少知名，通简有高识，不修威仪，好老易，能歌善鼓琴，王衍、嵇绍并奇之。左将军王敦引为长史，以讨杜韬功封咸亭侯。母忧去职，服阕，迁敦大将军长史。……敦有不臣之?，显于朝野。鲲知不可以道匡弼，乃优游寄遇，不屑政事，从容讽议，卒岁而已。每与毕卓、王尼、阮放、羊曼、桓彝、阮孚等纵酒，敦以其名高，雅相宾礼。尝使至都，明帝在东宫见之，甚相亲重。问曰：「论者以君方庾亮，自谓何如…</blockquote>
<h2>别名</h2><p>谢鲲</p>
<h2>用它的诗</h2>
<p>征招 · 姜夔 <span class="verse">「也孤负、幼舆高志」</span></p>
