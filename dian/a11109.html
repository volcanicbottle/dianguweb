<h1>蔡文姬造胡笳十八拍</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>东汉末蔡琰（文姬）没入胡地，归汉后感伤身世作《胡笳十八拍》</p>
<h2>出处</h2><p>《悲愤诗》</p><blockquote>嘶酸两句，蔡琰将回国时，不忍与他匈奴出生的儿子诀别，其《悲愤诗》中有一段极沉痛的描写。这里指由琴声而联想到的这一情节。…</blockquote>
<h2>别名</h2><p>嘶酸两句、嘶酸</p>
<h2>用它的诗</h2>
<p>听董大弹胡笳兼寄语弄房给事 · 李颀 <span class="verse">「断绝胡儿恋母声」</span></p>
