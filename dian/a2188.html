<h1>淡交情</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子集释》</p><blockquote>子桑雽曰：「子独不闻假人之亡与？林回弃千金之璧，负赤子而趋。或曰：『为其布与？赤子之布寡矣；为其累与？赤子之累多矣；弃千金之璧，负赤子而趋，何也？』林回曰：『彼以利合，此以天属也。』夫以利合者，迫穷祸患害相弃也；以天属者，迫穷祸患害相收也。夫相收之与相弃亦远矣。且君子之交淡若水，小人之交甘若醴；君子淡以亲，小人甘以绝。彼无故以合者，则无故以离。」…</blockquote>
<h2>别名</h2><p>君子之交淡如水、淡若水、交淡水、淡交</p>
<h2>用它的诗</h2>
<p>洞仙歌 · 辛弃疾 <span class="verse">「君子之交淡如水」</span></p>
