<h1>三入承明</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《昭明文选》</p><blockquote>下流不可处。君子慎厥初。名高不宿著。易用受侵诬。前者隳官去。有人适我闾。田家无所有。酌醴焚枯鱼。问我何功德。三入承明庐。所占于此土。是谓仁智居。文章不经国。筐箧无尺书。用等称才学。往往见叹誉。避席跪自陈。贱子实空虚。宋人遇周客。惭愧靡所如。唐·李善注：「璩初为侍郎，又为常侍，又为侍中，故云三入。」又引晋·陆机《洛阳记》曰：「吾常怪『谒帝承明庐』，问张公，张公云：『魏明帝在建始殿，朝会皆由承明门，然直庐在承明门侧。』」…</blockquote>
