<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《世说新语》</p><blockquote>孝武在西堂会，伏滔预坐。还，下车呼其儿，语之曰：「百人高会，临坐未得他语，先问『伏滔何在？在此不？』此故未易得。为人作父如此，何如？」…</blockquote>
