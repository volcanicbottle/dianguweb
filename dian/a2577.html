<h1>堕帻</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>刘庆孙在太傅府，于时人士，多为所构。唯庾子嵩纵心事外，无?可閒。后以其性俭家富，说太傅令换千万，冀其有吝，于此可乘。太傅于众坐中问庾，庾时颓然已醉，帻坠几上，以头就穿取，徐答云：「下官家故可有两娑千万，随公所取。」于是乃服。后有人向庾道此，庾曰：「可谓以小人之虑，度君子之心。」…</blockquote>
<h2>别名</h2><p>纶巾醉堕、纱巾堕、乌帻堕、刘庆孙</p>
