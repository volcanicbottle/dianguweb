<h1>问鸿蒙</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《庄子》</p><blockquote>「云将东游，过扶摇之枝而适遭鸿蒙。鸿蒙方将拊脾雀跃而游。云将见之，倘然止，贽然立，曰：『叟何人邪？叟何为此？』」「云将曰：『天气不和，地气郁结，六气不调，四时不节。今我愿合六气之精以育群生，为之柰何？』鸿蒙拊脾雀跃掉头曰：『吾弗知！吾弗知！』云将不得问。又三年，东游，过有宋之野，而适遭鸿蒙。……再拜稽首，愿闻于鸿蒙。』」「鸿蒙曰：『意！心养。汝徒处无为，而物自化。堕尔形体，吐尔聪明，伦与物忘；大同乎涬溟，解心释神，莫然无魂。』」…</blockquote>
