<h1>苏味道《正月十五夜》</h1>
<p class="meta">典故 · 2 首诗使用</p>
<h2>释义</h2><p>化用苏味道“暗尘随马去，明月逐人来”，写元宵车马喧闹</p>
<h2>出处</h2><p>《正月十五夜》</p><blockquote>不是暗尘明月两句：慨叹宋亡之后，佳节依旧，人事已非。暗尘明月，唐苏味道《正月十五夜》：“火树银花合。星桥铁锁开。暗尘随马去，明月逐人来。”极写当时元夜热闹繁华的景象。…</blockquote>
<h2>别名</h2><p>不是暗尘明月两句、暗尘明月</p>
<h2>用它的诗</h2>
<p>女冠子 · 蒋捷 <span class="verse">「而今灯漫挂不是暗尘明月那时元夜」</span></p>
<p>解语花 · 周邦彦 <span class="verse">「相逢处、自有暗尘随马」</span></p>
