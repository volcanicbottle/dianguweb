<h1>杀一围</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《北史》</p><blockquote>冯淑妃名小怜，大穆后从婢也。穆后爱衰，以五月五日进之，号曰「续命」。慧黠能弹琵琶，工歌舞。后主惑之，坐则同席，出则并马，愿得生死一处。命淑妃处隆基堂，淑妃恶曹昭仪所常居也，悉令反换其地。师之取平阳，帝猎于三堆，晋州亟告急。帝将还，淑妃请更杀一围，帝从其言。识者以为后主名纬，杀围言非吉征。及帝至晋州，城已欲没矣。…</blockquote>
<h2>别名</h2><p>更杀一围、猎一围、平阳破</p>
<h2>用它的诗</h2>
<p>北齐二首 二 · 李商隐 <span class="verse">「更请君王猎一围」</span></p>
