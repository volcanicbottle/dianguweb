<h1>天马</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《史记》</p><blockquote>初，天子发书《易》，云「神马当从西北来」。得乌孙马好，名曰「天马」。及得大宛汗血马，益壮，更名乌孙马曰「西极」，名大宛马曰「天马」云。而汉始筑令居以西，初置酒泉郡以通西北国。因益发使抵安息、奄蔡、黎轩、条枝、身毒国。而天子好宛马，使者相望于道。诸使外国一辈大者数百，少者百馀人，人所赍操大放博望侯时。其后益习而衰少焉。汉率一岁中使多者十馀，少者五六辈，远者八九岁，近者数岁而反。…</blockquote>
<h2>别名</h2><p>从东陵、刘彻（汉武帝）</p>
<h2>用它的诗</h2>
<p>杂曲歌辞 无愁果有愁曲 · 李商隐 <span class="verse">「骐𬴊踏云天马狞」</span></p>
