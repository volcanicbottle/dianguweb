<h1>然脐</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《后汉书》</p><blockquote>吕布劝令进，遂入门。肃以戟刺之，卓衷甲不入，伤臂堕车，顾大呼曰：「吕布何在？」布曰：「有诏讨贼臣。」卓大骂曰：「庸狗敢如是邪！」布应声持矛刺卓，趣兵斩之。主簿田仪及卓仓头前赴其尸，布又杀之。驰赍赦书，以令宫陛内外。士卒皆称万岁，百姓歌舞于道。长安中士女卖其珠玉衣装市酒肉相庆者，填满街肆。使皇甫嵩攻卓弟旻于郿坞，杀其母妻男女，尽灭其族。乃尸卓于市。天时始热，卓素充肥，脂流于地。守尸吏然火置卓脐中，光明达曙，如是积日。…</blockquote>
<h2>别名</h2><p>腹为灯、吕布、董卓（字仲颖）</p>
<h2>用它的诗</h2>
<p>洞庭鱼 · 李商隐 <span class="verse">「仍计腹为灯」</span></p>
