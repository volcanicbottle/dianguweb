<h1>细雨斜风</h1>
<p class="meta">典故 · 3 首诗使用</p>

<h2>出处</h2><p>《全唐诗》</p><blockquote>〈渔父歌五首〉其一：「西塞山前白鹭飞，桃花流水鳜鱼肥。青箬笠，绿蓑衣，斜风细雨不须归。」…</blockquote>
<h2>别名</h2><p>绿蓑青箬、西塞山前白鹭飞、斜风细雨也须归、渔人西塞曲、青山箬笠绿蓑衣</p>
<h2>用它的诗</h2>
