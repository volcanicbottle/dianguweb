<h1>爨桐</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>焦琴：美称琴，或喻人才遭到埋没。宋王禹偁《秋居幽兴》之二：“幽兴将何遣，焦琴贳酒杯。”</p>
<h2>出处</h2><p>《后汉书》</p><blockquote>吴人有烧桐以爨者，邕闻火烈之声，知其良木，因请而裁为琴，果有美音，而其尾犹焦，故时人名曰「焦尾琴」焉。…</blockquote>
<h2>别名</h2><p>焦琴、爨下焦、入爨、爨琴、爨下馀、蔡邕琴、爨下声、薪馀、桐尾、焦桐、焦尾、桐遇知音、尾半焦、暗辨桐声、炊爨得琴材、爨馀材、带火焦桐、焦梧桐、怜焦尾、桐薪鸣灶、翠桐入爨、琴得焦桐、蔡邕</p>
<h2>用它的诗</h2>
<p>荅杨八敬之绝句 · 刘禹锡 <span class="verse">「带火焦桐韵本悲」</span></p>
