<h1>八百里</h1>
<p class="meta">典故 · 1 首诗使用</p>
<h2>释义</h2><p>《世说新语·汰侈》载王恺有牛名‘八百里驳’，王济与其赌射，射杀后取心炙食</p>
<h2>出处</h2><p>《世说新语笺疏》</p><blockquote>王君夫有牛，名「八百里駮」，常莹其蹄角。王武子语君夫：「我射不如卿，今指赌卿牛，以千万对之。」君夫既恃手快，且谓骏物无有杀理，便相然可。令武子先射。武子一起便破的，却据胡床，叱左右：「速探牛心来！」须臾，炙至，一脔便去。…</blockquote>
<h2>别名</h2><p>牛心炙、牛心分炙、牛心熟、王济巧、王济射牛、一脔牛断领、王恺、王济、八百里驳</p>
<h2>用它的诗</h2>
<p>破阵子 · 辛弃疾 <span class="verse">「八百里分麾下炙」</span></p>
