<h1>莲勺困</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>「孝宣皇帝，武帝曾孙，戾太子孙也。太子纳史良娣，生史皇孙。皇孙纳王夫人，生宣帝，号曰皇曾孙。生数月，遭巫蛊事……曾孙因依倚广汉兄弟及祖母家史氏。受诗于东海澓中翁，高材好学，然亦喜游侠，斗鸡走马，具知闾里奸邪，吏治得失。数上下诸陵，周遍三辅，常困于莲勺卤中。」三国魏·如淳注：「为人所困辱也。莲勺县有盐池，纵广十馀里，其乡人名为卤中。」…</blockquote>
<h2>别名</h2><p>刘洵（汉宣帝）</p>
