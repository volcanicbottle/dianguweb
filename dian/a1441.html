<h1>贵衡阳纸</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《晋书》</p><blockquote>造齐都赋，一年乃成。复欲赋三都，会妹芬入宫，移家京师，乃诣著作郎张载访岷邛之事。遂构思十年，门庭藩溷皆著笔纸，遇得一句，即便疏之。自以所见不博，求为秘书郎。及赋成，时人未之重。思自以其作不谢班张，恐以人废言，安定皇甫谧有高誉，思造而示之。谧称善，为其赋序。张载为注魏都，刘逵注吴蜀而序之曰：「观中古以来为赋者多矣，相如子虚擅名于前，班固两都理胜其辞，张衡二京文过其意。至若此赋，拟议数家，傅辞会义，抑多精致，非夫研覈者不能练其旨，非夫博物者…</blockquote>
<h2>别名</h2><p>长安纸贵</p>
<h2>用它的诗</h2>
<p>水龙吟 · 辛弃疾 <span class="verse">「长安纸贵」</span></p>
