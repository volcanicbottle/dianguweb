<h2>出处</h2><p>《说苑》</p><blockquote>常摐有疾，老子往问焉，曰：「先生疾甚矣，无遗教可以语诸弟子者乎？」常摐曰：「子虽不问，吾将语子。」常摐曰：「过故乡而下车，子知之乎？」老子曰：「过故乡而下车，非谓其不忘故耶？」常摐曰：「嘻，是已。」常摐曰：「过乔木而趋，子知之乎？」老子曰：「过乔木而趋，非谓敬老耶？」常摐曰：「嘻，是已。」张其口而示老子曰：「吾舌存乎？」老子曰：「然。」「吾齿存乎？」老子曰：「亡。」常摐曰：「子知之乎？」老子曰：「夫舌之存也，岂非以其柔耶？齿之亡也，岂非…</blockquote>
