<h1>愚公谷</h1>
<p class="meta">典故 · 3 首诗使用</p>
<h2>释义</h2><p>愚公谷：喻雅逸之地。唐王维《愚公谷三首》之三：“借问愚公谷，与君聊一寻。”</p>
<h2>出处</h2><p>《艺文类聚》</p><blockquote>《韩子》曰：昔齐桓公入山，问父老，此为何谷？答曰：「臣旧畜牛生犊，以子买驹，少年谓牛不生驹，遂持而去。傍邻谓臣愚，遂名为愚公谷。」…</blockquote>
<h2>别名</h2><p>愚谷、谷名愚、谷愚、谷中愚、谷号愚、愚公、栖隐愚公、愚公住谷、齐桓公（名小白）</p>
<h2>用它的诗</h2>
<p>过崔驸马山池 · 王维 <span class="verse">「愚公谷正愚」</span></p>
