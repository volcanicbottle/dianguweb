<h1>以手推松曰去</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《汉书》</p><blockquote>后岁馀，丞相王嘉上书荐故廷尉梁相等，尚书劾奏嘉「言事恣意，迷国罔上，不道。」下将军中朝者议，左将军公孙禄、司隶鲍宣、光禄大夫孔光等十四人皆以为嘉应迷国不道法。胜独书议曰：「嘉资性邪僻，所举多贪残吏。位列三公，阴阳不和，诸事并废，咎皆繇嘉，迷国不疑，今举相等，过微薄。」日暮议者罢。明旦复会，左将军禄问胜：「君议亡所据，今奏当上，宜何从？」胜曰：「将军以胜议不可者，通劾之。」博士夏侯常见胜应禄不和，起至胜前谓曰：「宜如奏所言。」胜以手推常曰…</blockquote>
<h2>别名</h2><p>龚胜</p>
<h2>用它的诗</h2>
<p>西江月 · 辛弃疾 <span class="verse">「以手推松曰去」</span></p>
