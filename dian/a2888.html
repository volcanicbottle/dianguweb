<h1>风流谢安</h1>
<p class="meta">典故 · 1 首诗使用</p>

<h2>出处</h2><p>《南齐书》</p><blockquote>俭长礼学，谙究朝仪，每博议，證引先儒，罕有其例。八坐丞郎，无能异者。令史咨事，宾客满席，俭应接铨序，傍无留滞。十日一还学，监试诸生，巾卷在庭，剑卫令史仪容甚盛。作解散髻，斜插帻簪，朝野慕之，相与放效。俭常谓人曰：「江左风流宰相，唯有谢安。」盖自比也。世祖深委仗之，士流选用，奏无不可。…</blockquote>
<h2>别名</h2><p>谢安</p>
<h2>用它的诗</h2>
<p>太常引 · 辛弃疾 <span class="verse">「似江左、风流谢安」</span></p>
